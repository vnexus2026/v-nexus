<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V-Nexus | 專為 VTuber 打造的聯動平台</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #0f111a; color: #f3f4f6; font-family: sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f111a; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    
    @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    .animate-slide-down { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes radarSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-radar { animation: radarSpin 2s linear infinite; }

    /* 針對深色主題將原生日曆與時間 icon 反轉為白色 */
    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    /* 強制隱藏時間選擇器中的 AM/PM (上午/下午) 區塊，以實現純 24 小時制 */
    ::-webkit-datetime-edit-ampm-field {
      display: none;
    }
  </style>
</head>
<body class="selection:bg-purple-500 selection:text-white m-0 p-0 overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc, updateDoc, increment, arrayUnion, arrayRemove, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useMemo, useRef } = React;

    // --- Firebase 連線設定 ---
    const firebaseConfig = {
      apiKey: "AIzaSyD_JJZUcT56VkHFH0ykBRJQ_nFLK_4p7kY",
      authDomain: "v-nexus.firebaseapp.com",
      projectId: "v-nexus",
      storageBucket: "v-nexus.firebasestorage.app",
      messagingSenderId: "824125737901",
      appId: "1:824125737901:web:93a4f21b56ab00dfaaaf24"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const APP_ID = 'v-nexus-official';
    const getPath = (collectionName) => `artifacts/${APP_ID}/public/data/${collectionName}`;

    // --- 全域常數與工具函數 ---
    const PREDEFINED_COLLABS = ['APEX', '瓦羅蘭', 'LOL', 'FPS', 'Minecraft', '合作遊戲', '企劃', '歌回', '雜談'];
    const COLLAB_CATEGORIES = ['遊戲', '雜談歌回', '特別企劃'];
    const inputCls = "w-full min-w-0 box-border bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none text-sm";
    const btnCls = "w-full sm:w-auto bg-purple-600 hover:bg-purple-500 text-white py-3 px-8 rounded-xl font-bold shadow-lg transition-transform hover:scale-105 flex justify-center items-center gap-2";

    const formatTime = (ts) => {
      if (!ts) return "剛剛";
      const d = new Date(ts);
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    };

    const formatDateTimeLocalStr = (dtStr) => {
      if (!dtStr) return '未指定';
      const d = new Date(dtStr);
      if (isNaN(d.getTime())) return dtStr;
      return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    };

    const formatSchedule = (v) => {
      if (v.isScheduleAnytime) return "我都可以 (隨時可約)";
      if (v.isScheduleCustom && v.customScheduleText) return v.customScheduleText;
      if (v.isScheduleExcept && v.scheduleSlots?.length > 0) return "除了：" + v.scheduleSlots.map(s => `${s.day} ${s.start}~${s.end}`).join('、') + "，其餘皆可";
      if (v.scheduleSlots?.length > 0) return v.scheduleSlots.map(s => `${s.day} ${s.start}~${s.end}`).join('、');
      return v.schedule || '未提供時段';
    };

    const getYouTubeThumbnail = (url) => {
      if (!url || typeof url !== 'string') return null;
      const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
      return (match && match[2].length === 11) ? `https://img.youtube.com/vi/${match[2]}/maxresdefault.jpg` : null;
    };
    
    // 自動從 YouTube 網址抓取縮圖與標題
    const autoFetchYouTubeInfo = async (url, setTitle, setCoverUrl, showToast) => {
      if (!url) return showToast("請先輸入 YouTube 連結");
      const ytMatch = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
      if (ytMatch && ytMatch[2].length === 11) {
        const vid = ytMatch[2];
        setCoverUrl(`https://img.youtube.com/vi/${vid}/maxresdefault.jpg`);
        try {
          const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${vid}`);
          const data = await res.json();
          if (data.title) setTitle(data.title);
          showToast("✅ 已自動抓取標題與封面圖！(時間請手動設定)");
        } catch(e) {
          showToast("✅ 已自動填入封面圖！(標題需手動輸入)");
        }
      } else {
        showToast("這似乎不是有效的 YouTube 連結");
      }
    };

    const parseSubscribers = (v) => {
      const parseStr = (str) => {
        if (!str) return 0;
        let s = String(str); let num = parseFloat(s.replace(/[^0-9.]/g, ''));
        if (isNaN(num)) return 0;
        if (s.toUpperCase().includes('K')) num *= 1000;
        if (s.toUpperCase().includes('M')) num *= 1000000;
        if (s.toUpperCase().includes('萬')) num *= 10000;
        return num;
      };
      return parseStr(v.youtubeSubscribers || v.subscribers) + parseStr(v.twitchFollowers);
    };

    const isVisible = (v, currentUser) => {
      if (!v) return false;
      if (currentUser && v.id === currentUser.uid) return true;
      if (String(v.id || '').startsWith('mock')) return true;
      if (!v.isVerified || v.isBlacklisted) return false;
      if (v.activityStatus === 'sleep' || v.activityStatus === 'graduated') return false;
      return true;
    };

    // --- 共用 UI 元件 ---
    const TagBadge = ({ text, onClick, selected }) => (
      <span onClick={onClick} className={`px-3 py-1 rounded-full text-xs font-medium cursor-pointer transition-colors border ${selected ? 'bg-purple-600 text-white border-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.4)]' : 'bg-gray-800 text-gray-300 border-gray-700 hover:bg-gray-700 hover:text-white'}`}>{text}</span>
    );

    const CollabCard = ({ c, isLive, isAdmin, user, onDeleteCollab, vtuber, onNavigateProfile }) => {
      if (!c) return null;
      const displayImg = c.coverUrl || getYouTubeThumbnail(c.streamUrl) || 'https://images.unsplash.com/photo-1598550476439-6847785fcea6?auto=format&fit=crop&q=80&w=800';
      return (
        <div className={`group ${isLive ? 'bg-red-950/40 border-2 border-red-500 shadow-[0_0_30px_rgba(220,38,38,0.4)] transform scale-[1.02] z-10' : 'bg-gray-800/60 border border-gray-700 hover:border-red-500/50 hover:shadow-red-500/20'} rounded-3xl overflow-hidden flex flex-col transition-all relative w-full`}>
          {isLive && <div className="absolute top-0 left-0 w-full bg-red-600 text-white text-center py-1.5 font-bold text-xs tracking-widest z-30 animate-pulse"><i className="fa-solid fa-satellite-dish mr-2"></i> 正在進行聯動中</div>}
          {onDeleteCollab && (isAdmin || (user && c.userId === user.uid)) && <button onClick={() => onDeleteCollab(c.id)} className={`absolute ${isLive ? 'top-10' : 'top-4'} right-4 z-20 bg-black/60 backdrop-blur-md text-gray-300 hover:text-red-400 hover:bg-black/80 p-2 rounded-lg transition-colors`} title="刪除此行程"><i className="fa-solid fa-trash"></i></button>}
          <div className={`h-48 relative overflow-hidden flex-shrink-0 ${isLive ? 'mt-8' : ''}`}>
            <img src={displayImg} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="聯動封面" />
            <div className="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/20 to-transparent"></div>
            <div className="absolute top-4 left-4 bg-black/80 backdrop-blur-md border border-gray-600 text-white px-3 py-1.5 rounded-xl flex flex-col items-center shadow-lg transform -rotate-2">
              <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">{c.date}</span><span className="text-sm text-red-400 font-extrabold">{c.time}</span>
            </div>
            {c.streamUrl && <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10 pointer-events-none"><div className={`w-16 h-16 ${isLive ? 'bg-red-500' : 'bg-red-600/90'} text-white rounded-full flex items-center justify-center pl-1 shadow-[0_0_30px_rgba(220,38,38,0.8)] backdrop-blur-sm`}><i className="fa-solid fa-play text-2xl"></i></div></div>}
          </div>
          <div className="p-6 flex-1 flex flex-col relative z-10 bg-gray-900/80">
            <div className="mb-2">
              <span className="bg-purple-500/20 text-purple-300 text-[10px] px-2 py-1 rounded-lg border border-purple-500/30 font-bold">{c.category || '遊戲'}</span>
            </div>
            <h3 className={`text-xl font-extrabold text-white mb-6 line-clamp-2 leading-tight transition-colors ${isLive ? 'text-red-400' : 'group-hover:text-red-400'}`}>{c.title}</h3>
            <div className="mt-auto">
              {c.streamUrl ? <a href={c.streamUrl} target="_blank" rel="noopener noreferrer" className={`w-full ${isLive ? 'bg-red-500 shadow-[0_0_20px_rgba(220,38,38,0.6)] animate-pulse' : 'bg-red-600 hover:bg-red-500 group-hover:shadow-[0_0_20px_rgba(220,38,38,0.4)]'} text-white py-3.5 rounded-xl font-bold transition-all flex justify-center items-center gap-2`}><i className="fa-solid fa-play-circle text-lg"></i> 前往待機室 / 觀看直播</a> : <div className="w-full bg-gray-800 text-gray-500 py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 border border-gray-700"><i className="fa-solid fa-clock"></i> 直播連結尚未提供</div>}
              
              {/* 發起人名片按鈕 */}
              {vtuber && vtuber.id !== 'admin' && onNavigateProfile && (
                <div onClick={(e) => { e.stopPropagation(); onNavigateProfile(vtuber); }} className="mt-4 pt-4 border-t border-gray-700/50 flex items-center justify-between cursor-pointer group/author hover:bg-gray-800/80 p-2 -mx-2 rounded-xl transition-colors">
                  <div className="flex items-center gap-3">
                    <img src={vtuber.avatar} className="w-8 h-8 rounded-full border border-gray-600 object-cover" />
                    <div className="text-left">
                      <p className="text-[10px] text-gray-400 mb-0.5">發起人</p>
                      <p className="text-sm font-bold text-white group-hover/author:text-purple-400 transition-colors truncate max-w-[150px]">{vtuber.name}</p>
                    </div>
                  </div>
                  <button className="text-xs bg-gray-700 text-gray-300 px-3 py-1.5 rounded-lg group-hover/author:bg-purple-600 group-hover/author:text-white transition-colors font-bold"><i className="fa-solid fa-id-card mr-1.5"></i>查看名片</button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const VTuberCard = ({ v, user, isVerifiedUser, onSelect, onDislike }) => (
      <div onClick={onSelect} className={`group bg-gray-800/40 border ${!v.isVerified ? 'border-yellow-500/50' : 'border-gray-700/50'} rounded-2xl overflow-hidden cursor-pointer hover:border-purple-500/50 transition-all hover:-translate-y-1 flex flex-col relative`}>
        <div className="absolute top-2 left-2 z-10 flex gap-1">
          {!v.isVerified && <div className="bg-yellow-500 text-black text-[10px] font-bold px-2 py-0.5 rounded shadow-lg">待審核</div>}
          {v.activityStatus === 'sleep' && <div className="bg-gray-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-lg">休眠中</div>}
          <div className={`text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-lg flex items-center gap-1 ${v.mainPlatform === 'Twitch' ? 'bg-purple-600' : 'bg-red-600'}`}>
            <i className={`fa-brands fa-${v.mainPlatform === 'Twitch' ? 'twitch' : 'youtube'}`}></i> {v.mainPlatform || 'YouTube'}
          </div>
        </div>
        <div className="h-24 relative overflow-hidden flex-shrink-0">
          <img src={v.banner} className="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform" />
          <span className="absolute top-2 right-2 px-2 py-0.5 text-[10px] font-bold bg-black/50 border border-gray-600 rounded text-white">{v.agency}</span>
        </div>
        <div className="p-4 relative flex-1 flex flex-col">
          <img src={v.avatar} className="absolute -top-8 w-16 h-16 rounded-xl border-2 border-gray-800 bg-gray-900 object-cover" />
          <div className="ml-20 mb-3">
            <h3 className="font-bold text-white truncate flex items-center gap-1">{v.name} {v.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-xs" title="已認證"></i>}</h3>
            <div className="flex flex-wrap gap-2 text-xs mt-1 text-gray-400">
              <span className="flex items-center gap-1 text-green-400"><i className="fa-solid fa-thumbs-up"></i> {v.likes || 0}</span>
              {v.nationality && <span className="flex items-center gap-1 text-blue-300"><i className="fa-solid fa-earth-asia"></i> {v.nationality}</span>}
              {v.language && <span className="flex items-center gap-1 text-yellow-300"><i className="fa-solid fa-language"></i> {v.language}</span>}
            </div>
          </div>
          <p className="text-xs text-gray-400 line-clamp-2 h-8">{v.description}</p>
          {v.streamStyleUrl && (
            <div className="mt-1 mb-1">
              <a href={v.streamStyleUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="inline-flex items-center gap-1 text-[10px] bg-blue-500/20 text-blue-400 hover:bg-blue-500/30 px-2 py-1 rounded transition-colors border border-blue-500/30 w-fit font-bold"><i className="fa-solid fa-video"></i> 觀看我的直播風格</a>
            </div>
          )}
          <div className="mt-auto pt-2 border-t border-gray-700/50 text-xs text-gray-400 flex items-center justify-between">
            <div className="flex items-center gap-1.5 flex-1 min-w-0 pr-2"><i className="fa-solid fa-clock text-purple-400"></i> <span className="truncate">{formatSchedule(v)}</span></div>
            {isVerifiedUser && v.id !== user?.uid && <button onClick={(e) => { e.stopPropagation(); onDislike(v); }} className="bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-50 hover:text-white px-2 py-1 rounded transition-colors flex items-center gap-1 flex-shrink-0" title="檢舉負面行為"><i className="fa-solid fa-thumbs-down text-[10px]"></i></button>}
          </div>
          <div className="mt-2 pt-2 border-t border-gray-700/50 flex gap-2">
            {(v.youtubeUrl || v.channelUrl) && (v.youtubeUrl || v.channelUrl) !== '#' ? (
              <a href={v.youtubeUrl || v.channelUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-red-500/20 text-red-400 hover:bg-red-50 hover:text-white px-2.5 py-1.5 rounded-lg transition-colors flex items-center justify-center flex-shrink-0 gap-1" title="YouTube">
                <i className="fa-brands fa-youtube text-sm"></i>
                {(v.youtubeSubscribers || v.subscribers) && <span className="text-[10px] font-bold">{v.youtubeSubscribers || v.subscribers}</span>}
              </a>
            ) : (v.youtubeSubscribers || v.subscribers) ? (
              <div className="bg-red-500/10 text-red-400/80 px-2.5 py-1.5 rounded-lg flex items-center justify-center flex-shrink-0 gap-1" title="YouTube 訂閱數">
                <i className="fa-brands fa-youtube text-sm"></i>
                <span className="text-[10px] font-bold">{v.youtubeSubscribers || v.subscribers}</span>
              </div>
            ) : null}
            {v.twitchUrl && v.twitchUrl !== '#' ? (
              <a href={v.twitchUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-purple-500/20 text-purple-400 hover:bg-purple-500 hover:text-white px-2.5 py-1.5 rounded-lg transition-colors flex items-center justify-center flex-shrink-0 gap-1" title="Twitch">
                <i className="fa-brands fa-twitch text-sm"></i>
                {v.twitchFollowers && <span className="text-[10px] font-bold">{v.twitchFollowers}</span>}
              </a>
            ) : v.twitchFollowers ? (
              <div className="bg-purple-500/10 text-purple-400/80 px-2.5 py-1.5 rounded-lg flex items-center justify-center flex-shrink-0 gap-1" title="Twitch 追隨數">
                <i className="fa-brands fa-twitch text-sm"></i>
                <span className="text-[10px] font-bold">{v.twitchFollowers}</span>
              </div>
            ) : null}
            {v.xUrl && v.xUrl !== '#' && <a href={v.xUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-blue-500/20 text-blue-400 hover:bg-blue-50 hover:text-white px-2.5 py-1.5 rounded-lg transition-colors flex items-center justify-center flex-shrink-0" title="X (Twitter)"><i className="fa-brands fa-x-twitter text-sm"></i></a>}
            {v.igUrl && v.igUrl !== '#' && <a href={v.igUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-pink-500/20 text-pink-400 hover:bg-pink-50 hover:text-white px-2.5 py-1.5 rounded-lg transition-colors flex items-center justify-center flex-shrink-0" title="Instagram"><i className="fa-brands fa-instagram text-sm"></i></a>}
          </div>
        </div>
      </div>
    );

    const BulletinCard = ({ b, user, isVerifiedUser, onNavigateProfile, onApply, onInvite }) => {
      const isAuthor = user?.uid === b.userId;
      const hasApplied = (b.applicants || []).includes(user?.uid);

      return (
        <div className="bg-gray-800/60 border border-gray-700 rounded-3xl overflow-hidden flex flex-col hover:border-purple-500/50 transition-all shadow-lg group">
          <div className="bg-gray-900/80 p-5 border-b border-gray-700 flex items-start gap-4">
            <img src={b.vtuber.avatar} onClick={() => onNavigateProfile(b.vtuber)} className="w-14 h-14 rounded-full border-2 border-purple-500/50 object-cover flex-shrink-0 cursor-pointer hover:scale-105 transition-transform" />
            <div className="flex-1 flex justify-between items-start gap-2">
              <div>
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-purple-400 font-bold text-[10px] bg-purple-500/10 px-2 py-0.5 rounded border border-purple-500/20">發起人</span>
                  <span onClick={() => onNavigateProfile(b.vtuber)} className="font-extrabold text-white text-lg hover:text-purple-400 transition-colors cursor-pointer">{b.vtuber.name}</span>
                  {b.vtuber.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-sm" title="已認證"></i>}
                </div>
                <div className="flex items-center gap-2 mt-1.5"><span className="text-[10px] text-gray-400">{b.vtuber.agency}</span><span className="text-gray-600 text-[10px]">•</span><span className="text-[10px] text-gray-400">{b.postedAt} 發布</span></div>
              </div>
              <div className="flex gap-2">
                {(b.vtuber.youtubeUrl || b.vtuber.channelUrl) && <a href={b.vtuber.youtubeUrl || b.vtuber.channelUrl} target="_blank" rel="noopener noreferrer" className="bg-red-500/10 text-red-400 w-9 h-9 rounded-lg flex items-center justify-center"><i className="fa-brands fa-youtube text-lg"></i></a>}
                {b.vtuber.twitchUrl && <a href={b.vtuber.twitchUrl} target="_blank" rel="noopener noreferrer" className="bg-purple-500/10 text-purple-400 w-9 h-9 rounded-lg flex items-center justify-center"><i className="fa-brands fa-twitch text-lg"></i></a>}
              </div>
            </div>
          </div>
          <div className="p-6 flex-1 flex flex-col">
            <p className="text-gray-200 text-base mb-6 leading-relaxed whitespace-pre-wrap">{b.content}</p>
            <div className="grid grid-cols-2 gap-3 mt-auto mb-4">
              <div className="bg-gray-900/50 p-3 rounded-xl flex flex-col"><span className="text-[10px] text-gray-500 mb-1"><i className="fa-solid fa-gamepad"></i> 性質</span><span className="text-sm font-bold text-gray-200">{b.collabType || '未指定'}</span></div>
              <div className="bg-gray-900/50 p-3 rounded-xl flex flex-col"><span className="text-[10px] text-gray-500 mb-1"><i className="fa-solid fa-users"></i> 人數</span><span className="text-sm font-bold text-gray-200">{b.collabSize || '未指定'}</span></div>
              <div className="bg-gray-900/50 p-3 rounded-xl flex flex-col"><span className="text-[10px] text-gray-500 mb-1"><i className="fa-regular fa-calendar"></i> 時間</span><span className="text-sm font-bold text-gray-200">{formatDateTimeLocalStr(b.collabTime)}</span></div>
              <div className="bg-red-500/5 p-3 rounded-xl border border-red-500/20 flex flex-col"><span className="text-[10px] text-red-400/80 mb-1"><i className="fa-solid fa-hourglass-half"></i> 截止</span><span className="text-sm font-bold text-red-300">{b.recruitEndTime ? formatTime(b.recruitEndTime) : '未指定'}</span></div>
            </div>

            {/* --- 意願報名區塊 --- */}
            <div className="mt-4 pt-4 border-t border-gray-700/50">
              {isAuthor ? (
                <div>
                  <p className="text-xs text-purple-400 font-bold mb-3 flex items-center gap-2"><i className="fa-solid fa-users"></i> 有意願的創作者 ({b.applicantsData?.length || 0})</p>
                  {b.applicantsData?.length > 0 ? (
                    <div className="flex flex-wrap gap-2">
                      {b.applicantsData.map(a => (
                        <div key={a.id} className="flex items-center bg-gray-900 p-1.5 pr-2 rounded-lg border border-gray-700 hover:border-purple-500/50 transition-colors">
                          <img src={a.avatar} onClick={() => onNavigateProfile(a)} className="w-7 h-7 rounded-full cursor-pointer object-cover" title="查看名片" />
                          <span onClick={() => onNavigateProfile(a)} className="text-xs text-gray-300 ml-2 cursor-pointer hover:text-white font-bold max-w-[100px] truncate">{a.name}</span>
                          <button onClick={() => onInvite(a)} className="ml-3 bg-purple-600 hover:bg-purple-500 text-[10px] text-white px-2.5 py-1.5 rounded shadow-lg transition-transform hover:scale-105">邀請聯動</button>
                        </div>
                      ))}
                    </div>
                  ) : <p className="text-[10px] text-gray-500">目前還沒有人表達意願喔！</p>}
                </div>
              ) : (
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <span className="text-xs text-gray-400">目前 {b.applicantsData?.length || 0} 人有意願</span>
                    <div className="flex -space-x-2">
                      {b.applicantsData?.slice(0,3).map(a => <img key={a.id} src={a.avatar} onClick={() => onNavigateProfile(a)} className="w-6 h-6 rounded-full ring-2 ring-gray-800 cursor-pointer object-cover" title={a.name}/>)}
                      {b.applicantsData?.length > 3 && <div className="flex h-6 w-6 items-center justify-center rounded-full bg-gray-800 ring-2 ring-gray-900 text-[10px] text-gray-300">+{b.applicantsData.length - 3}</div>}
                    </div>
                  </div>
                  {isVerifiedUser && (
                    <button onClick={() => onApply(b.id, !hasApplied)} className={`text-xs font-bold px-4 py-2 rounded-xl transition-transform hover:scale-105 ${hasApplied ? 'bg-gray-700 text-gray-300 hover:bg-gray-600' : 'bg-purple-600 text-white hover:bg-purple-500 shadow-[0_0_15px_rgba(168,85,247,0.3)]'}`}>
                      {hasApplied ? '收回意願' : '✋ 我有意願'}
                    </button>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const MatchPage = ({ vtubers, navigate, showToast, currentUser }) => {
      const [desiredType, setDesiredType] = useState('');
      const [matchedVtuber, setMatchedVtuber] = useState(null);
      const [isMatching, setIsMatching] = useState(false);

      const handleMatch = () => {
        setIsMatching(true); setMatchedVtuber(null);
        setTimeout(() => {
          const candidates = (vtubers || []).filter(v => isVisible(v, currentUser) && v.id !== currentUser?.uid);
          if (candidates.length === 0) { setIsMatching(false); return showToast("目前資料庫尚無可配對的已認證創作者！"); }
          
          let filtered = desiredType ? candidates.filter(v => Array.isArray(v.collabTypes) && v.collabTypes.includes(desiredType)) : candidates;
          if (filtered.length === 0) { 
            showToast("找不到完全符合類型的對象，為您隨機推薦一位命定夥伴！"); 
            filtered = candidates; 
          } else { 
            showToast("🎉 配對成功！為您找到完美夥伴！"); 
          }
          
          setMatchedVtuber(filtered[Math.floor(Math.random() * filtered.length)]);
          setIsMatching(false);
        }, 2000); 
      };

      return (
        <div className="max-w-4xl mx-auto px-4 py-12 text-center animate-fade-in-up">
          <h2 className="text-3xl font-extrabold text-purple-400 mb-4 flex justify-center items-center gap-3"><i className="fa-solid fa-dice"></i> 聯動隨機配對</h2>
          <p className="text-gray-400 mb-10">不知道該找誰玩嗎？讓 V-Nexus 幫您隨機抽籤配對，或許會遇到意想不到的好夥伴喔！</p>
          
          <div className="bg-gray-800/40 border border-gray-700 rounded-3xl p-8 shadow-2xl max-w-xl mx-auto relative overflow-hidden">
            <div className="absolute -top-16 -left-16 w-32 h-32 bg-purple-600/10 rounded-full blur-3xl"></div>
            
            {!isMatching && !matchedVtuber && (
              <div className="space-y-6 relative z-10 animate-fade-in-up">
                <div className="text-left">
                  <label className="block text-sm font-bold text-gray-300 mb-2">想要聯動的類型 (選填)</label>
                  <select value={desiredType} onChange={e=>setDesiredType(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none text-base">
                    <option value="">不限類型 (完全隨機)</option>
                    {PREDEFINED_COLLABS.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <button onClick={handleMatch} className="w-full mt-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white py-4 rounded-xl font-bold text-lg shadow-[0_0_20px_rgba(168,85,247,0.4)] transition-transform hover:scale-105 flex justify-center items-center gap-2">
                  <i className="fa-solid fa-wand-magic-sparkles"></i> 開始尋找命定夥伴
                </button>
              </div>
            )}

            {isMatching && (
              <div className="py-12 flex flex-col items-center justify-center animate-fade-in-up">
                <div className="relative w-32 h-32 mb-6">
                  <div className="absolute inset-0 border-4 border-gray-700 rounded-full"></div>
                  <div className="absolute inset-0 border-4 border-t-purple-500 border-r-transparent border-b-transparent border-l-transparent rounded-full animate-radar"></div>
                  <i className="fa-solid fa-satellite-dish text-4xl text-purple-400 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></i>
                </div>
                <h3 className="text-xl font-bold text-white mb-2 animate-pulse">雷達掃描中...</h3>
                <p className="text-sm text-gray-400">正在廣袤的 V 圈星海中尋找符合您頻率的對象</p>
              </div>
            )}

            {matchedVtuber && !isMatching && (
              <div className="animate-fade-in-up relative z-10 flex flex-col items-center">
                <h3 className="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 mb-6">就是決定是你了！</h3>
                <div className="w-full group bg-gray-900/80 border border-purple-500/50 rounded-2xl overflow-hidden shadow-[0_0_30px_rgba(168,85,247,0.2)] flex flex-col text-left mb-6">
                  <div className="h-28 relative overflow-hidden flex-shrink-0">
                    <img src={matchedVtuber.banner} className="w-full h-full object-cover opacity-60" />
                    <span className="absolute top-2 right-2 px-2 py-0.5 text-[10px] font-bold bg-black/50 border border-gray-600 rounded text-white">{matchedVtuber.agency}</span>
                  </div>
                  <div className="p-4 relative flex-1 flex flex-col">
                    <img src={matchedVtuber.avatar} className="absolute -top-10 w-20 h-20 rounded-xl border-2 border-gray-800 bg-gray-900 object-cover" />
                    <div className="ml-24 mb-3">
                      <h3 className="font-bold text-white truncate text-lg flex items-center gap-1">
                        {matchedVtuber.name} {matchedVtuber.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-sm"></i>}
                      </h3>
                      <div className="flex gap-2 text-xs mt-1 text-gray-400">
                        {(matchedVtuber.youtubeSubscribers || matchedVtuber.subscribers) && <span className="flex items-center gap-1"><i className="fa-brands fa-youtube text-red-400"></i> {matchedVtuber.youtubeSubscribers || matchedVtuber.subscribers}</span>}
                        <span className="flex items-center gap-1 text-green-400"><i className="fa-solid fa-thumbs-up"></i> {matchedVtuber.likes || 0}</span>
                      </div>
                    </div>
                    <div className="flex flex-wrap gap-2 mt-2">
                      {(matchedVtuber.collabTypes || []).slice(0,3).map(t=><span key={t} className="text-[10px] text-gray-300 bg-gray-800 px-2 py-1 rounded-md border border-gray-700">{t}</span>)}
                    </div>
                  </div>
                </div>
                <div className="flex gap-3 w-full">
                  <button onClick={() => {setMatchedVtuber(null); setDesiredType('');}} className="flex-1 bg-gray-800 hover:bg-gray-700 text-white py-3.5 rounded-xl text-sm font-bold transition-colors">再抽一次</button>
                  <button onClick={() => { navigate(`profile/${matchedVtuber.id}`); }} className="flex-[2] bg-purple-600 hover:bg-purple-500 text-white py-3.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-purple-500/25 flex justify-center items-center gap-2"><i className="fa-solid fa-handshake"></i> 前往對方名片</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const ScheduleEditor = ({ form, updateForm }) => {
      const mode = form.isScheduleAnytime ? 'anytime' : form.isScheduleExcept ? 'except' : form.isScheduleCustom ? 'custom' : 'specific';
      const handleModeChange = (e) => {
        const m = e.target.value;
        updateForm({ isScheduleAnytime: m==='anytime', isScheduleExcept: m==='except', isScheduleCustom: m==='custom' });
      };
      const updateSlot = (idx, field, val) => { const newSlots = [...(form.scheduleSlots||[])]; newSlots[idx][field] = val; updateForm({scheduleSlots: newSlots}); };
      return (
        <div className="bg-gray-900 border border-gray-700 rounded-xl p-4 mt-1">
          <div className="mb-3">
            <select value={mode} onChange={handleModeChange} className={inputCls}>
              <option value="specific">✔️ 指定可連動時段</option><option value="except">❌ 除了以下時段，其他皆可</option>
              <option value="custom">✍️ 自訂時間 (自行手動輸入時間)</option><option value="anytime">🌟 我都可以 (隨時可約)</option>
            </select>
          </div>
          {mode === 'custom' && <div className="space-y-3 border-t border-gray-700 pt-3"><input type="text" value={form.customScheduleText||''} onChange={e => updateForm({customScheduleText: e.target.value})} placeholder="例如：每個月底的週末晚上、只接臨時約..." className={inputCls} /></div>}
          {(mode === 'specific' || mode === 'except') && (
            <div className="space-y-3 border-t border-gray-700 pt-3">
              {(form.scheduleSlots || []).map((slot, index) => (
                <div key={index} className="flex flex-wrap items-center gap-2 bg-gray-800/50 p-2 rounded-lg border border-gray-700">
                  <select value={slot.day} onChange={e => updateSlot(index, 'day', e.target.value)} className="bg-gray-800 border border-gray-600 rounded p-1.5 text-white text-xs outline-none focus:border-purple-500">
                    {['星期一','星期二','星期三','星期四','星期五','星期六','星期日','平日','週末','每日'].map(d=><option key={d} value={d}>{d}</option>)}
                  </select>
                  <input type="time" lang="en-GB" value={slot.start} onChange={e => updateSlot(index, 'start', e.target.value)} className="bg-gray-800 border border-gray-600 rounded p-1.5 text-white text-xs outline-none focus:border-purple-500 box-border min-w-0" />
                  <span className="text-gray-400 text-xs">至</span>
                  <input type="time" lang="en-GB" value={slot.end} onChange={e => updateSlot(index, 'end', e.target.value)} className="bg-gray-800 border border-gray-600 rounded p-1.5 text-white text-xs outline-none focus:border-purple-500 box-border min-w-0" />
                  <button type="button" onClick={() => updateForm({scheduleSlots: form.scheduleSlots.filter((_, i) => i !== index)})} className="text-red-400 hover:text-red-300 ml-auto px-2 transition-colors"><i className="fa-solid fa-trash"></i></button>
                </div>
              ))}
              <button type="button" onClick={() => updateForm({scheduleSlots: [...(form.scheduleSlots||[]), { day: '星期一', start: '20:00', end: '22:00' }]})} className="text-xs text-purple-400 hover:text-white flex items-center gap-1 mt-2 bg-purple-500/10 hover:bg-purple-500 px-3 py-1.5 rounded-lg border border-purple-500/20 transition-colors"><i className="fa-solid fa-plus"></i> 新增時段</button>
            </div>
          )}
        </div>
      );
    };

    const CollabTypesEditor = ({ formState, setFormState, showToast }) => {
      const toggleCollab = (type) => {
        let newTypes = Array.isArray(formState.collabTypes) ? [...formState.collabTypes] : [];
        if (newTypes.includes(type)) { newTypes = newTypes.filter(t => t !== type); } 
        else {
          if (newTypes.length + (formState.isOtherCollab ? 1 : 0) >= 3) return showToast("主要願意連動類型至多只能選擇三項喔！");
          newTypes.push(type);
        }
        setFormState({collabTypes: newTypes});
      };
      const toggleOther = () => {
        const willBeChecked = !formState.isOtherCollab;
        if (willBeChecked && (Array.isArray(formState.collabTypes) ? formState.collabTypes.length : 0) >= 3) return showToast("主要願意連動類型至多只能選擇三項喔！");
        setFormState({isOtherCollab: willBeChecked});
      };
      const currentTypes = Array.isArray(formState.collabTypes) ? formState.collabTypes : [];
      return (
        <div className="bg-gray-900 border border-gray-700 rounded-xl p-4 mt-1">
          <div className="flex flex-wrap gap-3">
            {PREDEFINED_COLLABS.map(type => (
              <label key={type} className="flex items-center gap-2 cursor-pointer group">
                <input type="checkbox" checked={currentTypes.includes(type)} onChange={() => toggleCollab(type)} className="accent-purple-500 w-4 h-4" />
                <span className="text-sm text-gray-300 group-hover:text-white transition-colors">{type}</span>
              </label>
            ))}
            <label className="flex items-center gap-2 cursor-pointer group">
              <input type="checkbox" checked={formState.isOtherCollab} onChange={toggleOther} className="accent-purple-500 w-4 h-4" />
              <span className="text-sm text-gray-300 group-hover:text-white transition-colors">其他</span>
            </label>
          </div>
          {formState.isOtherCollab && <div className="mt-3 pl-6"><input type="text" value={formState.otherCollabText || ''} onChange={e => setFormState({otherCollabText: e.target.value})} placeholder="請輸入您的其他連動類型..." className={inputCls} /></div>}
        </div>
      );
    };

    const ProfileEditorForm = ({ form, updateForm, onSubmit, onCancel, isAdmin, showToast }) => (
      <form onSubmit={onSubmit} className="space-y-6">
        <div className="bg-purple-900/20 border border-purple-500/30 rounded-xl p-5">
          <h3 className="text-purple-400 font-bold mb-3 flex items-center gap-2"><i className="fa-solid fa-power-off"></i> 名片顯示狀態</h3>
          <select value={form.activityStatus} onChange={e=>updateForm({activityStatus: e.target.value})} className={inputCls + " font-bold"}>
            <option value="active">🟢 活躍連動中 (正常公開顯示)</option><option value="sleep">🟡 暫休眠 / 準備期 (隱藏名片)</option><option value="graduated">⚫ 已畢業 / 停止活動 (隱藏名片)</option>
          </select>
          {!isAdmin && <p className="text-xs text-gray-400 mt-3 leading-relaxed">💡 <b>自動隱藏機制</b>：若超過 <b>30天</b> 未登入，系統會自動隱藏名片，再次登入即可恢復！</p>}
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div><label className="block text-sm font-bold text-gray-300 mb-2">VTuber 名稱 <span className="text-red-400">*</span></label><input required type="text" value={form.name} onChange={e=>updateForm({name: e.target.value})} className={inputCls} /></div>
          <div className="grid grid-cols-2 gap-2">
            <div><label className="block text-sm font-bold text-gray-300 mb-2">所屬勢力</label><select value={form.agency} onChange={e=>updateForm({agency: e.target.value})} className={inputCls}><option>個人勢</option><option>企業勢</option><option>社團勢</option></select></div>
            <div><label className="block text-sm font-bold text-gray-300 mb-2">演出型態</label><select value={form.streamingStyle} onChange={e=>updateForm({streamingStyle: e.target.value})} className={inputCls}><option>一般型態</option><option>男聲女皮 (Babiniku)</option><option>女聲男皮</option><option>無性別/人外</option><option>其他</option></select></div>
          </div>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label className="block text-sm font-bold text-gray-300 mb-2">國籍</label>
            <select value={form.nationality || ''} onChange={e=>updateForm({nationality: e.target.value})} className={inputCls}>
              <option value="">未指定</option>
              <option value="台灣">台灣</option>
              <option value="香港">香港</option>
              <option value="馬來西亞">馬來西亞</option>
              <option value="其他">其他（可以自填）</option>
            </select>
            {form.nationality === '其他' && <input type="text" value={form.nationalityOther || ''} onChange={e=>updateForm({nationalityOther: e.target.value})} placeholder="請填寫國籍" className={inputCls + " mt-2"} />}
          </div>
          <div>
            <label className="block text-sm font-bold text-gray-300 mb-2">主要語言</label>
            <select value={form.language || ''} onChange={e=>updateForm({language: e.target.value})} className={inputCls}>
              <option value="">未指定</option>
              <option value="國">國</option>
              <option value="台">台</option>
              <option value="日">日</option>
              <option value="英">英</option>
              <option value="粵">粵</option>
              <option value="其他">其他（可以自填）</option>
            </select>
            {form.language === '其他' && <input type="text" value={form.languageOther || ''} onChange={e=>updateForm({languageOther: e.target.value})} placeholder="請填寫語言(如：日、英)" className={inputCls + " mt-2"} />}
          </div>
        </div>
        <div>
          <label className="block text-sm font-bold text-gray-300 mb-2">介紹一下你自己吧！ <span className="text-red-400">*</span> <span className="text-[10px] text-yellow-400 font-normal ml-1">(為保護您的資安，請勿在此欄位留下真實 Email，使用站內信聯絡最安全！)</span></label>
          <textarea required rows="3" value={form.description} onChange={e=>updateForm({description: e.target.value})} className={inputCls + " resize-none"} />
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div><label className="block text-sm font-bold text-gray-300 mb-2">內容標籤 (逗號分隔)</label><input type="text" value={form.tags} onChange={e=>updateForm({tags: e.target.value})} className={inputCls} /></div>
          <div><label className="block text-sm font-bold text-gray-300 mb-2">主要願意連動類型 (至多選三項) <span className="text-red-400">*</span></label><CollabTypesEditor formState={form} setFormState={updateForm} showToast={showToast} /></div>
        </div>
        <div><label className="block text-sm font-bold text-gray-300 mb-2">可連動時段 (24小時制) <span className="text-red-400">*</span></label><ScheduleEditor form={form} updateForm={updateForm} /></div>
        {isAdmin && (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div><label className="block text-sm font-bold text-gray-300 mb-2">推薦數</label><input type="number" value={form.likes} onChange={e=>updateForm({likes: Number(e.target.value)})} className={inputCls} /></div>
            <div><label className="block text-sm font-bold text-gray-300 mb-2">倒讚數/檢舉數</label><input type="number" value={form.dislikes} onChange={e=>updateForm({dislikes: Number(e.target.value)})} className="w-full bg-red-900/50 border border-red-700 rounded-xl p-3 text-white outline-none text-sm box-border" /></div>
          </div>
        )}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div><label className="block text-sm font-bold text-gray-300 mb-2">YouTube 訂閱數 <span className="text-red-400">*</span></label><input required type="text" value={form.youtubeSubscribers} onChange={e=>updateForm({youtubeSubscribers: e.target.value})} className={inputCls} /></div>
          <div><label className="block text-sm font-bold text-gray-300 mb-2">Twitch 追隨數 <span className="text-red-400">*</span></label><input required type="text" value={form.twitchFollowers} onChange={e=>updateForm({twitchFollowers: e.target.value})} className={inputCls} /></div>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label className="flex items-center justify-between text-sm font-bold text-gray-300 mb-2"><span>YouTube 連結</span><label className="flex items-center gap-1 text-xs cursor-pointer text-purple-300 font-normal"><input type="radio" value="YouTube" checked={form.mainPlatform === 'YouTube'} onChange={e=>updateForm({mainPlatform: e.target.value})} className="accent-purple-500" />主要直播平台</label></label>
            <input type="url" value={form.youtubeUrl} onChange={e=>updateForm({youtubeUrl: e.target.value})} className={inputCls} />
          </div>
          <div>
            <label className="flex items-center justify-between text-sm font-bold text-gray-300 mb-2"><span>Twitch 連結</span><label className="flex items-center gap-1 text-xs cursor-pointer text-purple-300 font-normal"><input type="radio" value="Twitch" checked={form.mainPlatform === 'Twitch'} onChange={e=>updateForm({mainPlatform: e.target.value})} className="accent-purple-500" />主要直播平台</label></label>
            <input type="url" value={form.twitchUrl} onChange={e=>updateForm({twitchUrl: e.target.value})} className={inputCls} />
          </div>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div><label className="block text-sm font-bold text-gray-300 mb-2">X連結</label><input type="url" value={form.xUrl} onChange={e=>updateForm({xUrl: e.target.value})} className={inputCls} /></div>

          ...v, tags: Array.isArray(v.tags) ? v.tags.join(', ') : v.tags || '', collabTypes: standard, isOtherCollab: !!other, otherCollabText: other,

          language: isOtherL ? '其他' : l, languageOther: isOtherL ? l : '',
          isScheduleAnytime: v.isScheduleAnytime || false, isScheduleExcept: v.isScheduleExcept || false, isScheduleCustom: v.isScheduleCustom || false,
          customScheduleText: v.customScheduleText || '', scheduleSlots: v.scheduleSlots || [], youtubeSubscribers: v.youtubeSubscribers || v.subscribers || '',
          twitchFollowers: v.twitchFollowers || '', mainPlatform: v.mainPlatform || 'YouTube', streamStyleUrl: v.streamStyleUrl || '',
          youtubeUrl: v.youtubeUrl || v.channelUrl || '', twitchUrl: v.twitchUrl || '', xUrl: v.xUrl || '', igUrl: v.igUrl || '',
          publicEmail: v.publicEmail || '', contactEmail: privateDocs[v.id]?.contactEmail || '', verificationNote: privateDocs[v.id]?.verificationNote || '', streamingStyle: v.streamingStyle || '一般型態', activityStatus: v.activityStatus || 'active',
          likes: v.likes || 0, dislikes: v.dislikes || 0
        });
      };

      const handleAdminPublish = () => {
        if (!newCollab.dateTime || !newCollab.streamUrl || !newCollab.title) return showToast("請完整填寫！");
        const dt = new Date(newCollab.dateTime);
        onAddCollab({ ...newCollab, date: `${dt.getMonth()+1}/${dt.getDate()} (${['日','一','二','三','四','五','六'][dt.getDay()]})`, time: `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`, startTimestamp: dt.getTime() });
        setNewCollab({ dateTime: '', title: '', streamUrl: '', coverUrl: '', category: '遊戲' });

      return (

                  {rejectedVtubers.length > 0 && <AdminVtuberList title="已退回名單" list={rejectedVtubers} privateDocs={privateDocs} onVerify={onVerifyVtuber} onEdit={handleEditClick} onDelete={onDeleteVtuber} />}

                  <div className="mt-12 pt-6 border-t border-red-500/50"><button onClick={onResetAllCollabTypes} className="bg-red-900 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-bold"><i className="fa-solid fa-bomb mr-2"></i>重置所有人聯動類型</button></div>
                </div>
              )}
              {activeTab === 'bulletins' && (
                <div className="space-y-4">
                  <h3 className="text-xl font-bold text-white mb-4">招募文管理</h3>
                  {(bulletins || []).map(b => <div key={b.id} className="flex justify-between bg-gray-900 p-4 rounded-xl border border-gray-700 gap-4"><div className="flex-1"><p className="text-sm text-gray-300 mb-1">{b.content}</p><p className="text-xs text-gray-500">{b.vtuber?.name} | {b.postedAt}</p></div><button onClick={() => onDeleteBulletin(b.id)} className="text-red-400 bg-red-500/10 px-3 py-1.5 rounded-lg font-bold">刪除</button></div>)}
                </div>
              )}
              {activeTab === 'collabs' && (
                <div className="space-y-6">
                  <div>
                    <h3 className="text-xl font-bold text-white mb-4">新增聯動時間</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                      <div>
                        <label className="text-xs text-gray-400 mb-1 block">聯動類別 <span className="text-red-400">*</span></label>
                        <select required value={newCollab.category} onChange={e=>setNewCollab({...newCollab, category: e.target.value})} className={inputCls}>
                          {COLLAB_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-xs text-gray-400 mb-1 block">聯動時間 (24小時制) <span className="text-red-400">*</span></label>
                        <input type="datetime-local" lang="en-GB" value={newCollab.dateTime} onChange={e=>setNewCollab({...newCollab, dateTime: e.target.value})} className={inputCls} />
                      </div>
                      <div className="relative">
                        <label className="text-xs text-gray-400 mb-1 block">直播連結 <span className="text-red-400">*</span></label>
                        <div className="flex gap-2">
                          <input type="url" placeholder="直播連結..." value={newCollab.streamUrl} onChange={e=>setNewCollab({...newCollab, streamUrl: e.target.value})} className={inputCls} />
                          <button type="button" onClick={() => autoFetchYouTubeInfo(newCollab.streamUrl, (t) => setNewCollab(p => ({...p, title: t})), (c) => setNewCollab(p => ({...p, coverUrl: c})), showToast)} className="bg-gray-700 hover:bg-gray-600 text-white px-4 rounded-xl text-xs font-bold whitespace-nowrap transition-colors"><i className="fa-solid fa-wand-magic-sparkles mr-1"></i>抓取</button>
                        </div>
                      </div>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4"><input type="text" placeholder="聯動標題" value={newCollab.title} onChange={e=>setNewCollab({...newCollab, title: e.target.value})} className={inputCls} /><input type="url" placeholder="自訂封面圖" value={newCollab.coverUrl} onChange={e=>setNewCollab({...newCollab, coverUrl: e.target.value})} className={inputCls} /></div>
                    <button onClick={handleAdminPublish} className="bg-red-600 text-white px-6 py-2 rounded-lg font-bold">發布</button>
                  </div>
                  <div className="border-t border-gray-700 pt-6 space-y-4">
                    <h3 className="text-lg font-bold text-white mb-4">現有清單</h3>
                    {(collabs||[]).map(c => <div key={c.id} className="flex justify-between bg-gray-900 p-4 rounded-xl border border-gray-700"><div><p className="font-bold text-white text-sm">[{c.date} {c.time}] {c.title}</p></div><button onClick={() => onDeleteCollab(c.id)} className="text-red-400 bg-red-500/10 px-3 py-1.5 rounded-lg">刪除</button></div>)}
                  </div>
                </div>
              )}
              {activeTab === 'updates' && (
                <div className="space-y-6">
                  <div>
                    <h3 className="text-xl font-bold text-white mb-4">發布最新消息 / 功能更新</h3>
                    <form onSubmit={(e) => {
                      e.preventDefault();
                      onAddUpdate({
                        title: e.target.updateTitle.value,
                        content: e.target.updateContent.value,
                        date: new Date().toLocaleDateString('zh-TW')
                      });
                      e.target.reset();
                    }}>
                      <div className="mb-4">
                        <label className="text-xs text-gray-400 mb-1 block">標題 <span className="text-red-400">*</span></label>
                        <input required type="text" name="updateTitle" className={inputCls} placeholder="例如：新增站內信功能！" />
                      </div>
                      <div className="mb-4">
                        <label className="text-xs text-gray-400 mb-1 block">內容 <span className="text-red-400">*</span></label>
                        <textarea required name="updateContent" className={inputCls + " resize-none"} rows="4" placeholder="請輸入詳細內容..."></textarea>
                      </div>
                      <div className="flex justify-end">

                      </div>
                    </form>
                  </div>
                  <div className="border-t border-gray-700 pt-6 space-y-4">
                    <h3 className="text-lg font-bold text-white mb-4">歷史公告</h3>
                    {(updates || []).map(u => (
                      <div key={u.id} className="flex flex-col sm:flex-row sm:justify-between bg-gray-900 p-4 rounded-xl border border-gray-700 gap-4">
                        <div className="flex-1 min-w-0">
                          <p className="font-bold text-white text-sm truncate">{u.title} <span className="text-xs text-gray-500 font-normal ml-2">{u.date}</span></p>
                          <p className="text-xs text-gray-400 mt-1 line-clamp-2">{u.content}</p>
                        </div>
                        <button onClick={() => onDeleteUpdate(u.id)} className="text-red-400 bg-red-500/10 px-3 py-1.5 rounded-lg flex-shrink-0 h-fit font-bold self-start">刪除</button>
                      </div>
                    ))}
                    {(updates || []).length === 0 && <p className="text-gray-500 text-sm">目前沒有任何公告</p>}
                  </div>
                </div>
              )}
              {activeTab === 'settings' && (
                <div className="space-y-8">
                  <div><h3 className="text-xl font-bold text-white mb-2">編輯規範</h3><textarea value={editRules} onChange={e=>setEditRules(e.target.value)} className={inputCls+" resize-none"} rows="8" /></div><div className="flex justify-end"><button onClick={() => onSaveSettings(undefined, editRules)} className="bg-red-600 text-white px-8 py-2.5 rounded-xl font-bold">儲存規範</button></div>
                  <div><h3 className="text-xl font-bold text-white mb-2">編輯小技巧</h3><textarea value={editTips} onChange={e=>setEditTips(e.target.value)} className={inputCls+" resize-none"} rows="8" /></div><div className="flex justify-end"><button onClick={() => onSaveSettings(editTips, undefined)} className="bg-red-600 text-white px-8 py-2.5 rounded-xl font-bold">儲存小技巧</button></div>
                </div>
              )}
            </div>
          </div>
          {editingVtuber && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-2xl flex flex-col max-h-[90vh] shadow-2xl animate-fade-in-up">
                <div className="sticky top-0 bg-gray-900/95 backdrop-blur px-6 py-4 border-b border-gray-800 flex justify-between items-center z-10"><h3 className="font-bold text-white"><i className="fa-solid fa-pen-to-square mr-2"></i>強制編輯：{editingVtuber.name}</h3><button onClick={() => setEditingVtuber(null)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button></div>
                <div className="p-6 overflow-y-auto"><ProfileEditorForm form={editingVtuber} updateForm={(updates) => setEditingVtuber(prev => ({...prev, ...updates}))} onSubmit={(e)=>{ e.preventDefault(); onUpdateVtuber(editingVtuber.id, editingVtuber); setEditingVtuber(null); }} onCancel={() => setEditingVtuber(null)} isAdmin={true} showToast={showToast} /></div>
              </div>
            </div>
          )}
        </>
      );
    };

    // --- 主應用程式 ---
    function App() {
      // 改進：分析 URL hash 支援專屬網址
      const getInitialView = () => { 
        const hash = window.location.hash.replace('#', ''); 
        if (hash.startsWith('profile/')) return 'profile';
        return hash === 'profile' ? 'grid' : (hash || 'home'); 
      };
      
      const [currentView, setCurrentView] = useState(getInitialView());
      const [selectedVTuber, setSelectedVTuber] = useState(null);
      const [profileIdFromHash, setProfileIdFromHash] = useState(() => {
        const hash = window.location.hash.replace('#', '');
        return hash.startsWith('profile/') ? hash.split('/')[1] : null;
      });

      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [isMobileFilterOpen, setIsMobileFilterOpen] = useState(false);
      const [sortOrder, setSortOrder] = useState('random'); 
      const [isLoading, setIsLoading] = useState(true);
      const [currentTime, setCurrentTime] = useState(Date.now());
      const [siteStats, setSiteStats] = useState({ pageViews: null });
      
      const [user, setUser] = useState(null);
      const [realVtubers, setRealVtubers] = useState([]);
      const [privateDocs, setPrivateDocs] = useState({}); // 儲存私密資料 (管理員用)
      const [realBulletins, setRealBulletins] = useState([]);
      const [realCollabs, setRealCollabs] = useState([]);
      const [realUpdates, setRealUpdates] = useState([]); // 最新消息

      const [searchQuery, setSearchQuery] = useState('');
      const [selectedTags, setSelectedTags] = useState([]);
      const [selectedAgency, setSelectedAgency] = useState('All');
      const [selectedPlatform, setSelectedPlatform] = useState('All');
      const [selectedNationality, setSelectedNationality] = useState('All');
      const [selectedLanguage, setSelectedLanguage] = useState('All');
      const [selectedSchedule, setSelectedSchedule] = useState('All'); // 新增可連動時段篩選
      const [collabCategoryTab, setCollabCategoryTab] = useState('All'); // 確定聯動時間表分類
      
      const [isCollabModalOpen, setIsCollabModalOpen] = useState(false);
      const [isRulesModalOpen, setIsRulesModalOpen] = useState(false);
      const [isTipsModalOpen, setIsTipsModalOpen] = useState(false);
      const [isUpdatesModalOpen, setIsUpdatesModalOpen] = useState(false);
      const [confirmDislikeData, setConfirmDislikeData] = useState(null);
      const [copiedTemplate, setCopiedTemplate] = useState(false);
      
      const [newBulletin, setNewBulletin] = useState({ content: '', collabType: '', collabTypeOther: '', collabSize: '', collabTime: '', recruitEndTime: '' });
      const [inviteMessage, setInviteMessage] = useState(''); 
      const [realNotifications, setRealNotifications] = useState([]);
      const [isNotifOpen, setIsNotifOpen] = useState(false);
      const notifRef = useRef(null);
      const gridScrollY = useRef(0);
      const [currentPage, setCurrentPage] = useState(1);

      // 新增：前端建立聯動時間表的獨立表單狀態
      const [publicCollabForm, setPublicCollabForm] = useState({ dateTime: '', title: '', streamUrl: '', coverUrl: '', category: '遊戲' });

      // --- 新增：最新消息已讀狀態追蹤 ---
      const [readUpdateIds, setReadUpdateIds] = useState(() => {
        try { return JSON.parse(localStorage.getItem('readUpdates') || '[]'); } catch { return []; }
      });
      const hasUnreadUpdates = realUpdates.some(u => !readUpdateIds.includes(u.id));

      const handleMarkAllUpdatesRead = () => {
        const allIds = realUpdates.map(u => u.id);
        setReadUpdateIds(allIds);
        localStorage.setItem('readUpdates', JSON.stringify(allIds));
        showToast("✅ 已全部標示為已讀");
      };

      const [realTips, setRealTips] = useState("您好，我是 [您的名字/頻道名]。\n想請問近期是否有機會邀請您一起進行 [企劃名稱/遊戲] 的連動呢？");
      const [realRules, setRealRules] = useState("如果聯動的V朋朋有負面行為，請在他的名片按倒讚。只要超過 10 個倒讚即會自動下架。");
      const [toastMsg, setToastMsg] = useState('');
      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };

      const getEmptyProfile = (uid) => ({
        name: '', agency: '個人勢', tags: '', description: '', avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${uid || Math.random()}&backgroundColor=b6e3f4`, banner: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&q=80&w=1000',
        nationality: '', nationalityOther: '', language: '', languageOther: '',
        isScheduleAnytime: false, isScheduleExcept: false, isScheduleCustom: false, customScheduleText: '', scheduleSlots: [], collabTypes: [], isOtherCollab: false, otherCollabText: '', streamingStyle: '一般型態', activityStatus: 'active', 
        youtubeSubscribers: '', twitchFollowers: '', youtubeUrl: '', twitchUrl: '', mainPlatform: 'YouTube', streamStyleUrl: '', xUrl: '', igUrl: '', publicEmail: '', contactEmail: '', verificationNote: ''
      });
      const [profileForm, setProfileForm] = useState(getEmptyProfile());

      const isAdmin = user && user.email === 'apex.dasa@gmail.com';
      const myProfile = user ? realVtubers.find(v => v.id === user.uid) : null;
      const isVerifiedUser = isAdmin || (myProfile?.isVerified && !myProfile?.isBlacklisted && myProfile?.activityStatus === 'active');

      const navigate = (view, preserveScroll = false) => { 
        window.location.hash = view; 
        setIsMobileMenuOpen(false); 
        if (!preserveScroll) window.scrollTo(0,0); 
      };
      const goToBulletin = () => { if(!isVerifiedUser) { showToast("請先認證名片解鎖功能"); navigate('dashboard'); } else navigate('bulletin'); };

      const pendingVtubersCount = useMemo(() => realVtubers.filter(v => !v.isVerified && !v.isBlacklisted && v.verificationStatus !== 'rejected').length, [realVtubers]);

      // 監聽網址 Hash 變化，處理專屬名片跳轉
      useEffect(() => {
        const handleHashChange = () => { 
          const hash = window.location.hash.replace('#', ''); 
          if (hash.startsWith('profile/')) {
            setProfileIdFromHash(hash.split('/')[1]);
            setCurrentView('profile');
          } else {
            setProfileIdFromHash(null);
            setCurrentView(hash === 'profile' ? 'grid' : (hash || 'home'));
          }
        };
        handleHashChange(); // 首次載入時解析一次
        window.addEventListener('hashchange', handleHashChange); 
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      // 根據專屬 ID 解析並設定對應的 VTuber 名片
      useEffect(() => {
        if (currentView === 'profile' && profileIdFromHash && !isLoading) {
          const vt = realVtubers.find(v => v.id === profileIdFromHash);
          if (vt) {
            setSelectedVTuber(vt);
          } else {
            showToast("找不到該名片，可能已被隱藏或刪除");
            navigate('grid');
          }
        }
      }, [currentView, profileIdFromHash, realVtubers, isLoading]);

      useEffect(() => {
        const handleClickOutside = (e) => { if (notifRef.current && !notifRef.current.contains(e.target)) setIsNotifOpen(false); };
        document.addEventListener("mousedown", handleClickOutside); return () => document.removeEventListener("mousedown", handleClickOutside);
      }, [notifRef]);

      useEffect(() => {
        const unsubscribeAuth = onAuthStateChanged(auth, (u) => { setUser(u); setProfileForm(getEmptyProfile(u?.uid)); });
        const timer = setInterval(() => setCurrentTime(Date.now()), 60000);
        return () => { unsubscribeAuth(); clearInterval(timer); };
      }, []);

      // 監聽自己的私密資料 (供編輯名片時載入)
      useEffect(() => {
        if (user && user.uid) {
           const unsubPrivate = onSnapshot(doc(db, getPath('vtubers_private'), user.uid), (docSnap) => {
              if (docSnap.exists()) {
                 const data = docSnap.data();
                 setProfileForm(prev => ({...prev, contactEmail: data.contactEmail || '', verificationNote: data.verificationNote || ''}));
              }
           }, (err) => console.error("讀取個人私密資料失敗:", err));
           updateDoc(doc(db, getPath('vtubers'), user.uid), { lastActiveAt: Date.now() }).catch(()=>{});
           return () => unsubPrivate();
        }
      }, [user?.uid]);

      // 管理員監聽所有私密資料 (為了審核時看到備註)
      useEffect(() => {
        if (isAdmin) {
          const unsub = onSnapshot(collection(db, getPath('vtubers_private')), (snap) => {
            const pDocs = {}; snap.docs.forEach(d => pDocs[d.id] = d.data()); setPrivateDocs(pDocs);
          }, (err) => console.error("讀取 vtubers_private 失敗:", err));
          return () => unsub();
        }
      }, [isAdmin]);

      useEffect(() => {
        const statsRef = doc(db, getPath('settings'), 'stats');
        updateDoc(statsRef, { pageViews: increment(1) }).catch(() => setDoc(statsRef, { pageViews: 1 }, { merge: true }));
        return onSnapshot(statsRef, (docSnap) => { if (docSnap.exists()) setSiteStats(docSnap.data()); }, (err) => console.error("讀取 stats 失敗:", err));
      }, []);

      useEffect(() => {
        setIsLoading(true); 
        const unsubV = onSnapshot(collection(db, getPath('vtubers')), (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() })); setRealVtubers(data); setIsLoading(false); 
          if(user) {
            const cp = data.find(v => v.id === user.uid);
            if (cp) {
              const PREDEFINED_NATIONALITIES = ['台灣', '香港', '馬來西亞'];
              const PREDEFINED_LANGUAGES = ['國', '台', '日', '英', '粵'];
              const n = cp.nationality || '';
              const isOtherN = n && !PREDEFINED_NATIONALITIES.includes(n);
              const l = cp.language || '';
              const isOtherL = l && !PREDEFINED_LANGUAGES.includes(l);

              const stdTypes = (cp.collabTypes||[]).filter(t => PREDEFINED_COLLABS.includes(t));
              const othType = (cp.collabTypes||[]).filter(t => !PREDEFINED_COLLABS.includes(t))[0] || '';
              
              setProfileForm(prev => ({
                ...prev, ...cp, name: cp.name || prev.name, description: cp.description || prev.description, tags: Array.isArray(cp.tags) ? cp.tags.join(', ') : cp.tags || '',
                nationality: isOtherN ? '其他' : n, nationalityOther: isOtherN ? n : '',
                language: isOtherL ? '其他' : l, languageOther: isOtherL ? l : '',
                collabTypes: stdTypes, isOtherCollab: !!othType, otherCollabText: othType, isScheduleAnytime: cp.isScheduleAnytime || false, isScheduleExcept: cp.isScheduleExcept || false, isScheduleCustom: cp.isScheduleCustom || false, customScheduleText: cp.customScheduleText || '',
                scheduleSlots: cp.scheduleSlots || [], streamingStyle: cp.streamingStyle || prev.streamingStyle, activityStatus: cp.activityStatus || prev.activityStatus,
                youtubeSubscribers: cp.youtubeSubscribers || cp.subscribers || '', twitchFollowers: cp.twitchFollowers || '', youtubeUrl: cp.youtubeUrl || cp.channelUrl || '', twitchUrl: cp.twitchUrl || '', mainPlatform: cp.mainPlatform || 'YouTube', streamStyleUrl: cp.streamStyleUrl || '', xUrl: cp.xUrl || '', igUrl: cp.igUrl || '', publicEmail: cp.publicEmail || ''
              }));
            }
          }

                                  <i className="fa-brands fa-twitch"></i> Twitch

                                </a>

                                  <span className="ml-1 px-2 py-0.5 bg-purple-500/10 rounded text-xs">{selectedVTuber.twitchFollowers}</span>
                                </span>
                              ) : null}

                              {selectedVTuber.igUrl && <a href={selectedVTuber.igUrl} target="_blank" rel="noopener noreferrer" className="bg-pink-500/10 text-pink-400 hover:bg-pink-500/20 px-3 py-1.5 rounded-lg font-bold transition-colors flex items-center gap-1.5"><i className="fa-brands fa-instagram"></i> IG</a>}

                         </div>

                     </form>
                   </div>

                       ))}
                     </div>
                     
                     {filteredDisplayCollabs.length === 0 ? (
