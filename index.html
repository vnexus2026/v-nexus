<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V-Nexus | 專為 VTuber 打造的聯動平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #0f111a; color: #f3f4f6; font-family: sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f111a; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    @keyframes radarSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-radar { animation: radarSpin 2s linear infinite; }
  </style>
</head>
<body class="selection:bg-purple-500 selection:text-white m-0 p-0 overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc, updateDoc, increment, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useMemo, useRef } = React;

    const firebaseConfig = { apiKey: "AIzaSyD_JJZUcT56VkHFH0ykBRJQ_nFLK_4p7kY", authDomain: "v-nexus.firebaseapp.com", projectId: "v-nexus", storageBucket: "v-nexus.firebasestorage.app", messagingSenderId: "824125737901", appId: "1:824125737901:web:93a4f21b56ab00dfaaaf24" };
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
    const provider = new GoogleAuthProvider(); const getPath = (c) => `artifacts/v-nexus-official/public/data/${c}`;

    const PREDEFINED_COLLABS = ['APEX', '瓦羅蘭', 'LOL', 'FPS', 'Minecraft', '合作遊戲', '企劃', '歌回', '雜談'];
    const inputCls = "w-full min-w-0 box-border bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none text-sm";
    const btnCls = "w-full sm:w-auto bg-purple-600 hover:bg-purple-500 text-white py-3 px-8 rounded-xl font-bold shadow-lg transition-transform hover:scale-105 flex justify-center items-center gap-2";

    const formatTime = (ts) => { if (!ts) return "剛剛"; const d = new Date(ts); return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
    const formatDt = (dtStr) => { if (!dtStr) return '未指定'; const d = new Date(dtStr); if (isNaN(d.getTime())) return dtStr; return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
    const formatSchedule = (v) => { if (v.isScheduleAnytime) return "隨時可約"; if (v.isScheduleCustom && v.customScheduleText) return v.customScheduleText; if (v.isScheduleExcept && v.scheduleSlots?.length > 0) return "除了：" + v.scheduleSlots.map(s => `${s.day} ${s.start}~${s.end}`).join('、') + " 皆可"; if (v.scheduleSlots?.length > 0) return v.scheduleSlots.map(s => `${s.day} ${s.start}~${s.end}`).join('、'); return '未提供時段'; };
    const getYTThumb = (url) => { if (!url || typeof url !== 'string') return null; const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/); return (match && match[2].length === 11) ? `https://img.youtube.com/vi/${match[2]}/maxresdefault.jpg` : null; };
    const parseSubs = (v) => { const ps = (str) => { if (!str) return 0; let s = String(str); let num = parseFloat(s.replace(/[^0-9.]/g, '')); if (isNaN(num)) return 0; if (s.toUpperCase().includes('K')) num *= 1000; if (s.toUpperCase().includes('M')) num *= 1000000; if (s.toUpperCase().includes('萬')) num *= 10000; return num; }; return ps(v.youtubeSubscribers || v.subscribers) + ps(v.twitchFollowers); };
    const isVisible = (v, u) => { if (!v) return false; if (u && v.id === u.uid) return true; if (!v.isVerified || v.isBlacklisted || v.activityStatus === 'sleep' || v.activityStatus === 'graduated') return false; if (Date.now() - (v.lastActiveAt || v.updatedAt || v.createdAt || Date.now()) > 30 * 24 * 60 * 60 * 1000) return false; return true; };

    // --- 極致瘦身共用 UI 元件 ---
    const TagBadge = ({ text, onClick, sel }) => <span onClick={onClick} className={`px-3 py-1 rounded-full text-xs font-medium cursor-pointer transition-colors border ${sel ? 'bg-purple-600 text-white border-purple-500' : 'bg-gray-800 text-gray-300 border-gray-700 hover:text-white'}`}>{text}</span>;
    const SocialLink = ({ url, icon, color }) => url && url !== '#' ? <a href={url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} className={`bg-${color}-500/20 text-${color}-400 hover:bg-${color}-500 hover:text-white px-2.5 py-1.5 rounded-lg transition-colors flex items-center justify-center flex-shrink-0`}><i className={`fa-brands fa-${icon} text-sm`}></i></a> : null;
    const FormGrp = ({ l, req, children }) => <div><label className="block text-xs text-gray-400 mb-1">{l} {req && <span className="text-red-400">*</span>}</label>{children}</div>;
    const Modal = ({ title, icon, onClose, children, maxW="max-w-2xl" }) => (
      <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div className={`bg-gray-900 border border-gray-700 rounded-2xl w-full ${maxW} shadow-2xl animate-fade-in-up flex flex-col max-h-[90vh]`}>
          <div className="px-6 py-5 border-b border-gray-800 flex justify-between items-center bg-gray-800/30"><h3 className="font-bold text-white text-lg flex items-center gap-2">{icon && <i className={`fa-solid ${icon}`}></i>} {title}</h3><button onClick={onClose} className="text-gray-400 hover:text-white transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button></div>
          <div className="p-6 overflow-y-auto">{children}</div>
        </div>
      </div>
    );

    // --- 卡片元件 ---
    const CollabCard = ({ c, isLive, isAdmin, user, onDelete }) => {
      if (!c) return null; const img = c.coverUrl || getYTThumb(c.streamUrl) || 'https://images.unsplash.com/photo-1598550476439-6847785fcea6?auto=format&fit=crop&q=80&w=800';
      return (
        <div className={`group ${isLive ? 'bg-red-950/40 border-red-500 shadow-[0_0_30px_rgba(220,38,38,0.4)] scale-[1.02] z-10' : 'bg-gray-800/60 border-gray-700 hover:border-red-500/50'} border-2 rounded-3xl overflow-hidden flex flex-col transition-all relative w-full`}>
          {isLive && <div className="absolute top-0 left-0 w-full bg-red-600 text-white text-center py-1.5 font-bold text-xs tracking-widest z-30 animate-pulse"><i className="fa-solid fa-satellite-dish mr-2"></i> 正在進行聯動中</div>}
          {onDelete && (isAdmin || (user && c.userId === user.uid)) && <button onClick={()=>onDelete(c.id)} className={`absolute ${isLive?'top-10':'top-4'} right-4 z-20 bg-black/60 text-gray-300 hover:text-red-400 p-2 rounded-lg`}><i className="fa-solid fa-trash"></i></button>}
          <div className={`h-48 relative overflow-hidden flex-shrink-0 ${isLive ? 'mt-8' : ''}`}><img src={img} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" /><div className="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/20 to-transparent"></div><div className="absolute top-4 left-4 bg-black/80 backdrop-blur-md border border-gray-600 text-white px-3 py-1.5 rounded-xl shadow-lg transform -rotate-2"><span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5 block">{c.date}</span><span className="text-sm text-red-400 font-extrabold">{c.time}</span></div></div>
          <div className="p-6 flex-1 flex flex-col relative z-10 bg-gray-900/80"><h3 className={`text-xl font-extrabold mb-6 line-clamp-2 ${isLive?'text-red-400':'text-white group-hover:text-red-400'}`}>{c.title}</h3><div className="mt-auto">{c.streamUrl ? <a href={c.streamUrl} target="_blank" className={`w-full ${isLive?'bg-red-500 animate-pulse':'bg-red-600 hover:bg-red-500'} text-white py-3.5 rounded-xl font-bold flex justify-center items-center gap-2`}><i className="fa-solid fa-play-circle text-lg"></i> 觀看直播</a> : <div className="w-full bg-gray-800 text-gray-500 py-3.5 rounded-xl font-bold flex justify-center items-center gap-2"><i className="fa-solid fa-clock"></i> 連結未提供</div>}</div></div>
        </div>
      );
    };

    const VTuberCard = ({ v, user, isVerified, onSelect, onDislike }) => (
      <div onClick={onSelect} className={`group bg-gray-800/40 border ${!v.isVerified?'border-yellow-500/50':'border-gray-700/50'} rounded-2xl overflow-hidden cursor-pointer hover:border-purple-500/50 transition-all hover:-translate-y-1 flex flex-col relative`}>
        <div className="absolute top-2 left-2 z-10 flex gap-1">{!v.isVerified && <div className="bg-yellow-500 text-black text-[10px] font-bold px-2 py-0.5 rounded">待審核</div>}{v.activityStatus === 'sleep' && <div className="bg-gray-600 text-white text-[10px] font-bold px-2 py-0.5 rounded">休眠中</div>}<div className={`text-white text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-1 ${v.mainPlatform==='Twitch'?'bg-purple-600':'bg-red-600'}`}><i className={`fa-brands fa-${v.mainPlatform==='Twitch'?'twitch':'youtube'}`}></i> {v.mainPlatform||'YouTube'}</div></div>
        <div className="h-24 relative overflow-hidden flex-shrink-0"><img src={v.banner} className="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform" /><span className="absolute top-2 right-2 px-2 py-0.5 text-[10px] font-bold bg-black/50 border border-gray-600 rounded text-white">{v.agency}</span></div>
        <div className="p-4 relative flex-1 flex flex-col"><img src={v.avatar} className="absolute -top-8 w-16 h-16 rounded-xl border-2 border-gray-800 bg-gray-900 object-cover" />
          <div className="ml-20 mb-3"><h3 className="font-bold text-white truncate flex items-center gap-1">{v.name} {v.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-xs"></i>}</h3><div className="flex flex-wrap gap-2 text-xs mt-1 text-gray-400">{(v.youtubeSubscribers||v.subscribers) && <span className="flex items-center gap-1"><i className="fa-brands fa-youtube text-red-400"></i> {v.youtubeSubscribers||v.subscribers||'未公開'}</span>}{(v.twitchFollowers||v.twitchUrl) && <span className="flex items-center gap-1"><i className="fa-brands fa-twitch text-purple-400"></i> {v.twitchFollowers||'未公開'}</span>}<span className="flex items-center gap-1 text-green-400"><i className="fa-solid fa-thumbs-up"></i> {v.likes||0}</span></div></div>
          <p className="text-xs text-gray-400 line-clamp-2 h-8">{v.description}</p>
          {v.streamStyleUrl && <div className="mt-1 mb-1"><a href={v.streamStyleUrl} target="_blank" rel="noopener noreferrer" onClick={(e)=>e.stopPropagation()} className="inline-flex items-center gap-1 text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded w-fit font-bold"><i className="fa-solid fa-video"></i> 觀看代表作</a></div>}
          <div className="mt-auto pt-2 border-t border-gray-700/50 text-xs text-gray-400 flex items-center justify-between"><div className="flex items-center gap-1.5 min-w-0 pr-2"><i className="fa-solid fa-clock text-purple-400"></i> <span className="truncate">{formatSchedule(v)}</span></div>{isVerified && v.id!==user?.uid && <button onClick={(e)=>{e.stopPropagation(); onDislike(v);}} className="bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white px-2 py-1 rounded"><i className="fa-solid fa-thumbs-down text-[10px]"></i></button>}</div>
          <div className="mt-2 pt-2 border-t border-gray-700/50 flex gap-2"><SocialLink url={v.youtubeUrl||v.channelUrl} icon="youtube" color="red" /><SocialLink url={v.twitchUrl} icon="twitch" color="purple" /><SocialLink url={v.xUrl} icon="x-twitter" color="blue" /><SocialLink url={v.igUrl} icon="instagram" color="pink" /></div>
        </div>
      </div>
    );

    const BulletinCard = ({ b, user, isVerified, onNavigate, onApply, onInvite }) => {
      const isAuthor = user?.uid === b.userId; const hasApplied = (b.applicants||[]).includes(user?.uid);
      return (
        <div className="bg-gray-800/60 border border-gray-700 rounded-3xl overflow-hidden flex flex-col shadow-lg group">
          <div className="bg-gray-900/80 p-5 border-b border-gray-700 flex items-start gap-4"><img src={b.vtuber.avatar} onClick={()=>onNavigate(b.vtuber)} className="w-14 h-14 rounded-full border-2 border-purple-500/50 object-cover cursor-pointer hover:scale-105" /><div className="flex-1 flex justify-between items-start gap-2"><div><div className="flex items-center gap-2 mb-1"><span className="text-purple-400 font-bold text-[10px] bg-purple-500/10 px-2 py-0.5 rounded">發起人</span><span onClick={()=>onNavigate(b.vtuber)} className="font-extrabold text-white text-lg hover:text-purple-400 cursor-pointer">{b.vtuber.name}</span>{b.vtuber.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-sm"></i>}</div><div className="flex items-center gap-2 mt-1.5"><span className="text-[10px] text-gray-400">{b.vtuber.agency} • {b.postedAt} 發布</span></div></div><div className="flex gap-2"><SocialLink url={b.vtuber.youtubeUrl||b.vtuber.channelUrl} icon="youtube" color="red" /><SocialLink url={b.vtuber.twitchUrl} icon="twitch" color="purple" /></div></div></div>
          <div className="p-6 flex-1 flex flex-col"><p className="text-gray-200 text-base mb-6 leading-relaxed whitespace-pre-wrap">{b.content}</p>
            <div className="grid grid-cols-2 gap-3 mt-auto mb-4">
              <div className="bg-gray-900/50 p-3 rounded-xl flex flex-col"><span className="text-[10px] text-gray-500 mb-1"><i className="fa-solid fa-gamepad"></i> 性質</span><span className="text-sm font-bold text-gray-200">{b.collabType || '未指定'}</span></div>
              <div className="bg-gray-900/50 p-3 rounded-xl flex flex-col"><span className="text-[10px] text-gray-500 mb-1"><i className="fa-solid fa-users"></i> 人數</span><span className="text-sm font-bold text-gray-200">{b.collabSize || '未指定'}</span></div>
              <div className="bg-gray-900/50 p-3 rounded-xl flex flex-col"><span className="text-[10px] text-gray-500 mb-1"><i className="fa-regular fa-calendar"></i> 時間</span><span className="text-sm font-bold text-gray-200">{formatDt(b.collabTime)}</span></div>
              <div className="bg-red-500/5 p-3 rounded-xl border border-red-500/20 flex flex-col"><span className="text-[10px] text-red-400/80 mb-1"><i className="fa-solid fa-hourglass-half"></i> 截止</span><span className="text-sm font-bold text-red-300">{b.recruitEndTime ? formatTime(b.recruitEndTime) : '未指定'}</span></div>
            </div>
            <div className="mt-4 pt-4 border-t border-gray-700/50">
              {isAuthor ? (
                <div><p className="text-xs text-purple-400 font-bold mb-3 flex items-center gap-2"><i className="fa-solid fa-users"></i> 有意願的創作者 ({b.applicantsData?.length || 0})</p>{b.applicantsData?.length > 0 ? <div className="flex flex-wrap gap-2">{b.applicantsData.map(a => <div key={a.id} className="flex items-center bg-gray-900 p-1.5 pr-2 rounded-lg border border-gray-700 hover:border-purple-500/50"><img src={a.avatar} onClick={()=>onNavigate(a)} className="w-7 h-7 rounded-full cursor-pointer object-cover" /><span onClick={()=>onNavigate(a)} className="text-xs text-gray-300 ml-2 cursor-pointer hover:text-white font-bold max-w-[100px] truncate">{a.name}</span><button onClick={()=>onInvite(a)} className="ml-3 bg-purple-600 hover:bg-purple-500 text-[10px] text-white px-2.5 py-1.5 rounded">邀請</button></div>)}</div> : <p className="text-[10px] text-gray-500">目前還沒有人表達意願喔！</p>}</div>
              ) : (
                <div className="flex items-center justify-between"><div className="flex items-center gap-2"><span className="text-xs text-gray-400">目前 {b.applicantsData?.length||0} 人有意願</span><div className="flex -space-x-2">{b.applicantsData?.slice(0,3).map(a => <img key={a.id} src={a.avatar} onClick={()=>onNavigate(a)} className="w-6 h-6 rounded-full ring-2 ring-gray-800 cursor-pointer object-cover" />)}{b.applicantsData?.length > 3 && <div className="flex h-6 w-6 items-center justify-center rounded-full bg-gray-800 ring-2 ring-gray-900 text-[10px] text-gray-300">+{b.applicantsData.length - 3}</div>}</div></div>
                {isVerified && <button onClick={()=>onApply(b, !hasApplied)} className={`text-xs font-bold px-4 py-2 rounded-xl transition-transform hover:scale-105 ${hasApplied?'bg-gray-700 text-gray-300':'bg-purple-600 text-white'}`}>{hasApplied?'收回意願':'✋ 我有意願'}</button>}</div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // --- 編輯表單共用邏輯 ---
    const ProfileEditorForm = ({ form, updateForm, onSubmit, onCancel, isAdmin, showToast }) => {
      const mode = form.isScheduleAnytime ? 'anytime' : form.isScheduleExcept ? 'except' : form.isScheduleCustom ? 'custom' : 'specific';
      const handleMode = (e) => { const m=e.target.value; updateForm({ isScheduleAnytime:m==='anytime', isScheduleExcept:m==='except', isScheduleCustom:m==='custom' }); };
      const toggleCollab = (t) => { let n = [...(form.collabTypes||[])]; if(n.includes(t)) n=n.filter(x=>x!==t); else { if(n.length+(form.isOtherCollab?1:0)>=3) return showToast("至多三項！"); n.push(t); } updateForm({collabTypes: n}); };
      
      return (
        <form onSubmit={onSubmit} className="space-y-6">
          <div className="bg-purple-900/20 border border-purple-500/30 rounded-xl p-5"><h3 className="text-purple-400 font-bold mb-3 flex items-center gap-2"><i className="fa-solid fa-power-off"></i> 名片顯示狀態</h3><select value={form.activityStatus} onChange={e=>updateForm({activityStatus: e.target.value})} className={inputCls + " font-bold"}><option value="active">🟢 活躍連動中 (正常公開顯示)</option><option value="sleep">🟡 暫休眠 / 準備期 (隱藏名片)</option><option value="graduated">⚫ 已畢業 / 停止活動 (隱藏名片)</option></select>{!isAdmin && <p className="text-xs text-gray-400 mt-3 leading-relaxed">💡 若超過 30天 未登入，系統會自動隱藏名片，再次登入即可恢復！</p>}</div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6"><FormGrp l="VTuber 名稱" req><input required type="text" value={form.name} onChange={e=>updateForm({name: e.target.value})} className={inputCls} /></FormGrp><div className="grid grid-cols-2 gap-2"><FormGrp l="所屬勢力"><select value={form.agency} onChange={e=>updateForm({agency: e.target.value})} className={inputCls}><option>個人勢</option><option>企業勢</option><option>社團勢</option></select></FormGrp><FormGrp l="演出型態"><select value={form.streamingStyle} onChange={e=>updateForm({streamingStyle: e.target.value})} className={inputCls}><option>一般型態</option><option>男聲女皮 (Babiniku)</option><option>女聲男皮</option><option>無性別/人外</option><option>其他</option></select></FormGrp></div></div>
          <FormGrp l="介紹一下你自己吧！" req><textarea required rows="3" value={form.description} onChange={e=>updateForm({description: e.target.value})} className={inputCls + " resize-none"} /></FormGrp>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6"><FormGrp l="內容標籤 (逗號分隔)"><input type="text" value={form.tags} onChange={e=>updateForm({tags: e.target.value})} className={inputCls} /></FormGrp><FormGrp l="主要願意連動類型 (至多選三項)" req><div className="bg-gray-900 border border-gray-700 rounded-xl p-4 mt-1"><div className="flex flex-wrap gap-3">{PREDEFINED_COLLABS.map(t => <label key={t} className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={(form.collabTypes||[]).includes(t)} onChange={()=>toggleCollab(t)} className="accent-purple-500 w-4 h-4"/><span className="text-sm text-gray-300">{t}</span></label>)}<label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={form.isOtherCollab} onChange={()=>updateForm({isOtherCollab:!form.isOtherCollab})} className="accent-purple-500 w-4 h-4"/><span className="text-sm text-gray-300">其他</span></label></div>{form.isOtherCollab && <input type="text" value={form.otherCollabText||''} onChange={e=>updateForm({otherCollabText: e.target.value})} placeholder="請輸入..." className="w-full bg-gray-800 border border-gray-600 rounded-lg p-2 text-white text-sm mt-3 outline-none" />}</div></FormGrp></div>
          <FormGrp l="可連動時段" req><div className="bg-gray-900 border border-gray-700 rounded-xl p-4 mt-1"><select value={mode} onChange={handleMode} className={inputCls}><option value="specific">✔️ 指定時段</option><option value="except">❌ 除了以下時段皆可</option><option value="custom">✍️ 自訂時間</option><option value="anytime">🌟 隨時可約</option></select>{mode==='custom' && <input type="text" value={form.customScheduleText||''} onChange={e=>updateForm({customScheduleText:e.target.value})} placeholder="例如：每個月底週末..." className={inputCls+" mt-3"} />}{(mode==='specific'||mode==='except') && <div className="space-y-3 mt-3">{(form.scheduleSlots||[]).map((s, i)=><div key={i} className="flex flex-wrap items-center gap-2 bg-gray-800/50 p-2 rounded-lg border border-gray-700"><select value={s.day} onChange={e=>{const n=[...(form.scheduleSlots||[])];n[i].day=e.target.value;updateForm({scheduleSlots:n});}} className="bg-gray-800 border border-gray-600 rounded p-1.5 text-white text-xs">{['星期一','星期二','星期三','星期四','星期五','星期六','星期日','平日','週末','每日'].map(d=><option key={d} value={d}>{d}</option>)}</select><input type="time" value={s.start} onChange={e=>{const n=[...(form.scheduleSlots||[])];n[i].start=e.target.value;updateForm({scheduleSlots:n});}} className="bg-gray-800 rounded p-1.5 text-white text-xs" /><span className="text-gray-400 text-xs">至</span><input type="time" value={s.end} onChange={e=>{const n=[...(form.scheduleSlots||[])];n[i].end=e.target.value;updateForm({scheduleSlots:n});}} className="bg-gray-800 rounded p-1.5 text-white text-xs" /><button type="button" onClick={()=>updateForm({scheduleSlots:form.scheduleSlots.filter((_,idx)=>idx!==i)})} className="text-red-400 ml-auto px-2"><i className="fa-solid fa-trash"></i></button></div>)}<button type="button" onClick={()=>updateForm({scheduleSlots:[...(form.scheduleSlots||[]),{day:'星期一',start:'20:00',end:'22:00'}]})} className="text-xs text-purple-400 bg-purple-500/10 px-3 py-1.5 rounded-lg mt-2"><i className="fa-solid fa-plus"></i> 新增時段</button></div>}</div></FormGrp>
          {isAdmin && <div className="grid grid-cols-1 md:grid-cols-2 gap-6"><FormGrp l="推薦數"><input type="number" value={form.likes} onChange={e=>updateForm({likes: Number(e.target.value)})} className={inputCls} /></FormGrp><FormGrp l="倒讚數"><input type="number" value={form.dislikes} onChange={e=>updateForm({dislikes: Number(e.target.value)})} className="w-full bg-red-900/50 border border-red-700 rounded-xl p-3 text-white outline-none text-sm box-border" /></FormGrp></div>}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6"><FormGrp l="YouTube 訂閱數" req><input required type="text" value={form.youtubeSubscribers} onChange={e=>updateForm({youtubeSubscribers: e.target.value})} className={inputCls} /></FormGrp><FormGrp l="Twitch 追隨數" req><input required type="text" value={form.twitchFollowers} onChange={e=>updateForm({twitchFollowers: e.target.value})} className={inputCls} /></FormGrp></div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6"><div><label className="flex items-center justify-between text-sm font-bold text-gray-300 mb-2"><span>YouTube 連結</span><label className="flex items-center gap-1 text-xs cursor-pointer text-purple-300 font-normal"><input type="radio" value="YouTube" checked={form.mainPlatform==='YouTube'} onChange={e=>updateForm({mainPlatform: e.target.value})} className="accent-purple-500" />主要直播平台</label></label><input type="url" value={form.youtubeUrl} onChange={e=>updateForm({youtubeUrl: e.target.value})} className={inputCls} /></div><div><label className="flex items-center justify-between text-sm font-bold text-gray-300 mb-2"><span>Twitch 連結</span><label className="flex items-center gap-1 text-xs cursor-pointer text-purple-300 font-normal"><input type="radio" value="Twitch" checked={form.mainPlatform==='Twitch'} onChange={e=>updateForm({mainPlatform: e.target.value})} className="accent-purple-500" />主要直播平台</label></label><input type="url" value={form.twitchUrl} onChange={e=>updateForm({twitchUrl: e.target.value})} className={inputCls} /></div></div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6"><FormGrp l="X連結"><input type="url" value={form.xUrl} onChange={e=>updateForm({xUrl: e.target.value})} className={inputCls} /></FormGrp><FormGrp l="你的Instagram"><input type="url" value={form.igUrl} onChange={e=>updateForm({igUrl: e.target.value})} className={inputCls} /></FormGrp></div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6"><FormGrp l="聯絡 Email (名片不顯示)" req><input required type="email" value={form.contactEmail} onChange={e=>updateForm({contactEmail: e.target.value})} className={inputCls} /></FormGrp><FormGrp l="我的直播風格代表作"><input type="url" value={form.streamStyleUrl} onChange={e=>updateForm({streamStyleUrl: e.target.value})} className={inputCls} placeholder="填入影片連結" /></FormGrp></div>
          {!isAdmin && <div className="bg-blue-500/10 border border-blue-500/30 rounded-xl p-5 mt-2"><h3 className="text-blue-400 font-bold mb-2 flex items-center gap-2"><i className="fa-solid fa-shield-halved"></i> 真人身分驗證 (防冒用)</h3><p className="text-xs text-gray-300 mb-4 leading-relaxed">為保護Vtuber，請在 X 或 YouTube 簡介暫放 <span className="text-white font-bold bg-gray-800 px-1 rounded">V-Nexus審核中</span>，管理員會親自審核，請直接輸入暫放平台。</p><input type="text" value={form.verificationNote} onChange={e=>updateForm({verificationNote: e.target.value})} className={inputCls} placeholder="您的驗證方式..." /></div>}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4"><FormGrp l="頭像網址"><div className="flex gap-3"><img src={form.avatar} className="w-12 h-12 rounded-xl object-cover flex-shrink-0" /><input type="url" value={form.avatar} onChange={e=>updateForm({avatar: e.target.value})} className={inputCls} /></div></FormGrp><FormGrp l="橫幅網址"><div className="flex gap-3"><img src={form.banner} className="w-20 h-12 rounded-xl object-cover flex-shrink-0" /><input type="url" value={form.banner} onChange={e=>updateForm({banner: e.target.value})} className={inputCls} /></div></FormGrp></div>
          <div className="pt-6 border-t border-gray-700 flex justify-end gap-3">{onCancel && <button type="button" onClick={onCancel} className="px-4 py-2 text-gray-400 hover:text-white">取消</button>}<button type="submit" className={btnCls}><i className="fa-solid fa-floppy-disk mr-2"></i>{isAdmin?'強制儲存更新':'儲存名片'}</button></div>
        </form>
      );
    };

    // --- 主應用程式 ---
    function App() {
      const getInitView = () => window.location.hash.replace('#', '') || 'home';
      const [view, setView] = useState(getInitView());
      const [selV, setSelV] = useState(null);
      const [isMobileMenu, setMobileMenu] = useState(false);
      const [isFilterOpen, setFilterOpen] = useState(false);
      const [sortOrder, setSortOrder] = useState('random'); 
      const [isLoading, setIsLoading] = useState(true);
      const [curTime, setCurTime] = useState(Date.now());
      const [stats, setStats] = useState({ pageViews: null });
      
      const [user, setUser] = useState(null);
      const [realV, setRealV] = useState([]);
      const [realB, setRealB] = useState([]);
      const [realC, setRealC] = useState([]);
      const [realNotifs, setRealNotifs] = useState([]);

      const [searchQ, setSearchQ] = useState('');
      const [selTags, setSelTags] = useState([]);
      const [selAgency, setSelAgency] = useState('All');
      const [selPlatform, setSelPlatform] = useState('All');
      
      const [modals, setModals] = useState({ collab: false, rules: false, tips: false, dislike: null });
      const [copied, setCopied] = useState(false);
      
      const [newB, setNewB] = useState({ content: '', collabType: '', collabTypeOther: '', collabSize: '', collabTime: '', recruitEndTime: '' });
      const [msg, setMsg] = useState(''); 
      const [isNotifOpen, setIsNotifOpen] = useState(false);
      const notifRef = useRef(null);

      const [tipsText, setTipsText] = useState("您好，我是 [頻道名]。\n想請問近期是否有機會邀請您一起進行 [企劃名稱] 的連動呢？");
      const [rulesText, setRulesText] = useState("如果聯動夥伴有嚴重負面行為，請在名片按倒讚。超過 10 個倒讚即會自動下架。");
      const [toast, setToast] = useState('');
      const showToast = (m) => { setToast(m); setTimeout(() => setToast(''), 3000); };

      const emptyProfile = { name:'', agency:'個人勢', tags:'', description:'', avatar:`https://api.dicebear.com/7.x/avataaars/svg?seed=${Math.random()}&backgroundColor=b6e3f4`, banner:'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&q=80&w=1000', isScheduleAnytime:false, isScheduleExcept:false, isScheduleCustom:false, customScheduleText:'', scheduleSlots:[], collabTypes:[], isOtherCollab:false, otherCollabText:'', streamingStyle:'一般型態', activityStatus:'active', youtubeSubscribers:'', twitchFollowers:'', youtubeUrl:'', twitchUrl:'', mainPlatform:'YouTube', streamStyleUrl:'', xUrl:'', igUrl:'', contactEmail:'', verificationNote:'' };
      const [form, setForm] = useState(emptyProfile);
      const [editV, setEditV] = useState(null);
      const [newC, setNewC] = useState({ dateTime: '', title: '', streamUrl: '', coverUrl: '' });

      const isAdmin = user?.email === 'apex.dasa@gmail.com';
      const myProfile = realV.find(v => v.id === user?.uid);
      const isVerified = isAdmin || (myProfile?.isVerified && !myProfile?.isBlacklisted && myProfile?.activityStatus === 'active');

      const navigate = (v) => { window.location.hash = v; setMobileMenu(false); window.scrollTo(0,0); };

      useEffect(() => {
        const handleHash = () => { const h = window.location.hash.replace('#', ''); setView((h==='profile'&&!selV)?'grid':(h||'home')); };
        window.addEventListener('hashchange', handleHash); return () => window.removeEventListener('hashchange', handleHash);
      }, [selV]);

      useEffect(() => {
        const clickOut = (e) => { if (notifRef.current && !notifRef.current.contains(e.target)) setIsNotifOpen(false); };
        document.addEventListener("mousedown", clickOut); return () => document.removeEventListener("mousedown", clickOut);
      }, [notifRef]);

      useEffect(() => {
        const unsub = onAuthStateChanged(auth, (u) => { setUser(u); setForm(emptyProfile); });
        const t = setInterval(() => setCurTime(Date.now()), 60000);
        return () => { unsub(); clearInterval(t); };
      }, []);

      useEffect(() => { if (user?.uid) updateDoc(doc(db, getPath('vtubers'), user.uid), { lastActiveAt: Date.now() }).catch(()=>{}); }, [user?.uid]);

      useEffect(() => {
        const r = doc(db, getPath('settings'), 'stats');
        updateDoc(r, { pageViews: increment(1) }).catch(() => setDoc(r, { pageViews: 1 }, { merge: true }));
        return onSnapshot(r, (s) => { if (s.exists()) setStats(s.data()); });
      }, []);

      useEffect(() => {
        setIsLoading(true); 
        const u1 = onSnapshot(collection(db, getPath('vtubers')), (s) => {
          const d = s.docs.map(x => ({ id: x.id, ...x.data() })); setRealV(d); setIsLoading(false); 
          if(user) {
            const cp = d.find(v => v.id === user.uid);
            if (cp) {
              const std = (cp.collabTypes||[]).filter(t=>PREDEFINED_COLLABS.includes(t)); const oth = (cp.collabTypes||[]).filter(t=>!PREDEFINED_COLLABS.includes(t))[0]||'';
              setForm(p => ({ ...p, ...cp, tags: Array.isArray(cp.tags)?cp.tags.join(', '):cp.tags||'', collabTypes: std, isOtherCollab: !!oth, otherCollabText: oth, scheduleSlots: cp.scheduleSlots||[], activityStatus: cp.activityStatus||'active', mainPlatform: cp.mainPlatform||'YouTube' }));
            }
          }
        }, () => setIsLoading(false));
        const u2 = onSnapshot(collection(db, getPath('bulletins')), (s) => setRealB(s.docs.map(x => ({ id: x.id, ...x.data() }))));
        const u3 = onSnapshot(collection(db, getPath('collabs')), (s) => setRealC(s.docs.map(x => ({ id: x.id, ...x.data() }))));
        const u4 = onSnapshot(collection(db, getPath('notifications')), (s) => setRealNotifs(s.docs.map(x => ({ id: x.id, ...x.data() }))));
        const u5 = onSnapshot(doc(db, getPath('settings'), 'tips'), (s) => { if (s.exists() && s.data().content) setTipsText(s.data().content); });
        const u6 = onSnapshot(doc(db, getPath('settings'), 'rules'), (s) => { if (s.exists() && s.data().content) setRulesText(s.data().content); });
        return () => { u1(); u2(); u3(); u4(); u5(); u6(); };
      }, [user]);

      const myNotifs = useMemo(() => user ? realNotifs.filter(n => n.userId === user.uid).sort((a, b) => b.createdAt - a.createdAt) : [], [realNotifs, user]);
      const unreadCnt = myNotifs.filter(n => !n.read).length;
      const markRead = () => myNotifs.forEach(n => { if (!n.read) updateDoc(doc(db, getPath('notifications'), n.id), { read: true }); });
      const handleNotifClick = (n) => { const s = realV.find(v => v.id === n.fromUserId); if (s) { setSelV(s); window.location.hash='profile'; } if (!n.read) updateDoc(doc(db, getPath('notifications'), n.id), { read: true }); setIsNotifOpen(false); };

      const handleLogin = async () => { try { await signInWithPopup(auth, provider); showToast("🎉 登入成功！"); } catch (e) { showToast("登入失敗"); } };
      const handleLogout = async () => { await signOut(auth); navigate('home'); showToast("已登出"); };

      const displayV = useMemo(() => { let list = [...realV]; for (let i = list.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [list[i], list[j]] = [list[j], list[i]]; } return list; }, [realV]);
      const dynTypes = useMemo(() => { const t = new Set(); displayV.filter(v=>isVisible(v, user)).forEach(v => { if(Array.isArray(v.collabTypes)) v.collabTypes.forEach(x => x.trim() && t.add(x.trim())); }); return Array.from(t).sort(); }, [displayV, user]);

      const displayB = useMemo(() => [...realB].filter(b => !b.recruitEndTime || b.recruitEndTime > Date.now()).filter(b => isVisible(displayV.find(v=>v.id===b.userId), user)).map(b => ({ ...b, vtuber: displayV.find(v=>v.id===b.userId) || {name:"匿名",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=Anon"}, postedAt: formatTime(b.createdAt), applicantsData: (b.applicants||[]).map(uid=>displayV.find(v=>v.id===uid)).filter(Boolean) })).sort((a,b)=>b.createdAt-a.createdAt), [realB, displayV, user]);
      const displayC = useMemo(() => [...realC].filter(c => !c.startTimestamp || curTime <= c.startTimestamp + (3*3600*1000)).sort((a,b)=>(a.startTimestamp||a.createdAt||0)-(b.startTimestamp||b.createdAt||0)), [realC, curTime]);

      const filteredV = useMemo(() => {
        let r = displayV.filter(v=>isVisible(v, user)).filter(v => {
          const ms = v.name?.toLowerCase().includes(searchQ.toLowerCase()) || v.description?.toLowerCase().includes(searchQ.toLowerCase());
          const mt = selTags.length===0 || selTags.every(t=>v.collabTypes?.includes(t));
          const ma = selAgency==='All' || v.agency?.includes(selAgency);
          const mp = selPlatform==='All' || (v.mainPlatform||'YouTube')===selPlatform;
          return ms && mt && ma && mp;
        });
        if (sortOrder==='likes') r.sort((a,b)=>(b.likes||0)-(a.likes||0));
        else if (sortOrder==='subscribers') r.sort((a,b)=>parseSubs(b)-parseSubs(a));
        else if (sortOrder==='newest') r.sort((a,b)=>(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0));
        else { let s=[...r]; for(let i=s.length-1; i>0; i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];} r=s; }
        return r;
      }, [displayV, searchQ, selTags, selAgency, selPlatform, user, sortOrder]); 

      const handleSave = async (e, f = form) => {
        if(e) e.preventDefault(); if (!user) return showToast("請先登入！");
        let fin = [...(f.collabTypes||[])]; if (f.isOtherCollab && f.otherCollabText?.trim()) fin.push(f.otherCollabText.trim());
        if (fin.length === 0) return showToast("請至少選一項連動類型！");
        if (!f.isScheduleAnytime && !f.isScheduleExcept) { if (f.isScheduleCustom) { if (!f.customScheduleText?.trim()) return showToast("請填自訂時段！"); } else { if (!f.scheduleSlots?.length) return showToast("請新增時段！"); } }
        try {
          const isVer = realV.find(v => v.id === (f.id||user.uid))?.isVerified || false;
          await setDoc(doc(db, getPath('vtubers'), f.id||user.uid), { ...f, tags: (f.tags||'').split(',').map(t=>t.trim()).filter(Boolean), collabTypes: fin, likes: f.likes||0, dislikedBy: f.dislikedBy||[], isBlacklisted: f.isBlacklisted||false, isVerified: isVer, lastActiveAt: Date.now(), updatedAt: Date.now() }, { merge: true });
          showToast(isVer ? "🎉 名片已更新！" : "🎉 名片已建立！等待審核。"); if(!f.id) navigate('grid');
        } catch (err) { showToast("儲存失敗"); }
      };

      const handlePostB = async () => {
        if (!user) return showToast("請先登入！"); if (!newB.content.trim() || !newB.collabType || !newB.collabSize || !newB.collabTime || !newB.recruitEndTime) return showToast("請完整填寫！");
        const rE = new Date(newB.recruitEndTime).getTime(); const cT = new Date(newB.collabTime).getTime();
        if (rE < Date.now()) return showToast("截止時間不能在過去！"); if (cT < rE) return showToast("⚠️ 聯動不能早於招募截止！");
        if (!myProfile?.isVerified) return showToast("名片審核通過後才能發布！");
        try {
          const ft = newB.collabType==='其他' ? newB.collabTypeOther : newB.collabType;
          await addDoc(collection(db, getPath('bulletins')), { userId: user.uid, content: newB.content, collabType: ft, collabSize: newB.collabSize, collabTime: newB.collabTime, recruitEndTime: rE, applicants: [], createdAt: Date.now() });
          setNewB({ content:'', collabType:'', collabTypeOther:'', collabSize:'', collabTime:'', recruitEndTime:'' }); showToast("🚀 發布成功！");
        } catch (err) { showToast("發布失敗"); }
      };

      const handleApplyB = async (b, isApp) => {
        if (!user) return showToast("請先登入！"); if (!isVerified) return showToast("需認證才能報名！");
        try {
          await updateDoc(doc(db, getPath('bulletins'), b.id), { applicants: isApp ? arrayUnion(user.uid) : arrayRemove(user.uid) });
          showToast(isApp ? "✅ 已送出意願！" : "已收回意願");
          if (isApp && b.userId !== user.uid) await addDoc(collection(db, getPath('notifications')), { userId: b.userId, fromUserId: user.uid, fromUserName: myProfile?.name||'創作者', fromUserAvatar: myProfile?.avatar||'', message: '對您的招募文表達了意願！', createdAt: Date.now(), read: false });
        } catch (err) { showToast("操作失敗"); }
      };

      const handleRec = async (t) => {
        if (!isVerified) return showToast("需認證才能推薦！"); if (t.id === user.uid) return showToast("不能推薦自己！"); if (t.likedBy?.includes(user.uid)) return showToast("已推薦過！");
        try { await setDoc(doc(db, getPath('vtubers'), t.id), { likes: (t.likes||0)+1, likedBy: [...(t.likedBy||[]), user.uid] }, { merge: true }); showToast("✅ 已送出推薦！"); if (selV?.id === t.id) setSelV(p=>({ ...p, likes: p.likes+1, likedBy: [...(p.likedBy||[]), user.uid] })); } catch (err) { showToast("推薦失敗"); }
      };

      const handleDis = async () => {
        if (!modals.dislike || !user) return;
        const tId = modals.dislike.id; const nD = (modals.dislike.dislikes||0) + 1; const up = { dislikes: nD, dislikedBy: [...(modals.dislike.dislikedBy||[]), user.uid] };
        if (nD >= 10) { up.isVerified = false; up.isBlacklisted = true; }
        try {
          await setDoc(doc(db, getPath('vtubers'), tId), up, { merge: true }); setModals(m=>({...m, dislike:null})); showToast("✅ 已送出倒讚。");
          if (up.isBlacklisted) { showToast("⚠️ 已下架。"); if (selV?.id===tId) navigate('grid'); } else if (selV?.id===tId) setSelV(p=>({ ...p, dislikes: nD, dislikedBy: up.dislikedBy }));
        } catch (err) { showToast("操作失敗"); }
      };

      // Admin actions
      const adminVer = async (id) => { try { await setDoc(doc(db, getPath('vtubers'), id), { isVerified: true, isBlacklisted: false }, { merge: true }); showToast("已審核！"); } catch (err) { showToast("失敗"); } };
      const adminDelV = async (id) => { if (!confirm("刪除名片？")) return; try { await deleteDoc(doc(db, getPath('vtubers'), id)); showToast("已刪除"); } catch (err) { showToast("失敗"); } };
      const adminDelB = async (id) => { if (!confirm("刪除招募？")) return; try { await deleteDoc(doc(db, getPath('bulletins'), id)); showToast("已刪除"); } catch (err) { showToast("失敗"); } };

                <div className="bg-gray-800/40 rounded-3xl p-6 sm:p-10 shadow-2xl"><ProfileEditorForm form={form} updateForm={(up)=>setForm(p=>({...p,...up}))} onSubmit={(e)=>handleSave(e)} showToast={showToast} isAdmin={false} /></div>

                <h2 className="text-3xl font-extrabold text-purple-400 mb-4 flex justify-center items-center gap-3"><i className="fa-solid fa-dice"></i> 聯動隨機配對</h2>
                <div className="bg-gray-800/40 border border-gray-700 rounded-3xl p-8 shadow-2xl max-w-xl mx-auto relative overflow-hidden">
                  <div className="absolute -top-16 -left-16 w-32 h-32 bg-purple-600/10 rounded-full blur-3xl"></div>
                  <div className="text-left"><label className="block text-sm font-bold text-gray-300 mb-2">連動類型 (選填)</label><select value={searchQ} onChange={e=>setSearchQ(e.target.value)} className={inputCls}><option value="">不限 (完全隨機)</option>{PREDEFINED_COLLABS.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
                  <button onClick={()=>{ const c=realV.filter(v=>isVisible(v,user)&&v.id!==user?.uid); if(c.length===0)return showToast("無對象！"); setSelV(c[Math.floor(Math.random()*c.length)]); navigate('profile'); }} className={btnCls+" w-full mt-6"}><i className="fa-solid fa-wand-magic-sparkles"></i> 尋找命定夥伴</button>
                </div>
              </div>
            )}

            {view === 'bulletin' && (
              <div className="max-w-4xl mx-auto px-4 py-8 animate-fade-in-up">
                <div className="text-center mb-10"><h2 className="text-3xl font-extrabold text-purple-400 mb-3"><i className="fa-solid fa-bullhorn mr-3"></i>招募佈告欄</h2></div>
                <div className="bg-gray-800/60 border border-purple-500/30 rounded-3xl p-6 mb-10"><h3 className="font-bold text-white mb-4"><i className="fa-solid fa-wand-magic-sparkles text-purple-400 mr-2"></i>發布招募</h3><textarea value={newB.content} onChange={e=>setNewB({...newB,content:e.target.value})} className={inputCls+" mb-4 resize-none"} rows="3" placeholder="想找人玩什麼？" /><div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6"><div><label className="text-xs text-gray-400 mb-1 block">性質</label><select value={newB.collabType} onChange={e=>setNewB({...newB,collabType:e.target.value})} className={inputCls}><option value="">請選擇</option>{PREDEFINED_COLLABS.map(t=><option key={t} value={t}>{t}</option>)}<option value="其他">其他</option></select>{newB.collabType==='其他'&&<input type="text" value={newB.collabTypeOther} onChange={e=>setNewB({...newB,collabTypeOther:e.target.value})} className={inputCls+" mt-2"}/>}</div><div><label className="text-xs text-gray-400 mb-1 block">人數</label><select value={newB.collabSize} onChange={e=>setNewB({...newB,collabSize:e.target.value})} className={inputCls}><option value="">請選擇</option>{[...Array(21).keys()].map(n=><option key={n} value={`${n}人`}>{n} 人</option>)}</select></div><div><label className="text-xs text-gray-400 mb-1 block">時間</label><input type="datetime-local" value={newB.collabTime} onChange={e=>setNewB({...newB,collabTime:e.target.value})} className={inputCls}/></div><div><label className="text-xs text-gray-400 mb-1 block">截止</label><input type="datetime-local" value={newB.recruitEndTime} onChange={e=>setNewB({...newB,recruitEndTime:e.target.value})} className={inputCls}/></div></div><div className="flex justify-end"><button onClick={handlePostB} className={btnCls}><i className="fa-solid fa-paper-plane mr-2"></i>送出</button></div></div>
                {isLoading ? <div className="text-center py-10"><i className="fa-solid fa-spinner fa-spin text-2xl text-gray-500"></i></div> : <div className="grid grid-cols-1 md:grid-cols-2 gap-6">{displayB.length===0?<p className="col-span-full text-center text-gray-500 mt-10">尚無招募</p>:displayB.map(b=><BulletinCard key={b.id} b={b} user={user} isVerified={isVerified} onNavigate={(v)=>{setSelV(v);navigate('profile');}} onApply={(bx,isA)=>handleApplyB(bx,isA)} onInvite={(t)=>{setSelV(t);setModals(m=>({...m,collab:true}));}} />)}</div>}
              </div>
            )}

            {view === 'collabs' && (
              <div className="max-w-5xl mx-auto px-4 py-8 text-center animate-fade-in-up">
                <h2 className="text-3xl font-extrabold text-red-400 mb-2"><i className="fa-solid fa-broadcast-tower mr-3"></i>確定聯動時間表</h2>
                {isVerified && <div className="bg-red-500/10 border border-red-500/30 rounded-3xl p-6 sm:p-8 mb-12 text-left"><h3 className="font-bold text-white mb-6"><i className="fa-solid fa-calendar-plus text-red-400 mr-3"></i>發布行程</h3><form onSubmit={e=>{e.preventDefault(); if(!newC.dateTime||!newC.streamUrl||!newC.title)return showToast("請完整填寫！"); const dt=new Date(newC.dateTime); addC({...newC, date:`${dt.getMonth()+1}/${dt.getDate()} (${['日','一','二','三','四','五','六'][dt.getDay()]})`, time:`${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`, startTimestamp:dt.getTime()}); setNewC({dateTime:'',title:'',streamUrl:'',coverUrl:''});}}><div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4"><div className="w-full min-w-0"><label className="text-xs text-gray-400 mb-1 block">時間 *</label><input required type="datetime-local" value={newC.dateTime} onChange={e=>setNewC({...newC,dateTime:e.target.value})} className={inputCls}/></div><div className="w-full min-w-0"><label className="text-xs text-gray-400 mb-1 block">連結 *</label><input required type="url" value={newC.streamUrl} onChange={e=>setNewC({...newC,streamUrl:e.target.value})} className={inputCls}/></div></div><div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6"><div><label className="text-xs text-gray-400 mb-1 block">標題 *</label><input required type="text" value={newC.title} onChange={e=>setNewC({...newC,title:e.target.value})} className={inputCls}/></div><div><label className="text-xs text-gray-400 mb-1 block">自訂封面 (選填)</label><input type="url" value={newC.coverUrl} onChange={e=>setNewC({...newC,coverUrl:e.target.value})} className={inputCls}/></div></div><div className="flex justify-end"><button type="submit" className="bg-red-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg">發布</button></div></form></div>}
                {isLoading ? <div className="text-center py-10"><i className="fa-solid fa-spinner fa-spin text-2xl text-gray-500"></i></div> : <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">{displayC.map(c=><CollabCard key={c.id} c={c} isLive={c.startTimestamp&&curTime>=c.startTimestamp&&curTime<=c.startTimestamp+(3*3600*1000)} isAdmin={isAdmin} user={user} onDelete={delC} />)}</div>}
              </div>
            )}

            {view === 'blacklist' && (
              <div className="max-w-7xl mx-auto px-4 py-12 animate-fade-in-up text-center"><h2 className="text-3xl font-extrabold text-red-500 mb-12"><i className="fa-solid fa-skull-crossbones"></i> 黑單避雷區</h2>{isLoading?<i className="fa-solid fa-spinner fa-spin text-2xl text-gray-500"></i>:<div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">{displayV.filter(v=>v.isBlacklisted||v.dislikes>=10).map(v=><div key={v.id} className="bg-red-950/20 border border-red-900/50 rounded-2xl overflow-hidden flex flex-col relative opacity-80"><div className="absolute top-0 left-0 w-full bg-red-600/80 text-white text-center py-1 text-[10px] font-bold z-20">已下架</div><div className="h-20 relative overflow-hidden flex-shrink-0 mt-6"><img src={v.banner} className="w-full h-full object-cover opacity-40"/></div><div className="p-4 flex flex-col items-center -mt-10 relative z-20"><img src={v.avatar} className="w-16 h-16 rounded-full border-4 border-gray-900 bg-gray-900 object-cover mb-2"/><h3 className="font-bold text-gray-300 line-through decoration-red-500">{v.name}</h3><span className="text-[10px] text-gray-500 mt-1">{v.agency}</span><div className="mt-4 bg-black/50 border border-red-500/30 w-full rounded-lg p-3 text-center"><p className="text-[10px] text-red-400/80 mb-1">倒讚數</p><p className="text-xl font-black text-red-500">{v.dislikes||10}</p></div></div></div>)}</div>}</div>
            )}

            {view === 'admin' && isAdmin && (
              <div className="max-w-5xl mx-auto px-4 py-8 animate-fade-in-up">
                <div className="text-center mb-8"><h2 className="text-3xl font-extrabold text-red-400 mb-2"><i className="fa-solid fa-shield-halved"></i> 系統管理員</h2></div>
                <div className="space-y-8 bg-gray-800/40 p-6 rounded-3xl">
                  <AdminVtuberList title="待審核名單" list={realV.filter(v=>!v.isVerified&&!v.isBlacklisted)} onVerify={adminVer} onEdit={v=>{setEditV(v);}} onDelete={adminDelV} />
                  <AdminVtuberList title="已上架" list={realV.filter(v=>v.isVerified&&!v.isBlacklisted)} onEdit={v=>{setEditV(v);}} onDelete={adminDelV} />
                  <div className="border-t border-gray-700 pt-6"><h3 className="text-xl font-bold text-white mb-4">設定</h3><button onClick={()=>saveSet(tipsText, rulesText)} className="bg-red-600 text-white px-6 py-2 rounded-lg font-bold">強制儲存所有系統文字</button><button onClick={resetTypes} className="bg-red-900 text-white px-6 py-2 rounded-lg font-bold ml-4">重置所有人連動類型</button></div>
                </div>
              </div>
            )}
          </main>

          {/* Modal 區塊 */}
          {modals.collab && selV && (
            <Modal title={`邀請 ${selV.name}`} icon="fa-paper-plane text-purple-400" onClose={()=>setModals(m=>({...m,collab:false}))} maxW="max-w-md">
              {!selV.contactEmail ? <p className="text-red-400 text-sm font-bold bg-red-500/10 p-3 rounded-lg"><i className="fa-solid fa-circle-exclamation mr-2"></i>未公開 Email。</p> : (
                <div className="space-y-4"><p className="text-xs text-gray-400">* 將開啟 Email 軟體並帶入內容。</p><textarea rows="6" value={msg} onChange={e=>setMsg(e.target.value)} className={inputCls + " resize-none"} placeholder="寫下邀請..."></textarea><button onClick={async()=>{if(!msg.trim())return showToast("請輸入內容"); if(user&&selV.id){try{await addDoc(collection(db,getPath('notifications')),{userId:selV.id,fromUserId:user.uid,fromUserName:myProfile?.name||'創作者',fromUserAvatar:myProfile?.avatar||'',message:'提出了聯動邀約！快看信箱！',createdAt:Date.now(),read:false});}catch(e){}} window.location.href=`mailto:${selV.contactEmail}?subject=${encodeURIComponent(`[V-Nexus 邀約] ${myProfile?.name||'創作者'}`)}&body=${encodeURIComponent(msg)}`; setModals(m=>({...m,collab:false})); setMsg(''); showToast("✅ 寄出！");}} className={btnCls+" w-full"}><i className="fa-solid fa-envelope"></i> 開啟信箱寄出</button></div>
              )}
            </Modal>
          )}

          {modals.dislike && (
            <Modal title="警告：確認檢舉" icon="fa-triangle-exclamation text-red-400" onClose={()=>setModals(m=>({...m,dislike:null}))} maxW="max-w-md">
              <p className="text-gray-200 mb-6">確定對 <span className="font-bold text-white bg-gray-800 px-2 py-0.5 rounded">{modals.dislike.name}</span> 倒讚嗎？</p><div className="bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-6"><p className="text-xs text-red-300">👉 若累積 10 個倒讚，將自動下架其名片。</p></div><div className="flex gap-3"><button onClick={()=>setModals(m=>({...m,dislike:null}))} className="flex-1 bg-gray-700 text-white py-3 rounded-xl font-bold">按錯</button><button onClick={handleDis} className="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">對</button></div>
            </Modal>
          )}

          {modals.tips && (
            <Modal title="邀約小技巧" icon="fa-lightbulb text-yellow-400" onClose={()=>setModals(m=>({...m,tips:false}))}>
              <div className="flex justify-between items-center mb-4"><h4 className="font-bold text-white">標準邀請信</h4><button onClick={()=>{navigator.clipboard.writeText(tipsText).catch(()=>{}); setCopied(true); setTimeout(()=>setCopied(false), 2000); showToast("已複製");}} className={`text-white px-3 py-1.5 rounded text-sm ${copied?'bg-green-600':'bg-purple-600'}`}>{copied?'已複製':'一鍵複製'}</button></div><pre className="text-sm text-gray-300 bg-gray-900 p-4 rounded-lg font-mono whitespace-pre-wrap">{tipsText}</pre><div className="mt-6 flex justify-end"><button onClick={()=>setModals(m=>({...m,tips:false}))} className="bg-gray-700 text-white px-8 py-2.5 rounded-xl font-bold">關閉</button></div>
            </Modal>
          )}

          {modals.rules && (
            <Modal title="聯動規範" icon="fa-triangle-exclamation text-red-500" onClose={()=>setModals(m=>({...m,rules:false}))} maxW="max-w-lg">
              <div className="text-sm text-gray-300 leading-relaxed space-y-4" dangerouslySetInnerHTML={{__html:(rulesText||'').replace(/\n/g,'<br/>')}}></div><div className="mt-8 flex justify-center"><button onClick={()=>setModals(m=>({...m,rules:false}))} className="bg-gray-700 text-white px-8 py-2.5 rounded-xl font-bold">我了解了</button></div>
            </Modal>
          )}

          {/* Admin Edit Modal */}
          {editV && (
            <Modal title={`強制編輯：${editV.name}`} icon="fa-pen-to-square text-blue-400" onClose={()=>setEditV(null)}>
              <ProfileEditorForm form={editV} updateForm={up=>setEditV(p=>({...p,...up}))} onSubmit={e=>{e.preventDefault(); handleAdminUpdateVtuber(editV.id, editV); setEditV(null);}} onCancel={()=>setEditV(null)} isAdmin={true} showToast={showToast} />
            </Modal>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
