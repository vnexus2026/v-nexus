                     ) : (
                       <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                         {filteredDisplayCollabs.map(c => <CollabCard key={c.id} c={c} isLive={c.startTimestamp && currentTime >= c.startTimestamp && currentTime <= c.startTimestamp + (2 * 60 * 60 * 1000)} isAdmin={isAdmin} user={user} onDeleteCollab={handleDeleteCollab} vtuber={realVtubers.find(v => v.id === c.userId)} onNavigateProfile={(vt) => { gridScrollY.current = window.scrollY; navigate(`profile/${vt.id}`); }} />)}
                       </div>
                     )}
                   </>
                 )}
               </div>
            )}
            
            {currentView === 'admin' && isAdmin && <AdminPage vtubers={realVtubers} bulletins={displayBulletins} collabs={displayCollabs} updates={realUpdates} rules={realRules} tips={realTips} privateDocs={privateDocs} onDeleteVtuber={handleDeleteVtuber} onVerifyVtuber={handleVerifyVtuber} onRejectVtuber={handleRejectVtuber} onUpdateVtuber={handleAdminUpdateVtuber} onDeleteBulletin={handleDeleteBulletin} onAddCollab={handleAddCollab} onDeleteCollab={handleDeleteCollab} onAddUpdate={handleAddUpdate} onDeleteUpdate={handleDeleteUpdate} onSaveSettings={handleSaveSettings} showToast={showToast} onResetAllCollabTypes={handleAdminResetAllCollabTypes} autoFetchYouTubeInfo={autoFetchYouTubeInfo} />}
          </main>

          {/* --- 邀請表單 Modal (已修改為純站內信模式) --- */}
          {isCollabModalOpen && selectedVTuber && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl animate-fade-in-up">
                <div className="px-5 py-4 border-b border-gray-800 flex justify-between items-center"><h3 className="font-bold text-white"><i className="fa-solid fa-paper-plane text-purple-400 mr-2"></i>發送聯動邀約給 {selectedVTuber.name}</h3><button onClick={() => setIsCollabModalOpen(false)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark"></i></button></div>
                <div className="p-5 space-y-4">
                  <p className="text-xs text-gray-400">* 為了保護雙方隱私，我們採用站內信系統，對方登入時將會收到您的通知。</p>
                  <textarea rows="6" value={inviteMessage} onChange={(e) => setInviteMessage(e.target.value)} className={inputCls + " resize-none"} placeholder="寫下您的邀請內容..."></textarea>
                  <button onClick={async () => { 
                      if(!inviteMessage.trim()) return showToast("請輸入內容！");
                      if (user && selectedVTuber.id) {
                         try { 
                            await addDoc(collection(db, getPath('notifications')), { userId: selectedVTuber.id, fromUserId: user.uid, fromUserName: myProfile?.name || user.displayName || '某位創作者', fromUserAvatar: myProfile?.avatar || user.photoURL, message: `寄來了一封聯動邀約：\n「${inviteMessage}」`, createdAt: Date.now(), read: false }); 
                            setIsCollabModalOpen(false); setInviteMessage(''); showToast("✅ 邀約已成功送出！");
                         } catch(e) { showToast("發送失敗，請稍後再試。"); }
                      }
                    }} className={btnCls + " w-full"}><i className="fa-solid fa-paper-plane"></i> 傳送站內邀約</button>
                </div>
              </div>
            </div>
          )}

          {/* --- 倒讚確認 Modal --- */}
          {confirmDislikeData && (
            <div className="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="bg-gray-900 border border-red-500/50 rounded-2xl w-full max-w-sm overflow-hidden shadow-[0_0_30px_rgba(220,38,38,0.3)] animate-fade-in-up">
                <div className="px-6 py-5 border-b border-gray-800 bg-red-950/30"><h3 className="font-bold text-red-400 text-lg"><i className="fa-solid fa-triangle-exclamation"></i> 警告：確認檢舉</h3></div>
                <div className="p-6">
                  <p className="text-gray-200 mb-6">確定對 <span className="font-bold text-white bg-gray-800 px-2 py-0.5 rounded mx-1">{confirmDislikeData.name}</span> 送出倒讚嗎？</p>
                  <div className="bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-6"><p className="text-xs text-red-300">👉 倒讚僅適用於惡意破壞社群行為。<br/><br/>👉 每個認證帳號僅能檢舉一次。<br/><br/>👉 若累積達 10 個倒讚，系統將自動下架其名片。</p></div>
                  <div className="flex gap-3"><button onClick={() => setConfirmDislikeData(null)} className="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-xl font-bold">按錯</button><button onClick={handleConfirmDislike} className="flex-1 bg-red-600 hover:bg-red-500 text-white py-3 rounded-xl font-bold shadow-lg">對</button></div>
                </div>
              </div>
            </div>
          )}

          {/* 最新消息 Modal */}
          {isUpdatesModalOpen && (
            <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-2xl shadow-2xl animate-fade-in-up flex flex-col max-h-[80vh]">
                <div className="px-6 py-5 border-b border-gray-800 flex justify-between items-center">
                  <div className="flex items-center gap-4">
                    <h3 className="font-bold text-blue-400"><i className="fa-solid fa-bullhorn mr-2"></i>最新消息與功能發布</h3>
                    {hasUnreadUpdates && (
                      <button onClick={handleMarkAllUpdatesRead} className="text-xs font-bold text-blue-400 bg-blue-500/10 hover:bg-blue-500/20 px-3 py-1.5 rounded-lg transition-colors border border-blue-500/20">
                        <i className="fa-solid fa-check-double mr-1"></i> 一鍵已讀
                      </button>
                    )}
                  </div>
                  <button onClick={() => setIsUpdatesModalOpen(false)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                </div>
                <div className="p-6 overflow-y-auto flex-1 space-y-4">
                  {realUpdates.length === 0 ? <p className="text-gray-500 text-center py-10">目前沒有新消息</p> : realUpdates.map(u => {
                    const isUnread = !readUpdateIds.includes(u.id);
                    return (
                      <div key={u.id} className={`bg-gray-800/50 p-5 rounded-xl border transition-colors ${isUnread ? 'border-blue-500/50 shadow-[0_0_15px_rgba(59,130,246,0.15)]' : 'border-gray-700'}`}>
                        <div className="flex justify-between items-start mb-3">
                          <h4 className="font-bold text-white text-lg flex items-center gap-2">
                            {u.title}
                            {isUnread && <span className="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full animate-pulse shadow-lg whitespace-nowrap">新消息</span>}
                          </h4>
                          <span className="text-xs font-bold text-blue-400 bg-blue-500/10 border border-blue-500/20 px-2.5 py-1 rounded-full">{u.date}</span>
                        </div>
                        <p className="text-gray-300 text-sm whitespace-pre-wrap leading-relaxed">{u.content}</p>
                      </div>
                    );
                  })}
                </div>
                <div className="px-6 py-4 border-t border-gray-800 flex justify-end">
                  <button onClick={() => setIsUpdatesModalOpen(false)} className="bg-gray-700 hover:bg-gray-600 text-white px-8 py-2.5 rounded-xl font-bold transition-colors">關閉</button>
                </div>
              </div>
            </div>
          )}

          {/* 其他 Modal (提示與規範) */}
          {isTipsModalOpen && <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"><div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-2xl shadow-2xl animate-fade-in-up"><div className="px-6 py-5 border-b border-gray-800 flex justify-between items-center"><h3 className="font-bold text-yellow-400"><i className="fa-solid fa-lightbulb"></i> 邀約小技巧</h3><button onClick={() => setIsTipsModalOpen(false)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button></div><div className="p-6"><div className="flex justify-between items-center mb-4"><h4 className="font-bold text-white">標準邀請信範本</h4><button onClick={() => {navigator.clipboard.writeText(realTips).catch(()=>{}); setCopiedTemplate(true); setTimeout(()=>setCopiedTemplate(false), 2000); showToast("已複製");}} className={`text-white px-3 py-1.5 rounded text-sm ${copiedTemplate ? 'bg-green-600' : 'bg-purple-600 hover:bg-purple-500'}`}>{copiedTemplate ? '已複製' : '一鍵複製'}</button></div><pre className="text-sm text-gray-300 bg-gray-900 p-4 rounded-lg font-mono whitespace-pre-wrap leading-relaxed border border-gray-800 max-h-64 overflow-y-auto">{realTips}</pre><div className="mt-6 flex justify-end"><button onClick={() => setIsTipsModalOpen(false)} className="bg-gray-700 text-white px-8 py-2.5 rounded-xl font-bold">關閉</button></div></div></div></div>}
          {isRulesModalOpen && <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"><div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-lg shadow-2xl animate-fade-in-up"><div className="px-6 py-5 border-b border-gray-800 flex justify-between items-center"><h3 className="font-bold text-white"><i className="fa-solid fa-triangle-exclamation text-red-500"></i> 聯動規範</h3><button onClick={() => setIsRulesModalOpen(false)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button></div><div className="p-6"><div className="text-sm text-gray-300 leading-relaxed space-y-4 whitespace-pre-wrap">{realRules}</div><div className="mt-8 flex justify-center"><button onClick={() => setIsRulesModalOpen(false)} className="bg-gray-700 text-white px-8 py-2.5 rounded-xl font-bold">我了解了</button></div></div></div></div>}
          
          {/* 審核結果通知 Modal */}
          {myProfile && myProfile.showVerificationModal && (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-md shadow-2xl animate-fade-in-up flex flex-col overflow-hidden">
                <div className={`px-6 py-5 border-b border-gray-800 flex items-center gap-3 ${myProfile.showVerificationModal === 'approved' ? 'bg-green-900/30' : 'bg-red-900/30'}`}>
                  {myProfile.showVerificationModal === 'approved' ? (
                    <><i className="fa-solid fa-circle-check text-green-400 text-2xl"></i><h3 className="font-bold text-green-400 text-lg">審核通過</h3></>
                  ) : (
                    <><i className="fa-solid fa-circle-xmark text-red-400 text-2xl"></i><h3 className="font-bold text-red-400 text-lg">審核未通過</h3></>
                  )}
                </div>
                <div className="p-6 text-center">
                  {myProfile.showVerificationModal === 'approved' ? (
                    <p className="text-gray-200 text-lg font-bold leading-relaxed mb-8">恭喜你審核通過！<br/>開始尋找聯動夥伴吧！</p>
                  ) : (
                    <p className="text-gray-300 text-sm leading-relaxed mb-8 text-left">很抱歉，目前不開放YT訂閱或TWITCH追隨加起來低於500、尚未出道、長期準備中、一個月以上未有直播活動之Vtuber或經紀人加入，敬請見諒。如果你不在以上條件內，那就是你沒有將V-Nexus審核中放入你的X或YT簡介內，無法審核成功喔！<br/><br/>請繼續加油！</p>
                  )}
                  <div className="flex justify-center">
                    {myProfile.showVerificationModal === 'approved' ? (
                      <button onClick={async () => {
                        await updateDoc(doc(db, getPath('vtubers'), myProfile.id), { showVerificationModal: null });
                        navigate('grid');
                      }} className="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform hover:scale-105 w-full">開始找夥伴</button>
                    ) : (
                      <button onClick={async () => {
                        await updateDoc(doc(db, getPath('vtubers'), myProfile.id), { showVerificationModal: null });
                      }} className="bg-gray-700 hover:bg-gray-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-colors w-full">好的我知道了</button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
