<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V-Nexus | 專為 VTuber 打造的聯動平台</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #0f111a; color: #f3f4f6; font-family: sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f111a; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    
    @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    .animate-slide-down { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes radarSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-radar { animation: radarSpin 2s linear infinite; }
  </style>
</head>
<body class="selection:bg-purple-500 selection:text-white m-0 p-0 overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useMemo, useRef } = React;

    // --- Firebase 連線設定 ---
    const firebaseConfig = {
      apiKey: "AIzaSyD_JJZUcT56VkHFH0ykBRJQ_nFLK_4p7kY",
      authDomain: "v-nexus.firebaseapp.com",
      projectId: "v-nexus",
      storageBucket: "v-nexus.firebasestorage.app",
      messagingSenderId: "824125737901",
      appId: "1:824125737901:web:93a4f21b56ab00dfaaaf24"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    
    const APP_ID = 'v-nexus-official';
    const getPath = (collectionName) => `artifacts/${APP_ID}/public/data/${collectionName}`;

    // --- 全域常數設定 ---
    const PREDEFINED_COLLABS = ['APEX', '瓦羅蘭', 'LOL', 'FPS', 'Minecraft', '合作遊戲', '企劃', '歌回', '雜談'];
    const MOCK_VTUBERS = [];
    const MOCK_COLLABS = [];
    const MOCK_BULLETINS = [];

    const formatTime = (ts) => {
      if (!ts) return "剛剛";
      const d = new Date(ts);
      const year = d.getFullYear();
      const month = String(d.getMonth()+1).padStart(2,'0');
      const date = String(d.getDate()).padStart(2,'0');
      const hours = String(d.getHours()).padStart(2,'0');
      const mins = String(d.getMinutes()).padStart(2,'0');
      return `${year}/${month}/${date} ${hours}:${mins}`;
    };

    const formatDateTimeLocalStr = (dtStr) => {
      if (!dtStr) return '未指定';
      const d = new Date(dtStr);
      if (isNaN(d.getTime())) return dtStr;
      const month = String(d.getMonth()+1).padStart(2,'0');
      const date = String(d.getDate()).padStart(2,'0');
      const hours = String(d.getHours()).padStart(2,'0');
      const mins = String(d.getMinutes()).padStart(2,'0');
      return `${month}/${date} ${hours}:${mins}`;
    };

    // 格式化可連動時段的工具函數
    const formatSchedule = (v) => {
      if (v.isScheduleAnytime) return "我都可以 (隨時可約)";
      if (v.scheduleSlots && v.scheduleSlots.length > 0) {
        return v.scheduleSlots.map(s => `${s.day} ${s.start}~${s.end}`).join('、');
      }
      return v.schedule || '未提供時段';
    };

    // 自動擷取 YouTube 縮圖的工具函數
    const getYouTubeThumbnail = (url) => {
      if (!url) return null;
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
      const match = url.match(regExp);
      if (match && match[2].length === 11) {
        return `https://img.youtube.com/vi/${match[2]}/maxresdefault.jpg`;
      }
      return null;
    };

    // 自動擷取 YouTube 標題與說明的工具函數 (透過跨域代理 API 結合 oEmbed)
    const fetchYouTubeData = async (url) => {
      try {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
        const match = url.match(regExp);
        if (match && match[2].length === 11) {
          const targetUrl = `https://www.youtube.com/watch?v=${match[2]}`;
          let title = '';
          let description = '';

          try {
            const oembedUrl = `https://www.youtube.com/oembed?url=${encodeURIComponent(targetUrl)}&format=json`;
            const oembedRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(oembedUrl)}`);
            if (oembedRes.ok) {
              const oembedData = await oembedRes.json();
              const ytJson = JSON.parse(oembedData.contents);
              title = ytJson.title || '';
            }
          } catch (e) { console.error("oEmbed fetch failed", e); }

          try {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
            const htmlRes = await fetch(proxyUrl);
            if (htmlRes.ok) {
              const htmlData = await htmlRes.json();
              const doc = new DOMParser().parseFromString(htmlData.contents, "text/html");
              if (!title) {
                title = doc.querySelector('meta[property="og:title"]')?.getAttribute('content') || doc.querySelector('title')?.innerText?.replace(' - YouTube', '') || '';
              }
              description = doc.querySelector('meta[property="og:description"]')?.getAttribute('content') || doc.querySelector('meta[name="description"]')?.getAttribute('content') || '';
            }
          } catch (e) { console.error("HTML fetch failed", e); }

          return { title, description };
        }
      } catch (err) {
        console.error("無法抓取 YT 資訊:", err);
      }
      return null;
    };

    // 解析訂閱數轉換為真實數字供排序使用
    const parseSubscribers = (v) => {
      const parseStr = (str) => {
        if (!str) return 0;
        let num = parseFloat(str.replace(/[^0-9.]/g, ''));
        if (isNaN(num)) return 0;
        if (str.toUpperCase().includes('K')) num *= 1000;
        if (str.toUpperCase().includes('M')) num *= 1000000;
        if (str.toUpperCase().includes('萬')) num *= 10000;
        return num;
      };
      const yt = parseStr(v.youtubeSubscribers || v.subscribers);
      const tw = parseStr(v.twitchFollowers);
      return yt + tw;
    };

    const TagBadge = ({ text, onClick, selected }) => (
      <span onClick={onClick} className={`px-3 py-1 rounded-full text-xs font-medium cursor-pointer transition-colors border ${selected ? 'bg-purple-600 text-white border-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.4)]' : 'bg-gray-800 text-gray-300 border-gray-700 hover:bg-gray-700 hover:text-white'}`}>{text}</span>
    );

    // --- 新增：可連動時段編輯器元件 ---
    const ScheduleEditor = ({ isAnytime, setIsAnytime, slots, setSlots }) => {
      const addSlot = () => setSlots([...slots, { day: '星期一', start: '20:00', end: '22:00' }]);
      const updateSlot = (idx, field, val) => {
        const newSlots = [...slots];
        newSlots[idx][field] = val;
        setSlots(newSlots);
      };
      const removeSlot = (idx) => {
        setSlots(slots.filter((_, i) => i !== idx));
      };

      return (
        <div className="bg-gray-900 border border-gray-700 rounded-xl p-4 mt-1">
          <label className="flex items-center gap-2 cursor-pointer group mb-3">
            <input type="checkbox" checked={isAnytime} onChange={e => setIsAnytime(e.target.checked)} className="w-4 h-4 rounded bg-gray-800 border-gray-600 text-purple-500 focus:ring-purple-500 focus:ring-offset-gray-900" />
            <span className="text-sm text-gray-300 group-hover:text-white transition-colors">我都可以 (隨時可約)</span>
          </label>
          {!isAnytime && (
            <div className="space-y-3">
              {slots.map((slot, index) => (
                <div key={index} className="flex flex-wrap items-center gap-2 bg-gray-800/50 p-2 rounded-lg border border-gray-700">
                  <select value={slot.day} onChange={e => updateSlot(index, 'day', e.target.value)} className="bg-gray-800 border border-gray-600 rounded p-1.5 text-white text-xs outline-none focus:border-purple-500">
                    {['星期一','星期二','星期三','星期四','星期五','星期六','星期日','平日','週末','每日'].map(d=><option key={d} value={d}>{d}</option>)}
                  </select>
                  <input type="time" value={slot.start} onChange={e => updateSlot(index, 'start', e.target.value)} className="bg-gray-800 border border-gray-600 rounded p-1.5 text-white text-xs outline-none focus:border-purple-500" />
                  <span className="text-gray-400 text-xs">至</span>
                  <input type="time" value={slot.end} onChange={e => updateSlot(index, 'end', e.target.value)} className="bg-gray-800 border border-gray-600 rounded p-1.5 text-white text-xs outline-none focus:border-purple-500" />
                  <button type="button" onClick={() => removeSlot(index)} className="text-red-400 hover:text-red-300 ml-auto px-2 transition-colors"><i className="fa-solid fa-trash"></i></button>
                </div>
              ))}
              <button type="button" onClick={addSlot} className="text-xs text-purple-400 hover:text-white flex items-center gap-1 mt-2 bg-purple-500/10 hover:bg-purple-500 px-3 py-1.5 rounded-lg border border-purple-500/20 transition-colors">
                <i className="fa-solid fa-plus"></i> 新增時段
              </button>
            </div>
          )}
        </div>
      );
    };

    // --- 連動類型勾選元件 ---
    const CollabTypeCheckboxes = ({ formState, setFormState, showToast }) => {
      const toggleCollab = (type) => {
        let newTypes = [...formState.collabTypes];
        if (newTypes.includes(type)) {
          newTypes = newTypes.filter(t => t !== type);
        } else {
          const totalSelected = newTypes.length + (formState.isOtherCollab ? 1 : 0);
          if (totalSelected >= 3) return showToast("主要願意連動類型至多只能選擇三項喔！");
          newTypes.push(type);
        }
        setFormState({...formState, collabTypes: newTypes});
      };

      const toggleOther = () => {
        const willBeChecked = !formState.isOtherCollab;
        if (willBeChecked) {
          const totalSelected = formState.collabTypes.length;
          if (totalSelected >= 3) return showToast("主要願意連動類型至多只能選擇三項喔！");
        }
        setFormState({...formState, isOtherCollab: willBeChecked});
      };

      return (
        <div className="bg-gray-900 border border-gray-700 rounded-xl p-4 mt-1">
          <div className="flex flex-wrap gap-3">
            {PREDEFINED_COLLABS.map(type => (
              <label key={type} className="flex items-center gap-2 cursor-pointer group">
                <input type="checkbox" checked={formState.collabTypes.includes(type)} onChange={() => toggleCollab(type)} className="w-4 h-4 rounded bg-gray-800 border-gray-600 text-purple-500 focus:ring-purple-500 focus:ring-offset-gray-900" />
                <span className="text-sm text-gray-300 group-hover:text-white transition-colors">{type}</span>
              </label>
            ))}
            <label className="flex items-center gap-2 cursor-pointer group">
              <input type="checkbox" checked={formState.isOtherCollab} onChange={toggleOther} className="w-4 h-4 rounded bg-gray-800 border-gray-600 text-purple-500 focus:ring-purple-500 focus:ring-offset-gray-900" />
              <span className="text-sm text-gray-300 group-hover:text-white transition-colors">其他</span>
            </label>
          </div>
          {formState.isOtherCollab && (
            <div className="mt-3 pl-6">
              <input type="text" value={formState.otherCollabText} onChange={e => setFormState({...formState, otherCollabText: e.target.value})} placeholder="請輸入您的其他連動類型..." className="w-full bg-gray-800 border border-gray-600 rounded-lg p-2 text-white text-sm outline-none focus:border-purple-500" />
            </div>
          )}
        </div>
      );
    };

    // --- 獨立元件區 ---
    const HomePage = ({ navigate }) => (
      <section className="pt-16 pb-20 px-4 text-center max-w-5xl mx-auto">
        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-300 text-sm font-medium mb-6">
          <i className="fa-solid fa-rocket"></i> <span>專為 VTuber 打造的聯動平台</span>
        </div>
        <h1 className="text-3xl md:text-5xl lg:text-6xl font-extrabold tracking-tight mb-12 leading-tight">
          V-NEXUS <br /><br />
          讓是I人的你 <br className="my-2" />
          也可以找到<span className="bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-400 to-red-400">最佳聯動夥伴</span>
        </h1>
        <p className="text-gray-400 mb-10 max-w-2xl mx-auto text-lg leading-relaxed">
          大家平時要找聯動夥伴，是不是不知道該如何開口，又不敢隨便私訊怕打擾對方？<br className="hidden md:block" />
          註冊你的名片，找尋你的夥伴吧！
        </p>
        <div className="flex flex-col sm:flex-row justify-center items-start gap-4">
          <button onClick={() => navigate('grid')} className="h-14 bg-purple-600 hover:bg-purple-500 text-white px-8 rounded-xl font-bold shadow-lg shadow-purple-500/25 transition-transform hover:scale-105 w-full sm:w-auto flex items-center justify-center">
            <i className="fa-solid fa-magnifying-glass mr-2"></i>開始尋找VT夥伴
          </button>
          <button onClick={() => navigate('dashboard')} className="h-14 bg-gray-800 hover:bg-gray-700 border border-gray-700 text-white px-8 rounded-xl font-bold shadow-lg transition-transform hover:scale-105 w-full sm:w-auto flex items-center justify-center">
            <i className="fa-solid fa-pen-to-square mr-2"></i>註冊Vtuber名片
          </button>
          <div className="flex flex-col items-center w-full sm:w-auto">
            <a href="https://t.co/pSbScwAIqh" target="_blank" rel="noopener noreferrer" className="h-14 bg-blue-600 hover:bg-blue-500 text-white px-8 rounded-xl font-bold shadow-lg shadow-blue-500/25 transition-transform hover:scale-105 flex items-center justify-center w-full sm:w-auto">
              <i className="fa-solid fa-clipboard-list mr-2"></i>初期意見調查
            </a>
            <span className="text-gray-500 text-[10px] mt-2 font-bold">(歡迎不吝提供建議)</span>
          </div>
        </div>
      </section>
    );

    const CollabsPage = ({ collabs, isLoading, user, isVerified, onAddCollab, onDeleteCollab, isAdmin, showToast, currentTime }) => {
      const [newCollab, setNewCollab] = useState({ dateTime: '', title: '', description: '', streamUrl: '', coverUrl: '' });
      const [isFetchingYT, setIsFetchingYT] = useState(false);

      const handleStreamUrlChange = async (e) => {
        const url = e.target.value;
        setNewCollab(prev => ({ ...prev, streamUrl: url }));
        
        if (url.includes('youtube.com') || url.includes('youtu.be')) {
          setIsFetchingYT(true);
          const ytData = await fetchYouTubeData(url);
          if (ytData) {
            setNewCollab(prev => ({
              ...prev,
              title: prev.title || ytData.title,
              description: prev.description || ytData.description
            }));
          }
          setIsFetchingYT(false);
        }
      };

      const handlePublish = () => {
        if (!newCollab.dateTime) return showToast("請選擇聯動日期與時間！");
        if (!newCollab.streamUrl) return showToast("請填寫直播連結！");
        if (!newCollab.title) return showToast("請填寫連動標題！");

        const dt = new Date(newCollab.dateTime);
        const startTimestamp = dt.getTime();
        const dateStr = `${dt.getMonth()+1}/${dt.getDate()} (${['日','一','二','三','四','五','六'][dt.getDay()]})`;
        const timeStr = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;

        onAddCollab({ ...newCollab, date: dateStr, time: timeStr, startTimestamp });
        setNewCollab({ dateTime: '', title: '', description: '', streamUrl: '', coverUrl: '' });
      };

      return (
        <div className="max-w-5xl mx-auto px-4 py-8 text-center">
          <h2 className="text-3xl font-extrabold text-red-400 mb-2"><i className="fa-solid fa-broadcast-tower mr-3"></i>確定連動時間表</h2>
          <p className="text-gray-400 mb-8">準備好零食與飲料，準時前往待機室支持喜歡的 VTuber 吧！</p>
          
          {/* 讓已認證 VTuber 自行發布 */}
          {isVerified && (
            <div className="bg-red-500/10 border border-red-500/30 rounded-3xl p-6 sm:p-8 mb-12 text-left shadow-lg animate-fade-in-up relative overflow-hidden">
              <div className="absolute -top-10 -right-10 w-40 h-40 bg-red-500/10 rounded-full blur-3xl"></div>
              <h3 className="font-bold text-white mb-6 text-xl flex items-center"><i className="fa-solid fa-calendar-plus text-red-400 mr-3"></i>發布新的連動行程</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4 relative z-10">
                <div><label className="text-xs text-gray-400 mb-1 block">聯動時間 <span className="text-red-400">*</span></label><input type="datetime-local" value={newCollab.dateTime} onChange={e=>setNewCollab({...newCollab, dateTime: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-red-500 outline-none text-sm" /></div>
                <div className="relative">
                  <label className="text-xs text-gray-400 mb-1 block flex items-center justify-between">
                    <span>直播連結 (YT待機室/Twitch) <span className="text-red-400">*</span></span>
                    {isFetchingYT && <span className="text-red-400 font-bold animate-pulse"><i className="fa-solid fa-spinner fa-spin mr-1"></i>抓取標題中...</span>}
                  </label>
                  <input type="url" placeholder="https://... (貼上 YT 連結自動抓取標題與說明)" value={newCollab.streamUrl} onChange={handleStreamUrlChange} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-red-500 outline-none text-sm" />
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4 relative z-10">
                <div><label className="text-xs text-gray-400 mb-1 block">連動標題 (參與人員) <span className="text-red-400">*</span></label><input type="text" placeholder="例：APEX 頂獵挑戰！ ft. 某某某" value={newCollab.title} onChange={e=>setNewCollab({...newCollab, title: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-red-500 outline-none text-sm" /></div>
                <div>
                  <label className="text-xs text-gray-400 mb-1 block">自訂封面圖網址 (選填)</label>
                  <input type="url" placeholder="貼上 YouTube 連結會自動抓縮圖！亦可在此自訂" value={newCollab.coverUrl} onChange={e=>setNewCollab({...newCollab, coverUrl: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-red-500 outline-none text-sm" />
                </div>
              </div>
              <div className="mb-6 relative z-10"><label className="text-xs text-gray-400 mb-1 block">連動簡述</label><textarea placeholder="企劃內容簡述..." value={newCollab.description} onChange={e=>setNewCollab({...newCollab, description: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-red-500 outline-none resize-none text-sm" rows="2" /></div>
              <div className="flex justify-end relative z-10">
                <button onClick={handlePublish} className="bg-red-600 hover:bg-red-500 text-white px-8 py-3 rounded-xl text-sm font-bold shadow-[0_0_15px_rgba(220,38,38,0.4)] transition-transform hover:scale-105"><i className="fa-solid fa-paper-plane mr-2"></i>發布至時間表</button>
              </div>
            </div>
          )}

          {isLoading ? (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {[1, 2, 3, 4].map(i => (
                <div key={i} className="bg-gray-800/40 rounded-3xl border border-gray-700 flex flex-col animate-pulse overflow-hidden h-[320px]">
                  <div className="h-48 bg-gray-700/50 w-full"></div>
                  <div className="p-5 space-y-3 flex-1">
                    <div className="h-5 bg-gray-600/50 rounded w-3/4"></div>
                    <div className="h-4 bg-gray-700/50 rounded w-full"></div>
                    <div className="h-4 bg-gray-700/50 rounded w-1/2"></div>
                  </div>
                </div>
              ))}
            </div>
          ) : collabs.length === 0 ? (
            <div className="py-20 bg-gray-800/30 rounded-3xl border border-gray-700/50">
              <i className="fa-solid fa-calendar-xmark text-4xl text-gray-600 mb-4"></i>
              <p className="text-gray-500">目前尚未有即將到來的連動行程</p>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
              {collabs.map(c => {
                const displayImg = c.coverUrl || getYouTubeThumbnail(c.streamUrl) || 'https://images.unsplash.com/photo-1598550476439-6847785fcea6?auto=format&fit=crop&q=80&w=800';
                
                // 判斷是否正在直播 (開始時間 ~ 3小時內)
                const isLive = c.startTimestamp && currentTime >= c.startTimestamp && currentTime <= c.startTimestamp + (3 * 60 * 60 * 1000);

                return (
                  <div key={c.id} className={`group ${isLive ? 'bg-red-950/40 border-2 border-red-500 shadow-[0_0_30px_rgba(220,38,38,0.4)] transform scale-[1.02] z-10' : 'bg-gray-800/60 border border-gray-700 hover:border-red-500/50 hover:shadow-red-500/20'} rounded-3xl overflow-hidden flex flex-col transition-all relative`}>
                    
                    {isLive && (
                      <div className="absolute top-0 left-0 w-full bg-red-600 text-white text-center py-1.5 font-bold text-xs tracking-widest z-30 animate-pulse">
                        <i className="fa-solid fa-satellite-dish mr-2"></i> 正在進行連動中
                      </div>
                    )}

                    {(isAdmin || (user && c.userId === user.uid)) && (
                      <button onClick={() => onDeleteCollab(c.id)} className={`absolute ${isLive ? 'top-10' : 'top-4'} right-4 z-20 bg-black/60 backdrop-blur-md text-gray-300 hover:text-red-400 hover:bg-black/80 p-2 rounded-lg transition-colors`} title="刪除此行程"><i className="fa-solid fa-trash"></i></button>
                    )}
                    <div className={`h-48 relative overflow-hidden flex-shrink-0 ${isLive ? 'mt-8' : ''}`}>
                      <img src={displayImg} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="連動封面" />
                      <div className="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/20 to-transparent"></div>
                      <div className="absolute top-4 left-4 bg-black/80 backdrop-blur-md border border-gray-600 text-white px-3 py-1.5 rounded-xl flex flex-col items-center shadow-lg transform -rotate-2">
                        <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">{c.date}</span>
                        <span className="text-sm text-red-400 font-extrabold">{c.time}</span>
                      </div>
                      {c.streamUrl && (
                        <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10 pointer-events-none">
                          <div className={`w-16 h-16 ${isLive ? 'bg-red-500' : 'bg-red-600/90'} text-white rounded-full flex items-center justify-center pl-1 shadow-[0_0_30px_rgba(220,38,38,0.8)] backdrop-blur-sm`}><i className="fa-solid fa-play text-2xl"></i></div>
                        </div>
                      )}
                    </div>
                    <div className="p-6 flex-1 flex flex-col relative z-10 bg-gray-900/80">
                      <h3 className={`text-xl font-extrabold text-white mb-3 line-clamp-2 leading-tight transition-colors ${isLive ? 'text-red-400' : 'group-hover:text-red-400'}`}>{c.title}</h3>
                      <p className="text-sm text-gray-400 mb-6 line-clamp-3 flex-1 leading-relaxed whitespace-pre-wrap">{c.description}</p>
                      {c.streamUrl ? (
                        <a href={c.streamUrl} target="_blank" rel="noopener noreferrer" className={`w-full ${isLive ? 'bg-red-500 shadow-[0_0_20px_rgba(220,38,38,0.6)] animate-pulse' : 'bg-red-600 hover:bg-red-500 group-hover:shadow-[0_0_20px_rgba(220,38,38,0.4)]'} text-white py-3.5 rounded-xl font-bold transition-all flex justify-center items-center gap-2`}>
                          <i className="fa-solid fa-play-circle text-lg"></i> 前往待機室 / 觀看直播
                        </a>
                      ) : (
                        <div className="w-full bg-gray-800 text-gray-500 py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 border border-gray-700"><i className="fa-solid fa-clock"></i> 直播連結尚未提供</div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    const TipsPage = ({ handleCopyTemplate, copiedTemplate, customTips }) => (
      <div className="max-w-3xl mx-auto px-4 py-8">
        <h2 className="text-2xl font-bold text-yellow-400 mb-6 text-center"><i className="fa-solid fa-lightbulb mr-3"></i>邀約小技巧與範本</h2>
        <div className="bg-gray-800/50 p-6 rounded-xl border border-gray-700 shadow-xl">
          <div className="flex justify-between items-center mb-4">
            <h3 className="font-bold text-white">標準邀請信範本</h3>
            <button onClick={() => handleCopyTemplate(customTips)} className={`text-white px-3 py-1.5 rounded text-sm transition-colors ${copiedTemplate ? 'bg-green-600' : 'bg-purple-600 hover:bg-purple-500'}`}>
              {copiedTemplate ? <><i className="fa-solid fa-check mr-1"></i>已複製</> : <><i className="fa-solid fa-copy mr-1"></i>一鍵複製</>}
            </button>
          </div>
          <pre className="text-sm text-gray-300 bg-gray-900 p-4 rounded-lg font-mono whitespace-pre-wrap leading-relaxed border border-gray-800">{customTips}</pre>
        </div>
      </div>
    );

    // --- 聯動隨機配對元件 ---
    const MatchPage = ({ vtubers, navigate, showToast }) => {
      const [desiredType, setDesiredType] = useState('');
      const [availableTime, setAvailableTime] = useState('');
      const [matchedVtuber, setMatchedVtuber] = useState(null);
      const [isMatching, setIsMatching] = useState(false);

      const handleMatch = () => {
        setIsMatching(true);
        setMatchedVtuber(null);

        setTimeout(() => {
          const candidates = (vtubers || []).filter(v => v.isVerified);
          if (candidates.length === 0) {
            setIsMatching(false);
            return showToast("目前資料庫尚無可配對的已認證創作者！");
          }

          let filtered = candidates;
          if (desiredType) {
            filtered = candidates.filter(v => v.collabTypes && v.collabTypes.includes(desiredType));
          }
          
          if (filtered.length === 0) {
            showToast("找不到完全符合類型的對象，為您隨機推薦一位命定夥伴！");
            filtered = candidates; // Fallback to all
          } else {
            showToast("🎉 配對成功！為您找到完美夥伴！");
          }

          const randomV = filtered[Math.floor(Math.random() * filtered.length)];
          setMatchedVtuber(randomV);
          setIsMatching(false);
        }, 2000); // 模擬 2 秒雷達動畫
      };

      return (
        <div className="max-w-4xl mx-auto px-4 py-12 text-center">
          <h2 className="text-3xl font-extrabold text-purple-400 mb-4 flex justify-center items-center gap-3"><i className="fa-solid fa-dice"></i> 聯動隨機配對</h2>
          <p className="text-gray-400 mb-10">不知道該找誰玩嗎？讓 V-Nexus 幫您隨機抽籤配對，或許會遇到意想不到的好夥伴喔！</p>
          
          <div className="bg-gray-800/40 border border-gray-700 rounded-3xl p-8 shadow-2xl max-w-xl mx-auto relative overflow-hidden">
            <div className="absolute -top-16 -left-16 w-32 h-32 bg-purple-600/10 rounded-full blur-3xl"></div>
            
            {!isMatching && !matchedVtuber && (
              <div className="space-y-6 relative z-10 animate-fade-in-up">
                <div className="text-left">
                  <label className="block text-sm font-bold text-gray-300 mb-2">想要聯動的類型 (選填)</label>
                  <select value={desiredType} onChange={e=>setDesiredType(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none text-base">
                    <option value="">不限類型 (完全隨機)</option>
                    {PREDEFINED_COLLABS.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div className="text-left">
                  <label className="block text-sm font-bold text-gray-300 mb-2">可以的時間 (選填儀式感)</label>
                  <input type="text" placeholder="例：週末晚上、隨時可約" value={availableTime} onChange={e=>setAvailableTime(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none text-base" />
                </div>
                <button onClick={handleMatch} className="w-full mt-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white py-4 rounded-xl font-bold text-lg shadow-[0_0_20px_rgba(168,85,247,0.4)] transition-transform hover:scale-105 flex justify-center items-center gap-2">
                  <i className="fa-solid fa-wand-magic-sparkles"></i> 開始尋找命定夥伴
                </button>
              </div>
            )}

            {isMatching && (
              <div className="py-12 flex flex-col items-center justify-center animate-fade-in-up">
                <div className="relative w-32 h-32 mb-6">
                  <div className="absolute inset-0 border-4 border-gray-700 rounded-full"></div>
                  <div className="absolute inset-0 border-4 border-t-purple-500 border-r-transparent border-b-transparent border-l-transparent rounded-full animate-radar"></div>
                  <i className="fa-solid fa-satellite-dish text-4xl text-purple-400 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></i>
                </div>
                <h3 className="text-xl font-bold text-white mb-2 animate-pulse">雷達掃描中...</h3>
                <p className="text-sm text-gray-400">正在廣袤的 V 圈星海中尋找符合您頻率的對象</p>
              </div>
            )}

            {matchedVtuber && !isMatching && (
              <div className="animate-fade-in-up relative z-10 flex flex-col items-center">
                <h3 className="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 mb-6">就是決定是你了！</h3>
                
                <div className="w-full group bg-gray-900/80 border border-purple-500/50 rounded-2xl overflow-hidden shadow-[0_0_30px_rgba(168,85,247,0.2)] flex flex-col text-left mb-6">
                  <div className="h-28 relative overflow-hidden flex-shrink-0">
                    <img src={matchedVtuber.banner} className="w-full h-full object-cover opacity-60" />
                    <span className="absolute top-2 right-2 px-2 py-0.5 text-[10px] font-bold bg-black/50 border border-gray-600 rounded text-white">{matchedVtuber.agency}</span>
                  </div>
                  <div className="p-4 relative flex-1 flex flex-col">
                    <img src={matchedVtuber.avatar} className="absolute -top-10 w-20 h-20 rounded-xl border-2 border-gray-800 bg-gray-900 object-cover" />
                    <div className="ml-24 mb-3">
                      <h3 className="font-bold text-white truncate text-lg flex items-center gap-1">
                        {matchedVtuber.name} {matchedVtuber.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-sm"></i>}
                      </h3>
                      <div className="flex gap-2 text-xs mt-1 text-gray-400">
                        {(matchedVtuber.youtubeSubscribers || matchedVtuber.subscribers) && <span className="flex items-center gap-1"><i className="fa-brands fa-youtube text-red-400"></i> {matchedVtuber.youtubeSubscribers || matchedVtuber.subscribers}</span>}
                        <span className="flex items-center gap-1 text-green-400"><i className="fa-solid fa-thumbs-up"></i> {matchedVtuber.likes || 0}</span>
                      </div>
                    </div>
                    <div className="flex flex-wrap gap-2 mt-2">
                      {(matchedVtuber.collabTypes || []).slice(0,3).map(t=><span key={t} className="text-[10px] text-gray-300 bg-gray-800 px-2 py-1 rounded-md border border-gray-700">{t}</span>)}
                    </div>
                  </div>
                </div>

                <div className="flex gap-3 w-full">
                  <button onClick={() => {setMatchedVtuber(null); setDesiredType(''); setAvailableTime('');}} className="flex-1 bg-gray-800 hover:bg-gray-700 text-white py-3.5 rounded-xl text-sm font-bold transition-colors">再抽一次</button>
                  <button onClick={() => { window.location.hash = 'grid'; setTimeout(() => { window.dispatchEvent(new HashChangeEvent('hashchange')); navigate('profile'); }, 50); }} className="flex-[2] bg-purple-600 hover:bg-purple-500 text-white py-3.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-purple-500/25 flex justify-center items-center gap-2"><i className="fa-solid fa-handshake"></i> 前往對方名片</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- 系統管理員後台元件 ---
    const AdminPage = ({ vtubers, bulletins, collabs, tips, onDeleteVtuber, onVerifyVtuber, onUpdateVtuber, onDeleteBulletin, onAddCollab, onDeleteCollab, onSaveTips, showToast, onResetAllCollabTypes }) => {
      const [activeTab, setActiveTab] = useState('vtubers');
      const [newCollab, setNewCollab] = useState({ dateTime: '', title: '', description: '', streamUrl: '', coverUrl: '' });
      const [editTips, setEditTips] = useState(tips);
      const [isFetchingYT, setIsFetchingYT] = useState(false);
      
      const [editingVtuber, setEditingVtuber] = useState(null);

      const pendingVtubers = vtubers.filter(v => !v.isVerified);
      const verifiedVtubers = vtubers.filter(v => v.isVerified);

      const handleEditClick = (v) => {
        const standard = (v.collabTypes || []).filter(t => PREDEFINED_COLLABS.includes(t));
        const other = (v.collabTypes || []).filter(t => !PREDEFINED_COLLABS.includes(t))[0] || '';

        setEditingVtuber({
          ...v,
          tags: Array.isArray(v.tags) ? v.tags.join(', ') : v.tags || '',
          collabTypes: standard,
          isOtherCollab: !!other,
          otherCollabText: other,
          isScheduleAnytime: v.isScheduleAnytime || false,
          scheduleSlots: v.scheduleSlots || [],
          youtubeSubscribers: v.youtubeSubscribers || v.subscribers || '',
          twitchFollowers: v.twitchFollowers || '',
          youtubeUrl: v.youtubeUrl || v.channelUrl || '',
          twitchUrl: v.twitchUrl || '',
          xUrl: v.xUrl || '',
          igUrl: v.igUrl || '',
          contactEmail: v.contactEmail || '',
          streamingStyle: v.streamingStyle || '一般型態',
          likes: v.likes || 0
        });
      };

      const handleSaveEdit = () => {
        onUpdateVtuber(editingVtuber.id, editingVtuber);
        setEditingVtuber(null);
      };

      const handleAdminStreamUrlChange = async (e) => {
        const url = e.target.value;
        setNewCollab(prev => ({ ...prev, streamUrl: url }));
        
        if (url.includes('youtube.com') || url.includes('youtu.be')) {
          setIsFetchingYT(true);
          const ytData = await fetchYouTubeData(url);
          if (ytData) {
            setNewCollab(prev => ({
              ...prev,
              title: prev.title || ytData.title,
              description: prev.description || ytData.description
            }));
          }
          setIsFetchingYT(false);
        }
      };

      const handleAdminPublish = () => {
        if (!newCollab.dateTime) return showToast("請選擇聯動日期與時間！");
        if (!newCollab.streamUrl) return showToast("請填寫直播連結！");
        if (!newCollab.title) return showToast("請填寫連動標題！");

        const dt = new Date(newCollab.dateTime);
        const startTimestamp = dt.getTime();
        const dateStr = `${dt.getMonth()+1}/${dt.getDate()} (${['日','一','二','三','四','五','六'][dt.getDay()]})`;
        const timeStr = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;

        onAddCollab({ ...newCollab, date: dateStr, time: timeStr, startTimestamp });
        setNewCollab({ dateTime: '', title: '', description: '', streamUrl: '', coverUrl: '' });
      };

      return (
        <div className="max-w-5xl mx-auto px-4 py-8 relative">
          <div className="text-center mb-8">
            <h2 className="text-3xl font-extrabold text-red-400 mb-2"><i className="fa-solid fa-shield-halved mr-3"></i>超級管理員中心</h2>
            <p className="text-sm text-gray-400">目前身分認證：apex.dasa@gmail.com</p>
          </div>

          <div className="flex gap-2 overflow-x-auto pb-4 mb-6">
            {[
              { id: 'vtubers', icon: 'fa-address-card', label: '名片與審核管理' },
              { id: 'bulletins', icon: 'fa-bullhorn', label: '招募管理' },
              { id: 'collabs', icon: 'fa-broadcast-tower', label: '連動時間表' },
              { id: 'tips', icon: 'fa-lightbulb', label: '小技巧範本' }
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2 rounded-xl font-bold text-sm whitespace-nowrap flex items-center gap-2 transition-colors ${activeTab === tab.id ? 'bg-red-600 text-white shadow-lg shadow-red-500/20' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>
                <i className={`fa-solid ${tab.icon}`}></i> {tab.label}
                {tab.id === 'vtubers' && pendingVtubers.length > 0 && (
                  <span className="bg-white text-red-600 px-2 py-0.5 rounded-full text-xs ml-1">{pendingVtubers.length}</span>
                )}
              </button>
            ))}
          </div>

          <div className="bg-gray-800/40 border border-gray-700 rounded-3xl p-6 shadow-2xl">
            {activeTab === 'vtubers' && (
              <div className="space-y-8">
                {/* 待審核區塊 */}
                <div>
                  <h3 className="text-xl font-bold text-yellow-400 mb-4 border-b border-gray-700 pb-2"><i className="fa-solid fa-user-clock mr-2"></i>待審核名單 ({pendingVtubers.length})</h3>
                  {pendingVtubers.length === 0 && <p className="text-gray-500 text-sm">目前沒有待審核的名片</p>}
                  <div className="space-y-3">
                    {pendingVtubers.map(v => (
                      <div key={v.id} className="flex flex-col sm:flex-row sm:items-center justify-between bg-gray-900 p-4 rounded-xl border border-yellow-500/30 gap-4">
                        <div className="flex items-center gap-4">
                          <img src={v.avatar} className="w-12 h-12 rounded-lg bg-gray-800 object-cover flex-shrink-0" />
                          <div>
                            <p className="font-bold text-white text-sm flex items-center gap-2">
                              {v.name} <span className="bg-gray-800 text-gray-400 px-2 py-0.5 rounded text-[10px]">{v.streamingStyle || '一般型態'}</span>
                            </p>
                            <p className="text-xs text-gray-400 mt-1 line-clamp-1">{v.description}</p>
                            {v.verificationNote && (
                              <p className="text-xs text-yellow-400 mt-1 bg-yellow-500/10 p-1.5 rounded border border-yellow-500/20">
                                <i className="fa-solid fa-key mr-1"></i> 驗證備註: {v.verificationNote}
                              </p>
                            )}
                            <div className="flex gap-2 mt-1">
                              {(v.youtubeUrl || v.channelUrl) && <a href={v.youtubeUrl || v.channelUrl} target="_blank" className="text-xs text-red-400 hover:underline inline-block"><i className="fa-brands fa-youtube"></i> 檢查</a>}
                              {v.twitchUrl && <a href={v.twitchUrl} target="_blank" className="text-xs text-purple-400 hover:underline inline-block"><i className="fa-brands fa-twitch"></i> 檢查</a>}
                            </div>
                          </div>
                        </div>
                        <div className="flex items-center gap-2 flex-shrink-0">
                          <button onClick={() => onVerifyVtuber(v.id)} className="text-green-400 bg-green-500/10 hover:bg-green-500 hover:text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors"><i className="fa-solid fa-check mr-1"></i>通過審核</button>
                          <button onClick={() => handleEditClick(v)} className="text-blue-400 bg-blue-500/10 hover:bg-blue-500 hover:text-white px-3 py-2 rounded-lg text-sm font-bold transition-colors"><i className="fa-solid fa-pen"></i></button>
                          <button onClick={() => onDeleteVtuber(v.id)} className="text-red-400 bg-red-500/10 hover:bg-red-500 hover:text-white px-3 py-2 rounded-lg text-sm font-bold transition-colors"><i className="fa-solid fa-trash"></i></button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* 已審核區塊 */}
                <div>
                  <h3 className="text-xl font-bold text-white mb-4 border-b border-gray-700 pb-2">已上架名片 ({verifiedVtubers.length})</h3>
                  {verifiedVtubers.length === 0 && <p className="text-gray-500 text-sm">目前尚無已審核的名片</p>}
                  <div className="space-y-3">
                    {verifiedVtubers.map(v => (
                      <div key={v.id} className="flex items-center justify-between bg-gray-900 p-4 rounded-xl border border-gray-700">
                        <div className="flex items-center gap-4">
                          <img src={v.avatar} className="w-10 h-10 rounded-lg bg-gray-800 object-cover flex-shrink-0" />
                          <div>
                            <p className="font-bold text-white text-sm flex items-center gap-1">{v.name} <i className="fa-solid fa-circle-check text-blue-400 ml-1 text-xs" title="已認證"></i></p>
                            <p className="text-xs text-gray-500">{v.agency}</p>
                          </div>
                        </div>
                        <div className="flex items-center gap-2">
                          <button onClick={() => handleEditClick(v)} className="text-blue-400 hover:text-white bg-blue-500/10 hover:bg-blue-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex-shrink-0">編輯</button>
                          <button onClick={() => onDeleteVtuber(v.id)} className="text-gray-400 hover:text-white bg-gray-800 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex-shrink-0">下架刪除</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                
                {/* 危險操作區塊：強制重置所有名片的連動類型 */}
                <div className="mt-12 pt-6 border-t border-red-500/50">
                  <h3 className="text-xl font-bold text-red-400 mb-2"><i className="fa-solid fa-triangle-exclamation mr-2"></i>危險操作區</h3>
                  <p className="text-sm text-gray-400 mb-4">因為系統標籤升級，您可以在此一鍵清除所有名片上的「主要願意連動類型」，迫使用戶重新登入勾選新版標籤。</p>
                  <button onClick={onResetAllCollabTypes} className="bg-red-900 hover:bg-red-700 text-white border border-red-500 px-6 py-3 rounded-xl text-sm font-bold transition-colors shadow-lg shadow-red-500/20">
                    <i className="fa-solid fa-bomb mr-2"></i>重置所有名片的連動類型 (要求重新勾選)
                  </button>
                </div>
              </div>
            )}

            {activeTab === 'bulletins' && (
              <div className="space-y-4">
                <h3 className="text-xl font-bold text-white mb-4">招募文管理 (共 {bulletins.length} 筆)</h3>
                {bulletins.length === 0 && <p className="text-gray-500">目前尚無招募文資料</p>}
                {bulletins.map(b => (
                  <div key={b.id} className="flex flex-col sm:flex-row sm:items-center justify-between bg-gray-900 p-4 rounded-xl border border-gray-700 gap-4">
                    <div className="flex-1"><p className="text-sm text-gray-300 mb-1">{b.content}</p><p className="text-xs text-gray-500">發布者: {b.vtuber?.name} | {b.postedAt}</p></div>
                    <button onClick={() => onDeleteBulletin(b.id)} className="text-red-400 hover:text-white bg-red-500/10 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex-shrink-0">刪除</button>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'collabs' && (
              <div className="space-y-6">
                <div>
                  <h3 className="text-xl font-bold text-white mb-4">新增連動時間 (管理員代發)</h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    <div><label className="text-xs text-gray-400 mb-1 block">聯動時間 <span className="text-red-400">*</span></label><input type="datetime-local" value={newCollab.dateTime} onChange={e=>setNewCollab({...newCollab, dateTime: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none" /></div>
                    <div className="relative">
                      <label className="text-xs text-gray-400 mb-1 block">直播連結 (貼上 YT 連結可自動抓標題) <span className="text-red-400">*</span></label>
                      <input type="url" placeholder="https://..." value={newCollab.streamUrl} onChange={handleAdminStreamUrlChange} className="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none pr-24" />
                      {isFetchingYT && <span className="absolute right-3 top-9 text-[10px] text-red-400 font-bold animate-pulse"><i className="fa-solid fa-spinner fa-spin"></i> 抓取中...</span>}
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div><label className="text-xs text-gray-400 mb-1 block">連動標題 <span className="text-red-400">*</span></label><input type="text" placeholder="連動標題" value={newCollab.title} onChange={e=>setNewCollab({...newCollab, title: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none" /></div>
                    <div><label className="text-xs text-gray-400 mb-1 block">自訂封面圖網址 (選填)</label><input type="url" placeholder="自訂封面圖網址 (選填，不填則自動抓YT)" value={newCollab.coverUrl} onChange={e=>setNewCollab({...newCollab, coverUrl: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none" /></div>
                  </div>
                  <label className="text-xs text-gray-400 mb-1 block">連動簡述</label>
                  <textarea placeholder="連動簡述" value={newCollab.description} onChange={e=>setNewCollab({...newCollab, description: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none resize-none mb-4" rows="3" />
                  <button onClick={handleAdminPublish} className="bg-red-600 hover:bg-red-500 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg">發布</button>
                </div>
                <div className="border-t border-gray-700 pt-6 space-y-4">
                  <h3 className="text-lg font-bold text-white mb-4">現有連動表清單 (簡易檢視)</h3>
                  {collabs.length === 0 && <p className="text-gray-500">目前尚無連動行程</p>}
                  {collabs.map(c => (
                    <div key={c.id} className="flex items-center justify-between bg-gray-900 p-4 rounded-xl border border-gray-700">
                      <div><p className="font-bold text-white text-sm">[{c.date} {c.time}] {c.title}</p><p className="text-xs text-gray-400">{c.description}</p></div>
                      {c.createdAt && <button onClick={() => onDeleteCollab(c.id)} className="text-red-400 hover:text-white bg-red-500/10 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">刪除</button>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'tips' && (
              <div className="space-y-4">
                <h3 className="text-xl font-bold text-white mb-4">編輯邀約小技巧範本</h3>
                <textarea value={editTips} onChange={e=>setEditTips(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none resize-none" rows="10" />
                <button onClick={() => onSaveTips(editTips)} className="bg-red-600 hover:bg-red-500 text-white px-8 py-2.5 rounded-xl text-sm font-bold shadow-lg flex items-center gap-2"><i className="fa-solid fa-floppy-disk"></i> 儲存並發布更新</button>
              </div>
            )}
          </div>

          {/* 管理員專屬編輯名片彈窗 */}
          {editingVtuber && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto animate-fade-in-up shadow-2xl">
                <div className="sticky top-0 bg-gray-900/95 backdrop-blur px-6 py-4 border-b border-gray-800 flex justify-between items-center z-10">
                  <h3 className="font-bold text-white"><i className="fa-solid fa-pen-to-square text-blue-400 mr-2"></i>強制編輯名片：{editingVtuber.name}</h3>
                  <button onClick={() => setEditingVtuber(null)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                </div>
                <div className="p-6 space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs text-gray-400 mb-1">VTuber 名稱</label><input type="text" value={editingVtuber.name} onChange={e=>setEditingVtuber({...editingVtuber, name: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                    <div className="grid grid-cols-2 gap-2">
                      <div><label className="block text-xs text-gray-400 mb-1">所屬勢力</label><select value={editingVtuber.agency} onChange={e=>setEditingVtuber({...editingVtuber, agency: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500"><option>個人勢</option><option>企業勢</option><option>社團勢</option></select></div>
                      <div><label className="block text-xs text-gray-400 mb-1">演出型態</label><select value={editingVtuber.streamingStyle} onChange={e=>setEditingVtuber({...editingVtuber, streamingStyle: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500"><option>一般型態</option><option>男聲女皮 (Babiniku)</option><option>女聲男皮</option><option>無性別/人外</option><option>其他</option></select></div>
                    </div>
                  </div>
                  <div><label className="block text-xs text-gray-400 mb-1">一句話自我介紹</label><textarea rows="2" value={editingVtuber.description} onChange={e=>setEditingVtuber({...editingVtuber, description: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm resize-none outline-none focus:border-blue-500" /></div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs text-gray-400 mb-1">內容標籤 (逗號分隔)</label><input type="text" value={editingVtuber.tags} onChange={e=>setEditingVtuber({...editingVtuber, tags: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                    <div>
                      <label className="block text-xs text-gray-400 mb-1">主要願意連動類型 (至多三項)</label>
                      <CollabTypeCheckboxes formState={editingVtuber} setFormState={setEditingVtuber} showToast={showToast} />
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="md:col-span-2">
                      <label className="block text-xs text-gray-400 mb-1">可連動時段</label>
                      <ScheduleEditor isAnytime={editingVtuber.isScheduleAnytime} setIsAnytime={(val) => setEditingVtuber({...editingVtuber, isScheduleAnytime: val})} slots={editingVtuber.scheduleSlots} setSlots={(val) => setEditingVtuber({...editingVtuber, scheduleSlots: val})} />
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                    <div><label className="block text-xs text-gray-400 mb-1">推薦數 (管理員修改)</label><input type="number" value={editingVtuber.likes} onChange={e=>setEditingVtuber({...editingVtuber, likes: Number(e.target.value)})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs text-gray-400 mb-1">YouTube 訂閱數</label><input type="text" value={editingVtuber.youtubeSubscribers} onChange={e=>setEditingVtuber({...editingVtuber, youtubeSubscribers: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                    <div><label className="block text-xs text-gray-400 mb-1">Twitch 追隨數</label><input type="text" value={editingVtuber.twitchFollowers} onChange={e=>setEditingVtuber({...editingVtuber, twitchFollowers: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs text-gray-400 mb-1">頭像圖片網址</label>
                      <input type="url" value={editingVtuber.avatar} onChange={e=>setEditingVtuber({...editingVtuber, avatar: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" />
                      <p className="text-[10px] text-yellow-400/80 mt-1"><i className="fa-solid fa-circle-info mr-1"></i>小教學：您可以到您的 X (Twitter) 首頁 &gt; 大頭貼 &gt; 滑鼠右鍵 &gt; 複製圖片連結，將圖片連結輸入至此即可。</p>
                    </div>
                    <div>
                      <label className="block text-xs text-gray-400 mb-1">橫幅背景網址</label>
                      <input type="url" value={editingVtuber.banner} onChange={e=>setEditingVtuber({...editingVtuber, banner: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" />
                      <p className="text-[10px] text-yellow-400/80 mt-1"><i className="fa-solid fa-circle-info mr-1"></i>小教學：您可以到您的 X (Twitter) 首頁 &gt; 橫幅 &gt; 滑鼠右鍵 &gt; 複製圖片連結，將圖片連結輸入至此即可。</p>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs text-gray-400 mb-1">YouTube 連結</label><input type="url" value={editingVtuber.youtubeUrl} onChange={e=>setEditingVtuber({...editingVtuber, youtubeUrl: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                    <div><label className="block text-xs text-gray-400 mb-1">Twitch 連結</label><input type="url" value={editingVtuber.twitchUrl} onChange={e=>setEditingVtuber({...editingVtuber, twitchUrl: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs text-gray-400 mb-1">X (Twitter) 連結</label><input type="url" value={editingVtuber.xUrl} onChange={e=>setEditingVtuber({...editingVtuber, xUrl: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                    <div><label className="block text-xs text-gray-400 mb-1">IG 連結</label><input type="url" value={editingVtuber.igUrl} onChange={e=>setEditingVtuber({...editingVtuber, igUrl: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs text-gray-400 mb-1">聯絡 Email</label><input type="email" value={editingVtuber.contactEmail} onChange={e=>setEditingVtuber({...editingVtuber, contactEmail: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                  </div>
                  <div className="pt-4 border-t border-gray-800 flex justify-end gap-3">
                    <button onClick={() => setEditingVtuber(null)} className="px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white transition-colors">取消</button>
                    <button onClick={handleSaveEdit} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg transition-colors">強制儲存更新</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // 從網址讀取初始頁面
    const getInitialView = () => {
      const hash = window.location.hash.replace('#', '');
      return hash || 'home';
    };

    // --- 主應用程式 ---
    function App() {
      const [currentView, setCurrentView] = useState(getInitialView());
      const [selectedVTuber, setSelectedVTuber] = useState(null);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [isMobileFilterOpen, setIsMobileFilterOpen] = useState(false);
      const [sortOrder, setSortOrder] = useState('random'); 
      
      const [isLoading, setIsLoading] = useState(true);
      const [currentTime, setCurrentTime] = useState(Date.now());
      
      const [user, setUser] = useState(null);
      const [realVtubers, setRealVtubers] = useState([]);
      const [realBulletins, setRealBulletins] = useState([]);

      const [searchQuery, setSearchQuery] = useState('');
      const [selectedTags, setSelectedTags] = useState([]);
      const [selectedAgency, setSelectedAgency] = useState('All');
      
      const [isCollabModalOpen, setIsCollabModalOpen] = useState(false);
      const [copiedTemplate, setCopiedTemplate] = useState(false);
      
      const [newBulletin, setNewBulletin] = useState({ content: '', tags: '', collabType: '', collabTypeOther: '', collabSize: '', collabTime: '', recruitEndTime: '' });
      const [inviteMessage, setInviteMessage] = useState(''); 
      
      const [realCollabs, setRealCollabs] = useState([]);
      const [realTips, setRealTips] = useState("您好，我是 [您的名字/頻道名]。\n近期有在關注您的頻道，非常喜歡您的 [對方特色/直播內容]！\n\n想請問近期是否有機會邀請您一起進行 [企劃名稱/遊戲] 的連動呢？\n\n◆ 預計時間：[日期區間] 的 [時段]\n◆ 企劃內容：[簡述約 1-2 句話]\n◆ 目前參與人數：[人數]\n\n如果有興趣的話，我們可以進一步討論細節！\n若您近期排程較滿或不方便也完全沒關係，非常感謝您抽空閱讀。祝 直播順利！");

      const [toastMsg, setToastMsg] = useState('');
      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };

      const [profileForm, setProfileForm] = useState({
        name: '', agency: '個人勢', tags: '', description: '',
        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${Math.random()}&backgroundColor=b6e3f4`,
        banner: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&q=80&w=1000',
        isScheduleAnytime: false, scheduleSlots: [], 
        collabTypes: [], isOtherCollab: false, otherCollabText: '', 
        streamingStyle: '一般型態',
        youtubeSubscribers: '', twitchFollowers: '', youtubeUrl: '', twitchUrl: '',
        xUrl: '', igUrl: '', contactEmail: '', verificationNote: ''
      });

      const isAdmin = user && user.email === 'apex.dasa@gmail.com';

      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.replace('#', '');
          if (hash === 'profile' && !selectedVTuber) {
            window.location.hash = 'grid';
          } else {
            setCurrentView(hash || 'home');
          }
        };

        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, [selectedVTuber]);

      useEffect(() => {
        const unsubscribeAuth = onAuthStateChanged(auth, (u) => setUser(u));
        const timer = setInterval(() => setCurrentTime(Date.now()), 60000);
        return () => {
          unsubscribeAuth();
          clearInterval(timer);
        };
      }, []);

      useEffect(() => {
        setIsLoading(true); 
        const unsubV = onSnapshot(collection(db, getPath('vtubers')), (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setRealVtubers(data);
          setIsLoading(false); 
          
          if(user) {
            const myProfile = data.find(v => v.id === user.uid);
            if (myProfile) {
              const standardTypes = (myProfile.collabTypes || []).filter(t => PREDEFINED_COLLABS.includes(t));
              const otherType = (myProfile.collabTypes || []).filter(t => !PREDEFINED_COLLABS.includes(t))[0] || '';

              setProfileForm({
                ...myProfile,
                tags: Array.isArray(myProfile.tags) ? myProfile.tags.join(', ') : myProfile.tags || '',
                collabTypes: standardTypes,
                isOtherCollab: !!otherType,
                otherCollabText: otherType,
                isScheduleAnytime: myProfile.isScheduleAnytime || false,
                scheduleSlots: myProfile.scheduleSlots || [],
                streamingStyle: myProfile.streamingStyle || '一般型態',
                youtubeSubscribers: myProfile.youtubeSubscribers || myProfile.subscribers || '',
                twitchFollowers: myProfile.twitchFollowers || '',
                youtubeUrl: myProfile.youtubeUrl || myProfile.channelUrl || '',
                twitchUrl: myProfile.twitchUrl || '',
                xUrl: myProfile.xUrl || '',
                igUrl: myProfile.igUrl || '',
                contactEmail: myProfile.contactEmail || '',
                verificationNote: myProfile.verificationNote || ''
              });
            }
          }
        }, (err) => { console.error(err); setIsLoading(false); });

        const unsubB = onSnapshot(collection(db, getPath('bulletins')), (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setRealBulletins(data);
        }, (err) => console.error(err));

        const unsubC = onSnapshot(collection(db, getPath('collabs')), (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setRealCollabs(data);
        }, (err) => console.error(err));

        const unsubT = onSnapshot(doc(db, getPath('settings'), 'tips'), (docSnap) => {
          if (docSnap.exists() && docSnap.data().content) {
            setRealTips(docSnap.data().content);
          }
        }, (err) => console.error(err));

        return () => { unsubV(); unsubB(); unsubC(); unsubT(); };
      }, [user]);

      const handleLogin = async () => {
        try {
          await signInWithPopup(auth, provider);
          showToast("🎉 登入成功！");
        } catch (error) {
          console.error("登入失敗", error);
          showToast("登入失敗，請稍後再試。");
        }
      };

      const handleLogout = async () => {
        await signOut(auth);
        navigate('home');
        showToast("已成功登出。");
      };

      const displayVtubers = useMemo(() => {
        const list = [...realVtubers];
        const mockList = MOCK_VTUBERS.filter(m => !list.find(r => r.id === m.id));
        const combined = [...list, ...mockList];
        
        for (let i = combined.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [combined[i], combined[j]] = [combined[j], combined[i]];
        }
        return combined;
      }, [realVtubers]);

      const dynamicCollabTypes = useMemo(() => {
        const types = new Set();
        const verifiedOrMine = displayVtubers.filter(v => v.isVerified || (user && v.id === user.uid) || v.id.startsWith('mock'));
        verifiedOrMine.forEach(v => {
          if (Array.isArray(v.collabTypes)) {
            v.collabTypes.forEach(t => {
              const trimmed = typeof t === 'string' ? t.trim() : '';
              if(trimmed) types.add(trimmed);
            });
          }
        });
        return Array.from(types).sort();
      }, [displayVtubers, user]);

      const displayBulletins = useMemo(() => {
        const list = [...realBulletins, ...MOCK_BULLETINS]
          .filter(b => !b.recruitEndTime || b.recruitEndTime > Date.now()) 
          .map(b => {
            const vt = displayVtubers.find(v => v.id === b.userId) || { name: "匿名創作者", agency: "未知", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Anon&backgroundColor=374151" };
            return { ...b, vtuber: vt, postedAt: formatTime(b.createdAt) };
          });
        return list.sort((a, b) => b.createdAt - a.createdAt);
      }, [realBulletins, displayVtubers]);

      const displayCollabs = useMemo(() => {
        const THREE_HOURS = 3 * 60 * 60 * 1000;
        const list = [...realCollabs, ...MOCK_COLLABS].filter(c => {
          if (!c.startTimestamp) return true;
          return currentTime <= c.startTimestamp + THREE_HOURS;
        });
        return list.sort((a, b) => (a.startTimestamp || a.createdAt || 0) - (b.startTimestamp || b.createdAt || 0));
      }, [realCollabs, currentTime]);

      const filteredVTubers = useMemo(() => {
        const verifiedOrMine = displayVtubers.filter(v => v.isVerified || (user && v.id === user.uid) || v.id.startsWith('mock'));
        
        let result = verifiedOrMine.filter(v => {
          const matchSearch = v.name?.toLowerCase().includes(searchQuery.toLowerCase()) || v.description?.toLowerCase().includes(searchQuery.toLowerCase());
          const matchTags = selectedTags.length === 0 || selectedTags.every(t => v.collabTypes?.includes(t));
          const matchAgency = selectedAgency === 'All' || v.agency?.includes(selectedAgency);
          return matchSearch && matchTags && matchAgency;
        });

        if (sortOrder === 'likes') {
          result.sort((a, b) => (b.likes || 0) - (a.likes || 0));
        } else if (sortOrder === 'subscribers') {
          result.sort((a, b) => parseSubscribers(b) - parseSubscribers(a));
        } else if (sortOrder === 'newest') {
          result.sort((a, b) => (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0));
        } else {
          let shuffled = [...result];
          for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
          }
          result = shuffled;
        }

        return result;
      }, [displayVtubers, searchQuery, selectedTags, selectedAgency, user, sortOrder]); 

      const toggleTag = (tag) => setSelectedTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);

      const handleSaveProfile = async (e) => {
        e.preventDefault();
        if (!user) return showToast("請先登入才能儲存名片！");
        try {
          const ref = doc(db, getPath('vtubers'), user.uid);
          const tagsArray = profileForm.tags.split(',').map(t => t.trim()).filter(t => t);
          
          let finalCollabs = [...profileForm.collabTypes];
          if (profileForm.isOtherCollab && profileForm.otherCollabText.trim()) {
            finalCollabs.push(profileForm.otherCollabText.trim());
          }
          
          const existingProfile = realVtubers.find(v => v.id === user.uid);
          const isVerified = existingProfile ? existingProfile.isVerified : false;

          await setDoc(ref, { 
            ...profileForm, 
            tags: tagsArray, 
            collabTypes: finalCollabs, 
            likes: profileForm.likes || 0, 
            likedBy: profileForm.likedBy || [], 
            status: profileForm.status || '歡迎邀請', 
            isVerified: isVerified,
            updatedAt: Date.now() 
          }, { merge: true });
          
          showToast(isVerified ? "🎉 您的專屬名片已更新！" : "🎉 名片已建立！請等待管理員審核即可公開。");
          navigate('grid');
        } catch (err) { console.error(err); showToast("儲存失敗，請檢查網路狀態。"); }
      };

      const handlePostBulletin = async () => {
        if (!user) return showToast("請先登入才能發布招募文喔！");
        if (!newBulletin.content.trim()) return showToast("請填寫招募內容！");
        if (!newBulletin.collabType) return showToast("請選擇連動性質！");
        if (newBulletin.collabType === '其他' && !newBulletin.collabTypeOther.trim()) return showToast("請輸入其他的連動性質！");
        if (!newBulletin.collabSize) return showToast("請選擇預估聯動人數！");
        if (!newBulletin.collabTime) return showToast("請填寫聯動時間！");
        if (!newBulletin.recruitEndTime) return showToast("請設定招募截止時間！");
        
        const recruitEndTimestamp = new Date(newBulletin.recruitEndTime).getTime();
        if (recruitEndTimestamp < Date.now()) return showToast("招募截止時間不能設定在過去！");

        const hasProfile = realVtubers.find(v => v.id === user.uid);
        if (!hasProfile) {
          showToast("請先建立您的名片，才能發布招募文！");
          return navigate('dashboard');
        }
        if (!hasProfile.isVerified) {
          return showToast("您的名片仍在審核中，通過後才能發布招募文喔！");
        }

        try {
          const tagsArray = newBulletin.tags.split(',').map(t => t.trim()).filter(t => t);
          const finalCollabType = newBulletin.collabType === '其他' ? newBulletin.collabTypeOther : newBulletin.collabType;

          await addDoc(collection(db, getPath('bulletins')), { 
            userId: user.uid, 
            content: newBulletin.content, 
            collabType: finalCollabType,
            collabSize: newBulletin.collabSize,
            collabTime: newBulletin.collabTime,
            recruitEndTime: recruitEndTimestamp,
            tags: tagsArray, 
            createdAt: Date.now() 
          });
          setNewBulletin({ content: '', tags: '', collabType: '', collabTypeOther: '', collabSize: '', collabTime: '', recruitEndTime: '' });
          showToast("🚀 招募文已發布！");
        } catch (err) { console.error(err); showToast("發布失敗，請稍後重試。"); }
      };

      const handleRecommend = async (targetVtuber) => {
        if (!user) return showToast("請先登入才能給予推薦！");
        
        const myProfile = realVtubers.find(v => v.id === user.uid);
        if (!myProfile || !myProfile.isVerified) {
          return showToast("只有通過官方認證的 VTuber 才能給予推薦喔！");
        }
        if (targetVtuber.id === user.uid) {
          return showToast("不能推薦自己喔！");
        }
        
        if (targetVtuber.likedBy && targetVtuber.likedBy.includes(user.uid)) {
          return showToast("您已經推薦過這位創作者囉！不能重複推薦。");
        }

        try {
          await setDoc(doc(db, getPath('vtubers'), targetVtuber.id), { 
            likes: (targetVtuber.likes || 0) + 1,
            likedBy: [...(targetVtuber.likedBy || []), user.uid]
          }, { merge: true });
          
          showToast("✅ 已送出您的推薦！");
          setSelectedVTuber(prev => ({ ...prev, likes: (prev.likes || 0) + 1, likedBy: [...(prev.likedBy || []), user.uid] }));
        } catch (err) {
          console.error(err);
          showToast("推薦失敗，請稍後重試。");
        }
      };

      const handleAdminResetAllCollabTypes = async () => {
        if (!isAdmin) return;
        if (!confirm("⚠️ 極度危險操作：這將會清除「所有」VTuber 名片上的『主要願意連動類型』，強制他們重新勾選。確定要執行嗎？")) return;
        try {
          const confirmText = prompt("請輸入 'CONFIRM' (全大寫) 來確認清除所有連動類型資料：");
          if (confirmText !== 'CONFIRM') {
            showToast("已取消操作。");
            return;
          }
          showToast("開始清除中，請稍候...");
          
          for (const v of realVtubers) {
            if (v.id.startsWith('mock')) continue;
            await setDoc(doc(db, getPath('vtubers'), v.id), { collabTypes: [] }, { merge: true });
          }
          showToast("✅ 已成功清除所有 VTuber 的連動類型！");
        } catch (err) {
          console.error(err);
          showToast("清除失敗，請檢查權限。");
        }
      };

      const handleVerifyVtuber = async (id) => {
        if (!isAdmin) return;
        try { 
          await setDoc(doc(db, getPath('vtubers'), id), { isVerified: true }, { merge: true }); 
          showToast("已通過審核！此名片現在已公開。"); 
        } catch (err) { showToast("審核失敗"); }
      };
      
      const handleAdminUpdateVtuber = async (id, updatedData) => {
        if (!isAdmin) return;
        try {
          const tagsArray = typeof updatedData.tags === 'string' ? updatedData.tags.split(',').map(t => t.trim()).filter(t => t) : updatedData.tags;
          
          let finalCollabs = [...updatedData.collabTypes];
          if (updatedData.isOtherCollab && updatedData.otherCollabText.trim()) {
            finalCollabs.push(updatedData.otherCollabText.trim());
          }
          
          await setDoc(doc(db, getPath('vtubers'), id), {
            ...updatedData,
            tags: tagsArray,
            collabTypes: finalCollabs,
            updatedAt: Date.now()
          }, { merge: true });
          
          showToast("已強制更新名片內容！");
        } catch (err) {
          console.error(err);
          showToast("更新失敗");
        }
      };

      const handleDeleteVtuber = async (id) => {
        if (!isAdmin) return;
        if (!confirm("確定要刪除這張名片嗎？(此動作無法復原)")) return;
        try { await deleteDoc(doc(db, getPath('vtubers'), id)); showToast("已刪除名片"); } catch (err) { showToast("刪除失敗"); }
      };
      const handleDeleteBulletin = async (id) => {
        if (!isAdmin) return;
        if (!confirm("確定要刪除這則招募文嗎？")) return;
        try { await deleteDoc(doc(db, getPath('bulletins'), id)); showToast("已刪除招募文"); } catch (err) { showToast("刪除失敗"); }
      };

      const handleAddCollab = async (collabData) => {
        const hasProfile = realVtubers.find(v => v.id === user?.uid);
        const isVerified = hasProfile ? hasProfile.isVerified : false;
        
        if (!isAdmin && !isVerified) return showToast("需通過官方認證才能發布連動行程！");
        if (!collabData.title) return showToast("請至少填寫連動標題！");
        
        try { 
          await addDoc(collection(db, getPath('collabs')), { 
            ...collabData, 
            userId: user?.uid || 'admin',
            createdAt: Date.now() 
          }); 
          showToast("已發布連動行程"); 
        } catch (err) { showToast("新增失敗"); }
      };

      const handleDeleteCollab = async (id) => {
        const targetCollab = realCollabs.find(c => c.id === id);
        if (!targetCollab) return;
        if (!isAdmin && targetCollab.userId !== user?.uid) return showToast("您無權限刪除此行程！");
        if (!confirm("確定要刪除這個連動行程嗎？")) return;
        try { await deleteDoc(doc(db, getPath('collabs'), id)); showToast("已刪除連動行程"); } catch (err) { showToast("刪除失敗"); }
      };
      const handleSaveTips = async (content) => {
        if (!isAdmin) return;
        try { await setDoc(doc(db, getPath('settings'), 'tips'), { content }, { merge: true }); showToast("已更新邀約小技巧範本"); } catch (err) { showToast("更新失敗"); }
      };

      const handleCopyTemplate = (textToCopy) => {
        const text = textToCopy || realTips;
        const textArea = document.createElement("textarea");
        textArea.value = text; document.body.appendChild(textArea); textArea.select(); document.execCommand("copy"); document.body.removeChild(textArea);
        setCopiedTemplate(true); setTimeout(() => setCopiedTemplate(false), 2000);
        showToast("已複製到剪貼簿！");
      };

      const navigate = (view) => {
        if (view === 'dashboard' && !user) {
          handleLogin();
          return;
        }
        window.location.hash = view;
        setIsMobileMenuOpen(false);
        window.scrollTo(0,0);
      };

      return (
        <div className="flex flex-col min-h-screen relative">
          {/* Toast 提示元件 */}
          {toastMsg && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-gray-800 border border-purple-500 text-white px-6 py-3 rounded-full shadow-[0_0_20px_rgba(168,85,247,0.3)] animate-slide-down flex items-center gap-3 font-bold text-sm">
              <i className="fa-solid fa-circle-info text-purple-400"></i> {toastMsg}
            </div>
          )}

          {/* 導覽列 (全新雙層排版) */}
