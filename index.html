          <nav className="sticky top-0 z-40 backdrop-blur-md bg-[#0f111a]/95 border-b border-gray-800 shadow-xl">

              {/* 第一層：Logo 與 右側使用者功能 */}
              <div className="h-16 flex items-center justify-between">
                <div className="flex items-center gap-2 cursor-pointer group" onClick={() => navigate('home')}>
                  <div className="bg-gradient-to-br from-purple-500 to-pink-500 p-2 rounded-lg group-hover:shadow-[0_0_15px_rgba(168,85,247,0.5)] transition-all">
                    <i className="fa-solid fa-wand-magic-sparkles text-white"></i>
                  </div>
                  <span className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-400">V-Nexus BETA版</span>
                </div>

                {/* 登入/會員系統按鈕 */}
                <div className="flex items-center gap-3">
                  {!user ? (
                    <button onClick={handleLogin} className="flex items-center gap-2 bg-white text-gray-900 hover:bg-gray-200 px-4 py-1.5 rounded-full transition-colors font-bold shadow-md whitespace-nowrap text-sm">
                      <i className="fa-brands fa-google text-red-500"></i> Google 登入
                    </button>
                  ) : (
                    <div className="flex items-center gap-3">
                      <button onClick={() => navigate('dashboard')} className="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-600 px-3 py-1.5 rounded-full transition-colors relative whitespace-nowrap">
                        <img src={user.photoURL || "https://api.dicebear.com/7.x/avataaars/svg?seed=Anon"} className="w-5 h-5 rounded-full" />
                        <span className="text-gray-300 text-xs font-bold truncate max-w-[80px] hidden sm:block">{user.displayName || '創作者'}</span>
                        {/* 提醒未審核的小紅點 */}
                        {realVtubers.find(v => v.id === user.uid && !v.isVerified) && <span className="absolute -top-1 -right-1 flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>}
                      </button>
                      <button onClick={handleLogout} className="text-gray-500 hover:text-red-400 text-xs font-bold transition-colors whitespace-nowrap" title="登出"><i className="fa-solid fa-right-from-bracket"></i></button>
                    </div>
                  )}
                  {isAdmin && (
                    <button onClick={() => navigate('admin')} className="hidden sm:flex items-center gap-1.5 bg-red-500/10 text-red-400 border border-red-500/30 hover:bg-red-500/20 px-3 py-1.5 rounded-full transition-colors text-xs font-bold relative whitespace-nowrap">
                      <i className="fa-solid fa-shield-halved"></i> 管理員
                      {realVtubers.filter(v => !v.isVerified).length > 0 && <span className="absolute -top-1 -right-1 flex h-3 w-3"><span className="relative inline-flex rounded-full h-3 w-3 bg-red-500 text-[8px] text-white justify-center items-center">{realVtubers.filter(v => !v.isVerified).length}</span></span>}
                    </button>
                  )}
                  {/* 手機版漢堡按鈕 */}
                  <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="lg:hidden text-gray-300 hover:text-white p-2 text-2xl ml-1"><i className={`fa-solid ${isMobileMenuOpen ? 'fa-xmark' : 'fa-bars'}`}></i></button>
                </div>
              </div>

              {/* 第二層：電腦版分頁按鈕 ( lg 以上才顯示，強制不換行 ) */}
              <div className="hidden lg:flex items-center justify-center gap-4 pb-4 overflow-x-auto whitespace-nowrap scrollbar-hide">
                <button onClick={() => navigate('home')} className={`transition-colors px-3 py-1.5 font-bold text-sm whitespace-nowrap ${currentView === 'home' ? 'text-purple-400 border-b-2 border-purple-500' : 'text-gray-400 hover:text-white'}`}>首頁介紹</button>
                <button onClick={() => navigate('grid')} className={`transition-colors px-3 py-1.5 font-bold text-sm whitespace-nowrap ${currentView === 'grid' || currentView === 'profile' ? 'text-purple-400 border-b-2 border-purple-500' : 'text-gray-400 hover:text-white'}`}>尋找 VTuber 夥伴</button>
                <button onClick={() => navigate('match')} className={`transition-colors px-3 py-1.5 font-bold text-sm whitespace-nowrap ${currentView === 'match' ? 'text-purple-400 border-b-2 border-purple-500' : 'text-gray-400 hover:text-white'}`}><i className="fa-solid fa-dice mr-1"></i> 聯動隨機配對</button>
                <button onClick={() => navigate('bulletin')} className={`flex items-center gap-1.5 px-4 py-1.5 rounded-full font-bold transition-colors text-sm whitespace-nowrap ${currentView === 'bulletin' ? 'bg-purple-500 text-white shadow-lg shadow-purple-500/20' : 'bg-gray-800 text-gray-300 hover:text-white hover:bg-gray-700'}`}><i className="fa-solid fa-bullhorn"></i> 招募佈告欄</button>
                <button onClick={() => navigate('collabs')} className={`flex items-center gap-1.5 px-4 py-1.5 rounded-full font-bold transition-colors text-sm whitespace-nowrap ${currentView === 'collabs' ? 'bg-red-500 text-white shadow-lg shadow-red-500/20' : 'bg-gray-800 text-gray-300 hover:text-white hover:bg-gray-700'}`}><i className="fa-solid fa-broadcast-tower"></i> 確定連動</button>
                <button onClick={() => navigate('tips')} className={`transition-colors px-3 py-1.5 font-bold text-sm whitespace-nowrap ${currentView === 'tips' ? 'text-yellow-400 border-b-2 border-yellow-500' : 'text-gray-400 hover:text-white'}`}><i className="fa-solid fa-lightbulb"></i> 邀約小技巧</button>
              </div>

            </div>

            {/* 手機版下拉選單 */}
            {isMobileMenuOpen && (
              <div className="lg:hidden absolute top-16 left-0 w-full bg-[#0f111a]/95 backdrop-blur-md border-b border-gray-800 shadow-xl flex flex-col p-4 gap-4 z-50 animate-fade-in-up">
                <button onClick={() => navigate('home')} className={`text-left px-4 py-3 rounded-xl font-bold ${currentView === 'home' ? 'bg-purple-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}>首頁介紹</button>
                <button onClick={() => navigate('grid')} className={`text-left px-4 py-3 rounded-xl font-bold ${currentView === 'grid' || currentView === 'profile' ? 'bg-purple-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}>尋找 VTuber 夥伴</button>
                <button onClick={() => navigate('match')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'match' ? 'bg-purple-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}><i className="fa-solid fa-dice w-5"></i> 聯動隨機配對</button>
                <button onClick={() => navigate('bulletin')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'bulletin' ? 'bg-purple-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}><i className="fa-solid fa-bullhorn w-5"></i> 我想發起聯動</button>
                <button onClick={() => navigate('collabs')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'collabs' ? 'bg-red-500 text-white' : 'text-gray-300 hover:bg-gray-800'}`}><i className="fa-solid fa-broadcast-tower w-5"></i> 確定連動</button>
                <button onClick={() => navigate('tips')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'tips' ? 'bg-yellow-500 text-white' : 'text-gray-300 hover:bg-gray-800'}`}><i className="fa-solid fa-lightbulb w-5"></i> 邀約小技巧</button>
                {isAdmin && <button onClick={() => navigate('admin')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'admin' ? 'bg-red-600 text-white' : 'text-red-400 hover:bg-red-500/10'}`}><i className="fa-solid fa-shield-halved w-5"></i> 系統管理員</button>}
                {user && <button onClick={handleLogout} className="text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 text-red-400 hover:bg-red-500/10"><i className="fa-solid fa-right-from-bracket w-5"></i> 登出帳號</button>}
              </div>
            )}
          </nav>

          {/* 主要內容區 */}
          <main className="flex-1 animate-fade-in-up pb-10">
            {currentView === 'home' && <HomePage navigate={navigate} />}

            {currentView === 'dashboard' && (
              <div className="max-w-3xl mx-auto px-4 py-10">
                <div className="text-center mb-8">
                  <h2 className="text-3xl font-extrabold text-white flex items-center justify-center gap-3"><i className="fa-solid fa-user-circle text-purple-400"></i> 創作者中心：編輯名片</h2>
                  {/* 顯示審核狀態 */}
                  {user && realVtubers.find(v => v.id === user.uid) ? (
                    realVtubers.find(v => v.id === user.uid).isVerified ? (
                      <p className="text-green-400 mt-3 text-sm font-bold bg-green-500/10 inline-block px-4 py-1 rounded-full"><i className="fa-solid fa-circle-check mr-1"></i> 名片已認證上線</p>
                    ) : (
                      <p className="text-yellow-400 mt-3 text-sm font-bold bg-yellow-500/10 inline-block px-4 py-1 rounded-full"><i className="fa-solid fa-user-clock mr-1"></i> 名片審核中，通過後將自動公開</p>
                    )
                  ) : (
                    <p className="text-gray-400 mt-2">填寫完成後請等待管理員審核，確保社群品質！</p>
                  )}
                </div>
                <form onSubmit={handleSaveProfile} className="bg-gray-800/40 border border-gray-700 rounded-3xl p-6 sm:p-10 shadow-2xl space-y-6">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">VTuber 名稱 <span className="text-red-400">*</span></label><input required type="text" value={profileForm.name} onChange={e=>setProfileForm({...profileForm, name: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: 星詠 みお" /></div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-sm font-bold text-gray-300 mb-2">所屬勢力</label>
                        <select value={profileForm.agency} onChange={e=>setProfileForm({...profileForm, agency: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none"><option>個人勢</option><option>企業勢</option><option>社團勢</option></select>
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-gray-300 mb-2">演出型態</label>
                        <select value={profileForm.streamingStyle} onChange={e=>setProfileForm({...profileForm, streamingStyle: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none text-sm"><option>一般型態</option><option>男聲女皮 (Babiniku)</option><option>女聲男皮</option><option>無性別/人外</option><option>其他</option></select>
                      </div>
                    </div>
                  </div>
                  <div><label className="block text-sm font-bold text-gray-300 mb-2">一句話自我介紹 <span className="text-red-400">*</span></label><textarea required rows="3" value={profileForm.description} onChange={e=>setProfileForm({...profileForm, description: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none resize-none" placeholder="讓大家快速認識你的直播風格！" /></div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">內容標籤 (逗號分隔)</label><input type="text" value={profileForm.tags} onChange={e=>setProfileForm({...profileForm, tags: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: 歌回, APEX" /></div>
                    <div>
                      <label className="block text-sm font-bold text-gray-300 mb-2">主要願意連動類型 (至多選三項)</label>
                      <CollabTypeCheckboxes formState={profileForm} setFormState={setProfileForm} showToast={showToast} />
                    </div>
                  </div>
                  
                  {/* 可連動時段 (全新升級版) */}
                  <div>
                    <label className="block text-sm font-bold text-gray-300 mb-2">可連動時段</label>
                    <ScheduleEditor isAnytime={profileForm.isScheduleAnytime} setIsAnytime={(val) => setProfileForm({...profileForm, isScheduleAnytime: val})} slots={profileForm.scheduleSlots} setSlots={(val) => setProfileForm({...profileForm, scheduleSlots: val})} />
                  </div>
                  
                  {/* 新增 YouTube 訂閱與 Twitch 追隨 */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">YouTube 訂閱數 (手動填寫)</label><input type="text" value={profileForm.youtubeSubscribers} onChange={e=>setProfileForm({...profileForm, youtubeSubscribers: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: 1.5K, 未公開" /></div>
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">Twitch 追隨數 (手動填寫)</label><input type="text" value={profileForm.twitchFollowers} onChange={e=>setProfileForm({...profileForm, twitchFollowers: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: 500, 無" /></div>
                  </div>

                  {/* 新增 YouTube 與 Twitch 連結 */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">YouTube 連結 (自行輸入)</label><input type="url" value={profileForm.youtubeUrl} onChange={e=>setProfileForm({...profileForm, youtubeUrl: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://youtube.com/..." /></div>
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">Twitch 連結 (自行輸入)</label><input type="url" value={profileForm.twitchUrl} onChange={e=>setProfileForm({...profileForm, twitchUrl: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://twitch.tv/..." /></div>
                  </div>

                  {/* 新增 X, IG, Email 連結 */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">X 連結 (自行手動填寫)</label><input type="url" value={profileForm.xUrl} onChange={e=>setProfileForm({...profileForm, xUrl: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://x.com/..." /></div>
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">IG 連結 (自行輸入)</label><input type="url" value={profileForm.igUrl} onChange={e=>setProfileForm({...profileForm, igUrl: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://instagram.com/..." /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">聯絡 Email (探索名片不顯示)</label><input type="email" value={profileForm.contactEmail} onChange={e=>setProfileForm({...profileForm, contactEmail: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="example@gmail.com" /></div>
                  </div>

                  {/* 新增：防冒用身分驗證區塊 */}
                  <div className="bg-blue-500/10 border border-blue-500/30 rounded-xl p-5 mt-2">
                    <h3 className="text-blue-400 font-bold mb-2 flex items-center gap-2"><i className="fa-solid fa-shield-halved"></i> 真人身分驗證 (防冒用)</h3>
                    <p className="text-xs text-gray-300 mb-4 leading-relaxed">
                      為了保護創作者不被假冒，請協助我們確認您是頻道的真實擁有者。您可以使用以下任一方式：<br/>
                      方法一：您的 X (Twitter) 或 YouTube 簡介中暫時加上 <span className="text-white font-bold bg-gray-800 px-1 rounded">V-Nexus審核中</span> 的字樣。<br/>
                      方法二：使用您的官方帳號私訊管理員帳號 (@ApexDasa)。
                    </p>
                    <label className="block text-sm font-bold text-gray-300 mb-2">請在此告訴管理員您的驗證方式：</label>
                    <input type="text" value={profileForm.verificationNote} onChange={e=>setProfileForm({...profileForm, verificationNote: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="例：我已經在 X 簡介加上字樣了！ / 我已經發送推特私訊！" />
                  </div>

                  {/* 新增：平台嚴格審核規範警告 */}
                  <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-5 mt-4">
                    <h3 className="text-red-400 font-bold mb-2 flex items-center gap-2"><i className="fa-solid fa-triangle-exclamation"></i> 平台審核規範聲明</h3>
                    <p className="text-xs text-gray-300 leading-relaxed">
                      本平台專為「尋找實質連動與企劃夥伴」的活躍創作者打造。為維護社群連動品質與防範非創作目的之交友行為，目前 <span className="text-red-400 font-bold">不開放「準備中」或「超過一個月未有實況/影片產出」之帳號入駐</span>。若經人工審核未達活躍標準，名片將逕行退回或刪除，敬請見諒。
                    </p>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4">
                    <div>
                      <label className="block text-sm font-bold text-gray-300 mb-2">頭像圖片網址 (請貼上圖片連結)</label>
                      <div className="flex items-center gap-3">
                        <img src={profileForm.avatar} className="w-12 h-12 rounded-xl object-cover border border-gray-700 bg-gray-800 flex-shrink-0" />
                        <div className="flex-1">
                          <input type="url" value={profileForm.avatar} onChange={e=>setProfileForm({...profileForm, avatar: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white text-sm focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://..." />
                        </div>
                      </div>
                      <p className="text-[10px] text-yellow-400/80 mt-1.5"><i className="fa-solid fa-circle-info mr-1"></i>小教學：您可以到您的 X 首頁 &gt; 大頭貼 &gt; 滑鼠右鍵 &gt; 複製圖片連結，將圖片連結輸入至此即可。</p>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-300 mb-2">橫幅背景網址 (請貼上圖片連結)</label>
                      <div className="flex items-center gap-3">
                        <img src={profileForm.banner} className="w-20 h-12 rounded-xl object-cover border border-gray-700 bg-gray-800 flex-shrink-0" />
                        <div className="flex-1">
                          <input type="url" value={profileForm.banner} onChange={e=>setProfileForm({...profileForm, banner: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white text-sm focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://..." />
                        </div>
                      </div>
                      <p className="text-[10px] text-yellow-400/80 mt-1.5"><i className="fa-solid fa-circle-info mr-1"></i>小教學：您可以到您的 X 首頁 &gt; 橫幅 &gt; 滑鼠右鍵 &gt; 複製圖片連結，將圖片連結輸入至此即可。</p>
                    </div>
                  </div>

                  <div className="pt-6 border-t border-gray-700 flex justify-end">
                    <button type="submit" className="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform hover:-translate-y-1"><i className="fa-solid fa-floppy-disk mr-2"></i>儲存名片</button>
                  </div>
                </form>
              </div>
            )}

            {currentView === 'grid' && (
              <div className="max-w-7xl mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
                
                {/* 手機版：進階篩選展開按鈕 */}
                <div className="lg:hidden flex justify-end mb-[-16px]">
                  <button onClick={() => setIsMobileFilterOpen(!isMobileFilterOpen)} className="bg-gray-800 border border-gray-700 text-gray-300 hover:text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors">
                    <i className="fa-solid fa-filter"></i> {isMobileFilterOpen ? '隱藏進階篩選' : '顯示進階篩選'}
                  </button>
                </div>

                <aside className={`w-full lg:w-72 flex-shrink-0 space-y-6 ${isMobileFilterOpen ? 'block' : 'hidden lg:block'}`}>
                  <div className="relative">
                    <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" placeholder="搜尋 VTuber..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-gray-800/50 border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-purple-500" />
                  </div>
                  <div className="bg-gray-800/30 border border-gray-800 rounded-xl p-5 space-y-5">
                    <h3 className="font-bold border-b border-gray-700 pb-2 text-gray-300"><i className="fa-solid fa-filter mr-2"></i>進階篩選</h3>
                    <div className="flex bg-gray-900 rounded-lg p-1 border border-gray-700">
                      {['All', '個人勢', '企業勢'].map(a => <button key={a} onClick={() => setSelectedAgency(a)} className={`flex-1 py-1.5 text-xs font-bold rounded-md ${selectedAgency === a ? 'bg-purple-600 text-white' : 'text-gray-400'}`}>{a === 'All' ? '全部' : a}</button>)}
                    </div>
                    {/* 動態顯示所有 VTuber 填寫的連動類型 */}
                    <div className="flex flex-wrap gap-2 mt-2">
                      <p className="w-full text-[10px] text-gray-500 mb-1">想找什麼類型的連動呢？</p>
                      {dynamicCollabTypes.map(tag => <TagBadge key={tag} text={tag} selected={selectedTags.includes(tag)} onClick={() => toggleTag(tag)} />)}
                    </div>
                  </div>
                </aside>

                <div className="flex-1">
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <h2 className="text-2xl font-bold text-white flex items-center gap-2">
                      尋找 VTuber 夥伴 
                      {user && realVtubers.find(v => v.id === user.uid && !v.isVerified) && <span className="text-xs font-normal text-yellow-400 bg-yellow-500/10 px-3 py-1 rounded-full border border-yellow-500/30 ml-2"><i className="fa-solid fa-eye-slash mr-1"></i>您的名片審核中，目前僅自己可見</span>}
                    </h2>
                    
                    {/* 排序下拉選單 */}
                    <select value={sortOrder} onChange={e=>setSortOrder(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-xl p-2.5 text-sm text-white focus:ring-2 focus:ring-purple-500 outline-none shadow-lg w-full sm:w-auto cursor-pointer">
                      <option value="random">🔀 隨機排列</option>
                      <option value="likes">👍 最推薦 (讚數最高)</option>
                      <option value="subscribers">📺 最多訂閱數 (YT+Twitch)</option>
                      <option value="newest">✨ 最新加入</option>
                    </select>
                  </div>
                  
                  {isLoading ? (
                    /* 骨架屏讀取動畫 Skeleton Loader */
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                      {[1, 2, 3, 4, 5, 6].map((i) => (
                        <div key={i} className="bg-gray-800/40 border border-gray-700/50 rounded-2xl overflow-hidden flex flex-col h-[260px] animate-pulse">
                          <div className="h-24 bg-gray-700/50 w-full flex-shrink-0"></div>
                          <div className="p-4 relative flex-1 flex flex-col">
                            <div className="absolute -top-8 w-16 h-16 rounded-xl bg-gray-600/50 border-2 border-gray-800"></div>
                            <div className="ml-20 mb-3 space-y-2 mt-1">
                              <div className="h-4 bg-gray-600/50 rounded w-24"></div>
                              <div className="h-3 bg-gray-700/50 rounded w-32"></div>
                            </div>
                            <div className="mt-4 space-y-2">
                              <div className="h-3 bg-gray-700/50 rounded w-full"></div>
                              <div className="h-3 bg-gray-700/50 rounded w-4/5"></div>
                            </div>
                            <div className="mt-auto pt-4 flex justify-between">
                              <div className="h-3 bg-gray-700/50 rounded w-20"></div>
                              <div className="h-6 bg-gray-600/50 rounded w-16"></div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : filteredVTubers.length === 0 ? (
                    <p className="text-center text-gray-500 mt-20">目前尚未有公開的名片</p>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                      {filteredVTubers.map(v => (
                        <div key={v.id} onClick={() => { setSelectedVTuber(v); navigate('profile'); }} className={`group bg-gray-800/40 border ${!v.isVerified ? 'border-yellow-500/50' : 'border-gray-700/50'} rounded-2xl overflow-hidden cursor-pointer hover:border-purple-500/50 transition-all hover:-translate-y-1 flex flex-col relative`}>
                          {!v.isVerified && <div className="absolute top-2 left-2 z-10 bg-yellow-500 text-black text-[10px] font-bold px-2 py-0.5 rounded shadow-lg">待審核</div>}
                          <div className="h-24 relative overflow-hidden flex-shrink-0">
                            <img src={v.banner} className="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform" />
                            <span className="absolute top-2 right-2 px-2 py-0.5 text-[10px] font-bold bg-black/50 border border-gray-600 rounded text-white">{v.agency}</span>
                          </div>
                          <div className="p-4 relative flex-1 flex flex-col">
                            <img src={v.avatar} className="absolute -top-8 w-16 h-16 rounded-xl border-2 border-gray-800 bg-gray-900 object-cover" />
                            <div className="ml-20 mb-3">
                              <h3 className="font-bold text-white truncate flex items-center gap-1">
                                {v.name} {v.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-xs" title="已認證"></i>}
                              </h3>
                              <div className="flex flex-wrap gap-2 text-xs mt-1 text-gray-400">
                                {(v.youtubeSubscribers || v.subscribers || v.youtubeUrl || v.channelUrl) && <span className="flex items-center gap-1"><i className="fa-brands fa-youtube text-red-400"></i> {v.youtubeSubscribers || v.subscribers || '未公開'}</span>}
                                {(v.twitchFollowers || v.twitchUrl) && <span className="flex items-center gap-1"><i className="fa-brands fa-twitch text-purple-400"></i> {v.twitchFollowers || '未公開'}</span>}
                                <span className="flex items-center gap-1 text-green-400"><i className="fa-solid fa-thumbs-up"></i> {v.likes || 0}</span>
                              </div>
                            </div>
                            <p className="text-xs text-gray-400 line-clamp-2 h-8">{v.description}</p>
                            <div className="mt-3 pt-2 border-t border-gray-700/50 text-xs text-gray-400 flex items-center gap-1.5">
                              <i className="fa-solid fa-clock text-purple-400"></i> <span className="truncate">{formatSchedule(v)}</span>
                            </div>
                            <div className="mt-2 pt-2 border-t border-gray-700/50 flex gap-2">
                              {(v.youtubeUrl || v.channelUrl) && (v.youtubeUrl || v.channelUrl) !== '#' && (
                                <a href={v.youtubeUrl || v.channelUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-red-500/20 text-red-400 hover:bg-red-500/30 px-2 py-1 rounded transition-colors flex items-center gap-1 flex-shrink-0">
                                  <i className="fa-brands fa-youtube"></i>
                                </a>
                              )}
                              {v.twitchUrl && v.twitchUrl !== '#' && (
                                <a href={v.twitchUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-purple-500/20 text-purple-400 hover:bg-purple-500/30 px-2 py-1 rounded transition-colors flex items-center gap-1 flex-shrink-0">
                                  <i className="fa-brands fa-twitch"></i>
                                </a>
                              )}
                              {v.xUrl && v.xUrl !== '#' && (
                                <a href={v.xUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-blue-500/20 text-blue-400 hover:bg-blue-500/30 px-2 py-1 rounded transition-colors flex items-center gap-1 flex-shrink-0">
                                  <i className="fa-brands fa-x-twitter"></i>
                                </a>
                              )}
                              {v.igUrl && v.igUrl !== '#' && (
                                <a href={v.igUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-pink-500/20 text-pink-400 hover:bg-pink-500/30 px-2 py-1 rounded transition-colors flex items-center gap-1 flex-shrink-0">
                                  <i className="fa-brands fa-instagram"></i>
                                </a>
                              )}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

            {currentView === 'profile' && selectedVTuber && (
              <div className="max-w-4xl mx-auto px-4 py-8">
                <button onClick={() => navigate('grid')} className="text-gray-400 hover:text-white mb-6 flex items-center text-sm"><i className="fa-solid fa-chevron-left mr-2"></i>返回探索</button>
                <div className="bg-gray-800/40 border border-gray-700 rounded-3xl overflow-hidden shadow-2xl">
                  <div className="h-48 sm:h-64 relative"><img src={selectedVTuber.banner} className="w-full h-full object-cover" /><div className="absolute inset-0 bg-gradient-to-t from-gray-900 to-transparent"></div></div>
                  <div className="px-6 sm:px-10 pb-10 relative">
                    <div className="flex flex-col sm:flex-row gap-6 items-start sm:items-end -mt-16 sm:-mt-20 mb-8 z-10 relative">
                      <img src={selectedVTuber.avatar} className="w-28 h-28 sm:w-36 sm:h-36 rounded-2xl border-4 border-gray-900 bg-gray-800 object-cover flex-shrink-0" />
                      <div className="flex-1 w-full">
                        <div className="flex flex-wrap items-center justify-between gap-4">
                          <div>
                            <h1 className="text-3xl sm:text-4xl font-extrabold text-white flex items-center gap-3">
                              {selectedVTuber.name} 
                              {selectedVTuber.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-2xl" title="已官方認證"></i>}
                              <span className="px-3 py-1 bg-gray-800 text-sm font-medium rounded-full text-gray-300 border border-gray-700">{selectedVTuber.agency}</span>
                            </h1>
                            <div className="flex flex-wrap gap-3 mt-3 text-sm">
                              {(selectedVTuber.youtubeSubscribers || selectedVTuber.subscribers || selectedVTuber.youtubeUrl || selectedVTuber.channelUrl) && (
                                <span className="bg-gray-800 border border-gray-700 text-gray-300 px-3 py-1 rounded-lg flex items-center gap-1.5"><i className="fa-brands fa-youtube text-red-400"></i> {selectedVTuber.youtubeSubscribers || selectedVTuber.subscribers || '未公開'}</span>
                              )}
                              {(selectedVTuber.twitchFollowers || selectedVTuber.twitchUrl) && (
                                <span className="bg-gray-800 border border-gray-700 text-gray-300 px-3 py-1 rounded-lg flex items-center gap-1.5"><i className="fa-brands fa-twitch text-purple-400"></i> {selectedVTuber.twitchFollowers || '未公開'}</span>
                              )}
                              
                              {/* 推薦按鈕，僅限已認證且非本人的使用者點擊 */}
                              {user && realVtubers.find(v => v.id === user.uid)?.isVerified && selectedVTuber.id !== user.uid ? (
                                <button onClick={() => handleRecommend(selectedVTuber)} className="bg-green-500/10 border border-green-500/30 text-green-400 hover:bg-green-500/20 px-3 py-1 rounded-lg flex items-center gap-1.5 transition-colors cursor-pointer group">
                                  <i className="fa-solid fa-thumbs-up group-hover:-translate-y-0.5 transition-transform"></i> {selectedVTuber.likes || 0} 推薦
                                </button>
                              ) : (
                                <span className="bg-green-500/10 border border-green-500/30 text-green-400 px-3 py-1 rounded-lg flex items-center gap-1.5">
                                  <i className="fa-solid fa-thumbs-up"></i> {selectedVTuber.likes || 0} 推薦
                                </span>
                              )}
                              
                              {(selectedVTuber.youtubeUrl || selectedVTuber.channelUrl) && (selectedVTuber.youtubeUrl || selectedVTuber.channelUrl) !== '#' && (
                                <a href={selectedVTuber.youtubeUrl || selectedVTuber.channelUrl} target="_blank" rel="noopener noreferrer" className="bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500/20 transition-colors px-3 py-1 rounded-lg flex items-center gap-1.5">
                                  <i className="fa-brands fa-youtube"></i> YouTube
                                </a>
                              )}
                              {selectedVTuber.twitchUrl && selectedVTuber.twitchUrl !== '#' && (
                                <a href={selectedVTuber.twitchUrl} target="_blank" rel="noopener noreferrer" className="bg-purple-500/10 border border-purple-500/30 text-purple-400 hover:bg-purple-500/20 transition-colors px-3 py-1 rounded-lg flex items-center gap-1.5">
                                  <i className="fa-brands fa-twitch"></i> Twitch
                                </a>
                              )}
                              {selectedVTuber.xUrl && selectedVTuber.xUrl !== '#' && (
                                <a href={selectedVTuber.xUrl} target="_blank" rel="noopener noreferrer" className="bg-blue-500/10 border border-blue-500/30 text-blue-400 hover:bg-blue-500/20 transition-colors px-3 py-1 rounded-lg flex items-center gap-1.5">
                                  <i className="fa-brands fa-x-twitter"></i> X
                                </a>
                              )}
                              {selectedVTuber.igUrl && selectedVTuber.igUrl !== '#' && (
                                <a href={selectedVTuber.igUrl} target="_blank" rel="noopener noreferrer" className="bg-pink-500/10 border border-pink-500/30 text-pink-400 hover:bg-pink-500/20 transition-colors px-3 py-1 rounded-lg flex items-center gap-1.5">
                                  <i className="fa-brands fa-instagram"></i> IG
                                </a>
                              )}
                              {selectedVTuber.contactEmail && (
                                <a href={`mailto:${selectedVTuber.contactEmail}`} onClick={(e) => e.stopPropagation()} className="bg-gray-700/50 border border-gray-600 text-gray-300 hover:bg-gray-600 transition-colors px-3 py-1 rounded-lg flex items-center gap-1.5">
                                  <i className="fa-solid fa-envelope"></i> Email 聯絡
                                </a>
                              )}
                            </div>
                          </div>
                          <button onClick={() => setIsCollabModalOpen(true)} className="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 text-white px-6 py-3 rounded-xl font-bold shadow-lg w-full sm:w-auto flex-shrink-0"><i className="fa-solid fa-paper-plane mr-2"></i>提出邀請</button>
                        </div>
                      </div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                      <div className="md:col-span-2 space-y-8">
                        <section><h3 className="text-xl font-bold border-b border-gray-700 pb-2 mb-4 text-purple-400"><i className="fa-solid fa-microphone mr-2"></i>關於我</h3><p className="text-gray-300 leading-relaxed whitespace-pre-wrap">{selectedVTuber.description}</p></section>
                        <section>
                          <h3 className="text-xl font-bold border-b border-gray-700 pb-2 mb-4 text-pink-400"><i className="fa-solid fa-gamepad mr-2"></i>內容標籤</h3>
                          <div className="flex flex-wrap gap-2">{(selectedVTuber.tags || []).map(t=><span key={t} className="px-3 py-1 bg-gray-900 border border-gray-700 rounded-lg text-sm text-gray-300">#{t}</span>)}</div>
                        </section>
                      </div>
                      <div className="space-y-6">
                        <div className="bg-gray-900/50 p-5 rounded-2xl border border-gray-700">
                          <h4 className="font-bold text-gray-200 mb-2"><i className="fa-solid fa-mask text-green-400 mr-2"></i>演出型態</h4>
                          <p className="text-sm text-gray-400 mb-4">{selectedVTuber.streamingStyle || '一般型態'}</p>
                          <h4 className="font-bold text-gray-200 mb-3"><i className="fa-solid fa-bullseye text-blue-400 mr-2"></i>主要願意連動類型</h4>
                          <div className="flex flex-wrap gap-2">
                            {(selectedVTuber.collabTypes || []).map(t=><span key={t} className="bg-gray-800 border border-gray-600 px-3 py-1 rounded-lg text-sm text-gray-300">{t}</span>)}
                          </div>
                        </div>
                        <div className="bg-gray-900/50 p-5 rounded-2xl border border-gray-700"><h4 className="font-bold text-gray-200 mb-2"><i className="fa-solid fa-clock text-pink-400 mr-2"></i>可連動時段</h4><p className="text-sm text-gray-400">{formatSchedule(selectedVTuber)}</p></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {currentView === 'bulletin' && (
              <div className="max-w-4xl mx-auto px-4 py-8">
                <div className="text-center mb-10">
                  <h2 className="text-3xl font-extrabold text-purple-400 mb-3"><i className="fa-solid fa-bullhorn mr-3"></i>招募佈告欄</h2>
                  <p className="text-gray-400">超過您設定的招募截止時間後，貼文將自動隱藏，確保佈告欄時效性！</p>
                </div>
                
                <div className="bg-gray-800/60 border border-purple-500/30 rounded-3xl p-6 mb-10 shadow-lg">
                  <h3 className="font-bold text-white mb-4"><i className="fa-solid fa-wand-magic-sparkles text-purple-400 mr-2"></i>發布招募需求 <span className="text-red-400">*</span></h3>
                  <textarea value={newBulletin.content} onChange={e=>setNewBulletin({...newBulletin, content: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white mb-4 focus:ring-purple-500 focus:border-purple-500 outline-none resize-none" rows="3" placeholder="想找人一起玩什麼遊戲或做什麼企劃呢？簡單說明一下吧！ (必填)" />
                  
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                    <div>
                      <label className="text-xs text-gray-400 mb-1 block">連動性質 <span className="text-red-400">*</span></label>
                      <select value={newBulletin.collabType} onChange={e=>setNewBulletin({...newBulletin, collabType: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-purple-500 outline-none text-sm">
                        <option value="">請選擇...</option>
                        {PREDEFINED_COLLABS.map(t => <option key={t} value={t}>{t}</option>)}
                        <option value="其他">其他 (自行輸入)</option>
                      </select>
                      {newBulletin.collabType === '其他' && (
                        <input type="text" value={newBulletin.collabTypeOther} onChange={e=>setNewBulletin({...newBulletin, collabTypeOther: e.target.value})} placeholder="請輸入連動性質" className="w-full mt-2 bg-gray-800 border border-gray-600 rounded-lg p-2 text-white focus:ring-purple-500 outline-none text-sm" />
                      )}
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 mb-1 block">預估聯動人數 <span className="text-red-400">*</span></label>
                      <select value={newBulletin.collabSize} onChange={e=>setNewBulletin({...newBulletin, collabSize: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-purple-500 outline-none text-sm">
                        <option value="">請選擇...</option>
                        {[...Array(21).keys()].map(n => <option key={n} value={`${n}人`}>{n} 人</option>)}
                      </select>
                    </div>
                    <div><label className="text-xs text-gray-400 mb-1 block">聯動時間 <span className="text-red-400">*</span></label><input type="datetime-local" value={newBulletin.collabTime} onChange={e=>setNewBulletin({...newBulletin, collabTime: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-purple-500 outline-none text-sm" /></div>
                    <div><label className="text-xs text-gray-400 mb-1 block">招募截止時間 <span className="text-red-400">*</span></label><input type="datetime-local" value={newBulletin.recruitEndTime} onChange={e=>setNewBulletin({...newBulletin, recruitEndTime: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-purple-500 outline-none text-sm" /></div>
                  </div>

                  <div className="flex flex-col sm:flex-row gap-4 justify-between items-end">
                    <div className="w-full sm:w-2/3"><label className="text-xs text-gray-400 mb-1 block">加上標籤 (逗號分隔)</label><input type="text" value={newBulletin.tags} onChange={e=>setNewBulletin({...newBulletin, tags: e.target.value})} placeholder="例: APEX, 週末晚上" className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-purple-500 outline-none text-sm" /></div>
                    <button onClick={handlePostBulletin} className="w-full sm:w-auto bg-purple-600 hover:bg-purple-500 text-white px-8 py-3 rounded-xl font-bold"><i className="fa-solid fa-paper-plane mr-2"></i>送出發布</button>
                  </div>
                </div>

                {isLoading ? (
                  /* 佈告欄的骨架屏讀取動畫 */
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {[1, 2, 3, 4].map(i => (
                      <div key={i} className="bg-gray-800/40 border border-gray-700 rounded-3xl p-6 flex flex-col animate-pulse h-[300px]">
                        <div className="flex items-center gap-4 mb-6 border-b border-gray-700/50 pb-4">
                          <div className="w-14 h-14 rounded-full bg-gray-700/50 flex-shrink-0"></div>
                          <div className="flex-1 space-y-2">
                            <div className="h-4 bg-gray-600/50 rounded w-1/3"></div>
                            <div className="h-3 bg-gray-700/50 rounded w-1/4"></div>
                          </div>
                        </div>
                        <div className="space-y-3 flex-1 mt-2">
                          <div className="h-3 bg-gray-700/50 rounded w-full"></div>
                          <div className="h-3 bg-gray-700/50 rounded w-5/6"></div>
                          <div className="h-3 bg-gray-700/50 rounded w-4/6"></div>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {displayBulletins.length === 0 ? <p className="col-span-1 md:col-span-2 text-center text-gray-500 mt-10">目前尚無進行中的招募</p> : displayBulletins.map(b => (
                      <div key={b.id} className="bg-gray-800/60 border border-gray-700 rounded-3xl overflow-hidden flex flex-col hover:border-purple-500/50 transition-all shadow-lg hover:shadow-purple-500/20 group">
                        
                        {/* 重新設計：超顯眼的發起人標頭區塊 */}
                        <div className="bg-gray-900/80 p-5 border-b border-gray-700 flex items-start gap-4">
                          <img src={b.vtuber.avatar} className="w-14 h-14 rounded-full border-2 border-purple-500/50 object-cover flex-shrink-0" />
                          <div className="flex-1">
                            <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-2">
                              <div>
                                <div className="flex items-center gap-2 mb-1">
                                  <span className="text-purple-400 font-bold text-[10px] bg-purple-500/10 px-2 py-0.5 rounded border border-purple-500/20">發起人</span>
                                  {/* 發起人名字變成直接的超連結，帶有底線效果 */}
                                  <a href={b.vtuber.youtubeUrl || b.vtuber.channelUrl || b.vtuber.twitchUrl || '#'} target="_blank" rel="noopener noreferrer" className={`font-extrabold text-white text-lg hover:text-purple-400 transition-colors ${(b.vtuber.youtubeUrl || b.vtuber.channelUrl || b.vtuber.twitchUrl) ? 'underline decoration-purple-500/50 underline-offset-4' : ''}`}>
                                    {b.vtuber.name}
                                  </a>
                                  {b.vtuber.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-sm" title="已認證"></i>}
                                </div>
                                <div className="flex items-center gap-2 mt-1.5">
                                  <span className="text-[10px] text-gray-400">{b.vtuber.agency}</span>
                                  <span className="text-gray-600 text-[10px]">•</span>
                                  <span className="text-[10px] text-gray-400">{b.postedAt} 發布</span>
                                </div>
                              </div>
                              {/* 頻道連結大按鈕 */}
                              <div className="flex gap-2">
                                {(b.vtuber.youtubeUrl || b.vtuber.channelUrl) && <a href={b.vtuber.youtubeUrl || b.vtuber.channelUrl} target="_blank" rel="noopener noreferrer" className="bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500 hover:text-white transition-colors w-9 h-9 rounded-lg flex items-center justify-center" title="YouTube頻道"><i className="fa-brands fa-youtube text-lg"></i></a>}
                                {b.vtuber.twitchUrl && <a href={b.vtuber.twitchUrl} target="_blank" rel="noopener noreferrer" className="bg-purple-500/10 border border-purple-500/20 text-purple-400 hover:bg-purple-500 hover:text-white transition-colors w-9 h-9 rounded-lg flex items-center justify-center" title="Twitch頻道"><i className="fa-brands fa-twitch text-lg"></i></a>}
                              </div>
                            </div>
                          </div>
                        </div>
                        
                        {/* 招募內容主體 */}
                        <div className="p-6 flex-1 flex flex-col">
                          <p className="text-gray-200 text-base mb-6 leading-relaxed whitespace-pre-wrap">{b.content}</p>
                          
                          {/* 重新設計：資訊四宮格 */}
                          <div className="grid grid-cols-2 gap-3 mt-auto mb-6">
                            <div className="bg-gray-900/50 p-3 rounded-xl border border-gray-700/50 flex flex-col">
                              <span className="text-[10px] text-gray-500 mb-1 flex items-center gap-1"><i className="fa-solid fa-gamepad"></i> 聯動性質</span>
                              <span className="text-sm text-gray-200 font-bold">{b.collabType || '未指定'}</span>
                            </div>
                            <div className="bg-gray-900/50 p-3 rounded-xl border border-gray-700/50 flex flex-col">
                              <span className="text-[10px] text-gray-500 mb-1 flex items-center gap-1"><i className="fa-solid fa-users"></i> 預估人數</span>
                              <span className="text-sm text-gray-200 font-bold">{b.collabSize || '未指定'}</span>
                            </div>
                            <div className="bg-gray-900/50 p-3 rounded-xl border border-gray-700/50 flex flex-col">
                              <span className="text-[10px] text-gray-500 mb-1 flex items-center gap-1"><i className="fa-regular fa-calendar"></i> 聯動時間</span>
                              <span className="text-sm text-gray-200 font-bold">{formatDateTimeLocalStr(b.collabTime)}</span>
                            </div>
                            <div className="bg-red-500/5 p-3 rounded-xl border border-red-500/20 flex flex-col">
                              <span className="text-[10px] text-red-400/80 mb-1 flex items-center gap-1"><i className="fa-solid fa-hourglass-half"></i> 招募截止</span>
                              <span className="text-sm text-red-300 font-bold">{b.recruitEndTime ? formatTime(b.recruitEndTime) : '未指定'}</span>
                            </div>
                          </div>

                          <div className="flex flex-wrap gap-2 mb-6">
                            {(b.tags||[]).map(t=><span key={t} className="text-xs text-purple-300 bg-purple-500/10 px-3 py-1 rounded-full border border-purple-500/20">#{t}</span>)}
                          </div>
                          
                          <button onClick={()=>{setSelectedVTuber(b.vtuber); navigate('profile');}} className="w-full bg-gray-800 hover:bg-purple-600 text-white py-3.5 rounded-xl text-sm font-bold transition-all flex justify-center items-center gap-2 group-hover:shadow-[0_0_15px_rgba(168,85,247,0.3)] border border-gray-700 group-hover:border-purple-500">
                            <i className="fa-solid fa-hand-holding-heart"></i> 前往名片查看與應徵
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {currentView === 'match' && (
              <MatchPage vtubers={realVtubers} navigate={navigate} showToast={showToast} />
            )}

            {currentView === 'collabs' && <CollabsPage collabs={displayCollabs} isLoading={isLoading} user={user} isVerified={user && realVtubers.find(v => v.id === user.uid)?.isVerified} onAddCollab={handleAddCollab} onDeleteCollab={handleDeleteCollab} isAdmin={isAdmin} showToast={showToast} currentTime={currentTime} />}
            {currentView === 'tips' && <TipsPage handleCopyTemplate={handleCopyTemplate} copiedTemplate={copiedTemplate} customTips={realTips} />}
            {currentView === 'admin' && isAdmin && (
              <AdminPage 
                vtubers={displayVtubers} bulletins={displayBulletins} collabs={displayCollabs} tips={realTips}
                onDeleteVtuber={handleDeleteVtuber} onVerifyVtuber={handleVerifyVtuber} onUpdateVtuber={handleAdminUpdateVtuber} onDeleteBulletin={handleDeleteBulletin}
                onAddCollab={handleAddCollab} onDeleteCollab={handleDeleteCollab} onSaveTips={handleSaveTips} showToast={showToast}
                onResetAllCollabTypes={handleAdminResetAllCollabTypes}
              />
            )}
          </main>

          {/* Modal */}
          {isCollabModalOpen && selectedVTuber && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-sm overflow-hidden animate-fade-in-up shadow-2xl">
                <div className="px-5 py-4 border-b border-gray-800 flex justify-between items-center">
                  <h3 className="font-bold text-white"><i className="fa-solid fa-paper-plane text-purple-400 mr-2"></i>發送邀請給 {selectedVTuber.name}</h3>
                  <button onClick={() => setIsCollabModalOpen(false)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark"></i></button>
                </div>
                <div className="p-5 space-y-4">
                  {!selectedVTuber.contactEmail ? (
                    <p className="text-red-400 text-sm font-bold bg-red-500/10 p-3 rounded-lg border border-red-500/30">
                      <i className="fa-solid fa-circle-exclamation mr-2"></i>這位創作者尚未公開聯絡 Email，請嘗試透過名片上的其他社群平台與他聯絡。
                    </p>
                  ) : (
                    <>
                      <p className="text-xs text-gray-400">* 送出後將自動開啟您的 Email 軟體，並帶入以下內容。</p>
                      <textarea 
                        rows="6" 
                        value={inviteMessage}
                        onChange={(e) => setInviteMessage(e.target.value)}
                        className="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-sm text-white focus:ring-2 focus:ring-purple-500 outline-none resize-none" 
                        placeholder="寫下您的邀請內容..."></textarea>
                      <button 
                        onClick={() => { 
                          if(!inviteMessage.trim()) return showToast("請輸入邀請內容！");
                          // 將信件標題與內容進行編碼，確保能正確帶入信箱軟體
                          const subject = encodeURIComponent(`[V-Nexus 連動邀約] 來自 ${profileForm.name || user?.displayName || '創作者'} 的邀請`);
                          const body = encodeURIComponent(inviteMessage);
                          // 觸發 mailto 開啟信箱
                          window.location.href = `mailto:${selectedVTuber.contactEmail}?subject=${subject}&body=${body}`;
                          
                          setIsCollabModalOpen(false);
                          setInviteMessage(''); // 清空剛剛輸入的內容
                        }} 
                        className="w-full bg-purple-600 hover:bg-purple-500 text-white py-2.5 rounded-xl font-bold shadow-lg transition-transform hover:-translate-y-0.5 flex justify-center items-center gap-2">
                        <i className="fa-solid fa-envelope"></i> 開啟信箱寄出
                      </button>
                    </>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
