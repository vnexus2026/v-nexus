<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V-Nexus | VTuber 專屬聯絡網</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #0f111a; color: #f3f4f6; font-family: sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f111a; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    
    @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    .animate-slide-down { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="selection:bg-purple-500 selection:text-white m-0 p-0 overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useMemo } = React;

    // --- Firebase 連線設定 (使用您的專屬金鑰) ---
    const firebaseConfig = {
      apiKey: "AIzaSyD_JJZUcT56VkHFH0ykBRJQ_nFLK_4p7kY",
      authDomain: "v-nexus.firebaseapp.com",
      projectId: "v-nexus",
      storageBucket: "v-nexus.firebasestorage.app",
      messagingSenderId: "824125737901",
      appId: "1:824125737901:web:93a4f21b56ab00dfaaaf24"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    
    const APP_ID = 'v-nexus-official';
    const getPath = (collectionName) => `artifacts/${APP_ID}/public/data/${collectionName}`;

    // --- 模擬資料清空 ---
    const MOCK_VTUBERS = [];
    const MOCK_COLLABS = [];
    const MOCK_BULLETINS = [];
    const ALL_TAGS = ["APEX", "歌回", "雜談", "Minecraft", "FPS", "恐怖遊戲", "程式開發", "ASMR", "繪圖", "Live2D", "企劃"];

    const formatTime = (ts) => {
      if (!ts) return "剛剛";
      const d = new Date(ts);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    };

    const TagBadge = ({ text, onClick, selected }) => (
      <span onClick={onClick} className={`px-3 py-1 rounded-full text-xs font-medium cursor-pointer transition-colors border ${selected ? 'bg-purple-600 text-white border-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.4)]' : 'bg-gray-800 text-gray-300 border-gray-700 hover:bg-gray-700 hover:text-white'}`}>{text}</span>
    );

    // --- 獨立元件區 ---
    const HomePage = ({ navigate }) => (
      <section className="pt-16 pb-20 px-4 text-center max-w-5xl mx-auto">
        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-300 text-sm font-medium mb-6">
          <i className="fa-solid fa-rocket"></i> <span>專為 VTuber 打造的聯動平台</span>
        </div>
        <h1 className="text-3xl md:text-5xl lg:text-6xl font-extrabold tracking-tight mb-12 leading-tight">
          V-NEXUS <br /><br />
          讓是I人的你 <br className="my-2" />
          也可以找到<span className="bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-400 to-red-400">最佳聯動夥伴</span>
        </h1>
        <div className="flex flex-col sm:flex-row justify-center gap-4">
          <button onClick={() => navigate('grid')} className="bg-purple-600 hover:bg-purple-500 text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-purple-500/25 transition-transform hover:scale-105">
            <i className="fa-solid fa-magnifying-glass mr-2"></i>開始探索
          </button>
          <button onClick={() => navigate('dashboard')} className="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-white px-8 py-4 rounded-xl font-bold shadow-lg transition-transform hover:scale-105">
            <i className="fa-solid fa-pen-to-square mr-2"></i>註冊創作者名片
          </button>
        </div>
      </section>
    );

    const CollabsPage = ({ collabs }) => (
      <div className="max-w-4xl mx-auto px-4 py-8 text-center">
        <h2 className="text-2xl font-bold text-red-400 mb-6"><i className="fa-solid fa-broadcast-tower mr-3"></i>確定連動時間表</h2>
        {collabs.length === 0 ? (
          <p className="text-gray-500 mt-10">目前尚未有確定的連動行程</p>
        ) : (
          collabs.map(c => (
            <div key={c.id} className="bg-gray-800/50 p-5 rounded-xl border border-gray-700 flex flex-col sm:flex-row gap-4 mb-4 text-left hover:border-red-500/50 transition-colors">
              <div className="bg-gray-900 border border-gray-700 rounded-lg p-3 text-center sm:w-24 flex-shrink-0">
                <div className="text-[10px] text-purple-400">{c.date}</div>
                <div className="font-bold text-white">{c.time}</div>
              </div>
              <div className="flex-1">
                <h3 className="font-bold text-white mb-1">{c.title}</h3>
                <p className="text-xs text-gray-400">{c.description}</p>
              </div>
            </div>
          ))
        )}
      </div>
    );

    const TipsPage = ({ handleCopyTemplate, copiedTemplate, customTips }) => (
      <div className="max-w-3xl mx-auto px-4 py-8">
        <h2 className="text-2xl font-bold text-yellow-400 mb-6 text-center"><i className="fa-solid fa-lightbulb mr-3"></i>邀約小技巧與範本</h2>
        <div className="bg-gray-800/50 p-6 rounded-xl border border-gray-700 shadow-xl">
          <div className="flex justify-between items-center mb-4">
            <h3 className="font-bold text-white">標準邀請信範本</h3>
            <button onClick={() => handleCopyTemplate(customTips)} className={`text-white px-3 py-1.5 rounded text-sm transition-colors ${copiedTemplate ? 'bg-green-600' : 'bg-purple-600 hover:bg-purple-500'}`}>
              {copiedTemplate ? <><i className="fa-solid fa-check mr-1"></i>已複製</> : <><i className="fa-solid fa-copy mr-1"></i>一鍵複製</>}
            </button>
          </div>
          <pre className="text-sm text-gray-300 bg-gray-900 p-4 rounded-lg font-mono whitespace-pre-wrap leading-relaxed border border-gray-800">{customTips}</pre>
        </div>
      </div>
    );

    // --- 系統管理員後台元件 ---
    const AdminPage = ({ vtubers, bulletins, collabs, tips, onDeleteVtuber, onVerifyVtuber, onDeleteBulletin, onAddCollab, onDeleteCollab, onSaveTips }) => {
      const [activeTab, setActiveTab] = useState('vtubers');
      const [newCollab, setNewCollab] = useState({ date: '', time: '', title: '', description: '' });
      const [editTips, setEditTips] = useState(tips);

      // 分離已審核與未審核名單
      const pendingVtubers = vtubers.filter(v => !v.isVerified);
      const verifiedVtubers = vtubers.filter(v => v.isVerified);

      return (
        <div className="max-w-5xl mx-auto px-4 py-8">
          <div className="text-center mb-8">
            <h2 className="text-3xl font-extrabold text-red-400 mb-2"><i className="fa-solid fa-shield-halved mr-3"></i>超級管理員中心</h2>
            <p className="text-sm text-gray-400">目前身分認證：apex.dasa@gmail.com</p>
          </div>

          <div className="flex gap-2 overflow-x-auto pb-4 mb-6">
            {[
              { id: 'vtubers', icon: 'fa-address-card', label: '名片與審核管理' },
              { id: 'bulletins', icon: 'fa-bullhorn', label: '招募管理' },
              { id: 'collabs', icon: 'fa-broadcast-tower', label: '連動時間表' },
              { id: 'tips', icon: 'fa-lightbulb', label: '小技巧範本' }
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2 rounded-xl font-bold text-sm whitespace-nowrap flex items-center gap-2 transition-colors ${activeTab === tab.id ? 'bg-red-600 text-white shadow-lg shadow-red-500/20' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>
                <i className={`fa-solid ${tab.icon}`}></i> {tab.label}
                {tab.id === 'vtubers' && pendingVtubers.length > 0 && (
                  <span className="bg-white text-red-600 px-2 py-0.5 rounded-full text-xs ml-1">{pendingVtubers.length}</span>
                )}
              </button>
            ))}
          </div>

          <div className="bg-gray-800/40 border border-gray-700 rounded-3xl p-6 shadow-2xl">
            {activeTab === 'vtubers' && (
              <div className="space-y-8">
                {/* 待審核區塊 */}
                <div>
                  <h3 className="text-xl font-bold text-yellow-400 mb-4 border-b border-gray-700 pb-2"><i className="fa-solid fa-user-clock mr-2"></i>待審核名單 ({pendingVtubers.length})</h3>
                  {pendingVtubers.length === 0 && <p className="text-gray-500 text-sm">目前沒有待審核的名片</p>}
                  <div className="space-y-3">
                    {pendingVtubers.map(v => (
                      <div key={v.id} className="flex flex-col sm:flex-row sm:items-center justify-between bg-gray-900 p-4 rounded-xl border border-yellow-500/30 gap-4">
                        <div className="flex items-center gap-4">
                          <img src={v.avatar} className="w-12 h-12 rounded-lg bg-gray-800 object-cover flex-shrink-0" />
                          <div>
                            <p className="font-bold text-white text-sm flex items-center gap-2">
                              {v.name} <span className="bg-gray-800 text-gray-400 px-2 py-0.5 rounded text-[10px]">{v.streamingStyle || '一般型態'}</span>
                            </p>
                            <p className="text-xs text-gray-400 mt-1 line-clamp-1">{v.description}</p>
                            {v.channelUrl && <a href={v.channelUrl} target="_blank" className="text-xs text-blue-400 hover:underline mt-1 inline-block"><i className="fa-solid fa-link"></i> 檢查頻道</a>}
                          </div>
                        </div>
                        <div className="flex items-center gap-2 flex-shrink-0">
                          <button onClick={() => onVerifyVtuber(v.id)} className="text-green-400 bg-green-500/10 hover:bg-green-500 hover:text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors"><i className="fa-solid fa-check mr-1"></i>通過審核</button>
                          <button onClick={() => onDeleteVtuber(v.id)} className="text-red-400 bg-red-500/10 hover:bg-red-500 hover:text-white px-3 py-2 rounded-lg text-sm font-bold transition-colors"><i className="fa-solid fa-trash"></i></button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* 已審核區塊 */}
                <div>
                  <h3 className="text-xl font-bold text-white mb-4 border-b border-gray-700 pb-2">已上架名片 ({verifiedVtubers.length})</h3>
                  {verifiedVtubers.length === 0 && <p className="text-gray-500 text-sm">目前尚無已審核的名片</p>}
                  <div className="space-y-3">
                    {verifiedVtubers.map(v => (
                      <div key={v.id} className="flex items-center justify-between bg-gray-900 p-4 rounded-xl border border-gray-700">
                        <div className="flex items-center gap-4">
                          <img src={v.avatar} className="w-10 h-10 rounded-lg bg-gray-800 object-cover flex-shrink-0" />
                          <div>
                            <p className="font-bold text-white text-sm flex items-center gap-1">{v.name} <i className="fa-solid fa-circle-check text-blue-400 ml-1 text-xs" title="已認證"></i></p>
                            <p className="text-xs text-gray-500">{v.agency}</p>
                          </div>
                        </div>
                        <button onClick={() => onDeleteVtuber(v.id)} className="text-gray-400 hover:text-white bg-gray-800 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex-shrink-0">下架刪除</button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'bulletins' && (
              <div className="space-y-4">
                <h3 className="text-xl font-bold text-white mb-4">招募文管理 (共 {bulletins.length} 筆)</h3>
                {bulletins.length === 0 && <p className="text-gray-500">目前尚無招募文資料</p>}
                {bulletins.map(b => (
                  <div key={b.id} className="flex flex-col sm:flex-row sm:items-center justify-between bg-gray-900 p-4 rounded-xl border border-gray-700 gap-4">
                    <div className="flex-1"><p className="text-sm text-gray-300 mb-1">{b.content}</p><p className="text-xs text-gray-500">發布者: {b.vtuber?.name} | {b.postedAt}</p></div>
                    <button onClick={() => onDeleteBulletin(b.id)} className="text-red-400 hover:text-white bg-red-500/10 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex-shrink-0">刪除</button>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'collabs' && (
              <div className="space-y-6">
                <div>
                  <h3 className="text-xl font-bold text-white mb-4">新增連動時間</h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    <input type="text" placeholder="日期 (例: 12/01 (五))" value={newCollab.date} onChange={e=>setNewCollab({...newCollab, date: e.target.value})} className="bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none" />
                    <input type="text" placeholder="時間 (例: 20:00)" value={newCollab.time} onChange={e=>setNewCollab({...newCollab, time: e.target.value})} className="bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none" />
                  </div>
                  <input type="text" placeholder="連動標題" value={newCollab.title} onChange={e=>setNewCollab({...newCollab, title: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none mb-4" />
                  <textarea placeholder="連動簡述" value={newCollab.description} onChange={e=>setNewCollab({...newCollab, description: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none resize-none mb-4" rows="2" />
                  <button onClick={() => { onAddCollab(newCollab); setNewCollab({date:'', time:'', title:'', description:''}); }} className="bg-red-600 hover:bg-red-500 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg">新增至時間表</button>
                </div>
                <div className="border-t border-gray-700 pt-6 space-y-4">
                  <h3 className="text-lg font-bold text-white mb-4">現有連動表</h3>
                  {collabs.length === 0 && <p className="text-gray-500">目前尚無連動行程</p>}
                  {collabs.map(c => (
                    <div key={c.id} className="flex items-center justify-between bg-gray-900 p-4 rounded-xl border border-gray-700">
                      <div><p className="font-bold text-white text-sm">[{c.date} {c.time}] {c.title}</p><p className="text-xs text-gray-400">{c.description}</p></div>
                      {c.createdAt && <button onClick={() => onDeleteCollab(c.id)} className="text-red-400 hover:text-white bg-red-500/10 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">刪除</button>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'tips' && (
              <div className="space-y-4">
                <h3 className="text-xl font-bold text-white mb-4">編輯邀約小技巧範本</h3>
                <textarea value={editTips} onChange={e=>setEditTips(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none resize-none" rows="10" />
                <button onClick={() => onSaveTips(editTips)} className="bg-red-600 hover:bg-red-500 text-white px-8 py-2.5 rounded-xl text-sm font-bold shadow-lg flex items-center gap-2"><i className="fa-solid fa-floppy-disk"></i> 儲存並發布更新</button>
              </div>
            )}
          </div>
        </div>
      );
    };

    // 從網址讀取初始頁面
    const getInitialView = () => {
      const hash = window.location.hash.replace('#', '');
      return hash || 'home';
    };

    // --- 主應用程式 ---
    function App() {
      const [currentView, setCurrentView] = useState(getInitialView());
      const [selectedVTuber, setSelectedVTuber] = useState(null);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      
      const [user, setUser] = useState(null);
      const [realVtubers, setRealVtubers] = useState([]);
      const [realBulletins, setRealBulletins] = useState([]);

      const [searchQuery, setSearchQuery] = useState('');
      const [selectedTags, setSelectedTags] = useState([]);
      const [selectedAgency, setSelectedAgency] = useState('All');
      
      const [isCollabModalOpen, setIsCollabModalOpen] = useState(false);
      const [copiedTemplate, setCopiedTemplate] = useState(false);
      const [newBulletin, setNewBulletin] = useState({ content: '', tags: '' });
      
      const [realCollabs, setRealCollabs] = useState([]);
      const [realTips, setRealTips] = useState("您好，我是 [您的名字/頻道名]。\n近期有在關注您的頻道，非常喜歡您的 [對方特色/直播內容]！\n\n想請問近期是否有機會邀請您一起進行 [企劃名稱/遊戲] 的連動呢？\n\n◆ 預計時間：[日期區間] 的 [時段]\n◆ 企劃內容：[簡述約 1-2 句話]\n◆ 目前參與人數：[人數]\n\n如果有興趣的話，我們可以進一步討論細節！\n若您近期排程較滿或不方便也完全沒關係，非常感謝您抽空閱讀。祝 直播順利！");

      // 自訂提示訊息 (Toast)
      const [toastMsg, setToastMsg] = useState('');
      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };

      const [profileForm, setProfileForm] = useState({
        name: '', agency: '個人勢', subscribers: '0', tags: '', description: '',
        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${Math.random()}&backgroundColor=b6e3f4`,
        banner: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&q=80&w=1000',
        schedule: '', collabTypes: '', mainPlatform: 'YouTube', channelUrl: '',
        streamingStyle: '一般型態' // 新增演出型態
      });

      // 檢查是否為管理員
      const isAdmin = user && user.email === 'apex.dasa@gmail.com';

      // 監聽網址變化 (Hash Routing)
      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.replace('#', '');
          if (hash === 'profile' && !selectedVTuber) {
            window.location.hash = 'grid';
          } else {
            setCurrentView(hash || 'home');
          }
        };

        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, [selectedVTuber]);

      // 1. 初始化 Google 登入狀態監聽
      useEffect(() => {
        const unsubscribeAuth = onAuthStateChanged(auth, (u) => setUser(u));
        return () => unsubscribeAuth();
      }, []);

      const handleLogin = async () => {
        try {
          await signInWithPopup(auth, provider);
          showToast("🎉 登入成功！");
        } catch (error) {
          console.error("登入失敗", error);
          showToast("登入失敗，請稍後再試。");
        }
      };

      const handleLogout = async () => {
        await signOut(auth);
        navigate('home');
        showToast("已成功登出。");
      };

      // 2. 監聽資料庫
      useEffect(() => {
        const unsubV = onSnapshot(collection(db, getPath('vtubers')), (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setRealVtubers(data);
          
          if(user) {
            const myProfile = data.find(v => v.id === user.uid);
            if (myProfile) {
              setProfileForm({
                ...myProfile,
                tags: Array.isArray(myProfile.tags) ? myProfile.tags.join(', ') : myProfile.tags || '',
                collabTypes: Array.isArray(myProfile.collabTypes) ? myProfile.collabTypes.join(', ') : myProfile.collabTypes || '',
                streamingStyle: myProfile.streamingStyle || '一般型態'
              });
            }
          }
        }, (err) => console.error(err));

        const unsubB = onSnapshot(collection(db, getPath('bulletins')), (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setRealBulletins(data);
        }, (err) => console.error(err));

        const unsubC = onSnapshot(collection(db, getPath('collabs')), (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setRealCollabs(data);
        }, (err) => console.error(err));

        const unsubT = onSnapshot(doc(db, getPath('settings'), 'tips'), (docSnap) => {
          if (docSnap.exists() && docSnap.data().content) {
            setRealTips(docSnap.data().content);
          }
        }, (err) => console.error(err));

        return () => { unsubV(); unsubB(); unsubC(); unsubT(); };
      }, [user]);

      // 3. 整合真假資料
      const displayVtubers = useMemo(() => {
        const list = [...realVtubers];
        const mockList = MOCK_VTUBERS.filter(m => !list.find(r => r.id === m.id));
        return [...list, ...mockList];
      }, [realVtubers]);

      const displayBulletins = useMemo(() => {
        const list = [...realBulletins, ...MOCK_BULLETINS].map(b => {
          const vt = displayVtubers.find(v => v.id === b.userId) || { name: "匿名創作者", agency: "未知", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Anon&backgroundColor=374151" };
          return { ...b, vtuber: vt, postedAt: formatTime(b.createdAt) };
        });
        return list.sort((a, b) => b.createdAt - a.createdAt);
      }, [realBulletins, displayVtubers]);

      const displayCollabs = useMemo(() => {
        const list = [...realCollabs, ...MOCK_COLLABS];
        return list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      }, [realCollabs]);

      // 4. 搜尋篩選 (公開列表只顯示已審核的，或是使用者自己的)
      const filteredVTubers = useMemo(() => {
        // 先過濾出「已審核」或是「使用者自己的名片」
        const verifiedOrMine = displayVtubers.filter(v => v.isVerified || (user && v.id === user.uid) || v.id.startsWith('mock'));
        
        return verifiedOrMine.filter(v => {
          const matchSearch = v.name?.toLowerCase().includes(searchQuery.toLowerCase()) || v.description?.toLowerCase().includes(searchQuery.toLowerCase());
          const matchTags = selectedTags.length === 0 || selectedTags.every(t => v.tags?.includes(t));
          const matchAgency = selectedAgency === 'All' || v.agency?.includes(selectedAgency);
          return matchSearch && matchTags && matchAgency;
        });
      }, [displayVtubers, searchQuery, selectedTags, selectedAgency, user]);

      const toggleTag = (tag) => setSelectedTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);

      // 5. 資料庫寫入
      const handleSaveProfile = async (e) => {
        e.preventDefault();
        if (!user) return showToast("請先登入才能儲存名片！");
        try {
          const ref = doc(db, getPath('vtubers'), user.uid);
          const tagsArray = profileForm.tags.split(',').map(t => t.trim()).filter(t => t);
          const collabArray = profileForm.collabTypes.split(',').map(t => t.trim()).filter(t => t);
          
          // 檢查是否是第一次建立，如果是，將 isVerified 設為 false
          const existingProfile = realVtubers.find(v => v.id === user.uid);
          const isVerified = existingProfile ? existingProfile.isVerified : false;

          await setDoc(ref, { 
            ...profileForm, 
            tags: tagsArray, 
            collabTypes: collabArray, 
            likes: profileForm.likes || 0, 
            status: profileForm.status || '歡迎邀請', 
            isVerified: isVerified,
            updatedAt: Date.now() 
          }, { merge: true });
          
          showToast(isVerified ? "🎉 您的專屬名片已更新！" : "🎉 名片已建立！請等待管理員審核即可公開。");
          navigate('grid');
        } catch (err) { console.error(err); showToast("儲存失敗，請檢查網路狀態。"); }
      };

      const handlePostBulletin = async () => {
        if (!user) return showToast("請先登入才能發布招募文喔！");
        if (!newBulletin.content.trim()) return showToast("請輸入招募內容喔！");
        const hasProfile = realVtubers.find(v => v.id === user.uid);
        if (!hasProfile) {
          showToast("請先建立您的名片，才能發布招募文！");
          return navigate('dashboard');
        }
        if (!hasProfile.isVerified) {
          return showToast("您的名片仍在審核中，通過後才能發布招募文喔！");
        }

        try {
          const tagsArray = newBulletin.tags.split(',').map(t => t.trim()).filter(t => t);
          await addDoc(collection(db, getPath('bulletins')), { userId: user.uid, content: newBulletin.content, tags: tagsArray, createdAt: Date.now() });
          setNewBulletin({ content: '', tags: '' });
          showToast("🚀 招募文已發布！");
        } catch (err) { console.error(err); showToast("發布失敗，請稍後重試。"); }
      };

      // --- Admin 管理功能 ---
      const handleVerifyVtuber = async (id) => {
        if (!isAdmin) return;
        try { 
          await setDoc(doc(db, getPath('vtubers'), id), { isVerified: true }, { merge: true }); 
          showToast("已通過審核！此名片現在已公開。"); 
        } catch (err) { showToast("審核失敗"); }
      };
      
      const handleDeleteVtuber = async (id) => {
        if (!isAdmin) return;
        if (!confirm("確定要刪除這張名片嗎？(此動作無法復原)")) return;
        try { await deleteDoc(doc(db, getPath('vtubers'), id)); showToast("已刪除名片"); } catch (err) { showToast("刪除失敗"); }
      };
      const handleDeleteBulletin = async (id) => {
        if (!isAdmin) return;
        if (!confirm("確定要刪除這則招募文嗎？")) return;
        try { await deleteDoc(doc(db, getPath('bulletins'), id)); showToast("已刪除招募文"); } catch (err) { showToast("刪除失敗"); }
      };
      const handleAddCollab = async (collabData) => {
        if (!isAdmin) return;
        if (!collabData.title) return showToast("請至少填寫連動標題！");
        try { await addDoc(collection(db, getPath('collabs')), { ...collabData, createdAt: Date.now() }); showToast("已新增連動時間"); } catch (err) { showToast("新增失敗"); }
      };
      const handleDeleteCollab = async (id) => {
        if (!isAdmin) return;
        if (!confirm("確定要刪除這個連動行程嗎？")) return;
        try { await deleteDoc(doc(db, getPath('collabs'), id)); showToast("已刪除連動行程"); } catch (err) { showToast("刪除失敗"); }
      };
      const handleSaveTips = async (content) => {
        if (!isAdmin) return;
        try { await setDoc(doc(db, getPath('settings'), 'tips'), { content }, { merge: true }); showToast("已更新邀約小技巧範本"); } catch (err) { showToast("更新失敗"); }
      };

      const handleCopyTemplate = (textToCopy) => {
        const text = textToCopy || realTips;
        const textArea = document.createElement("textarea");
        textArea.value = text; document.body.appendChild(textArea); textArea.select(); document.execCommand("copy"); document.body.removeChild(textArea);
        setCopiedTemplate(true); setTimeout(() => setCopiedTemplate(false), 2000);
        showToast("已複製到剪貼簿！");
      };

      // 負責修改網址並觸發換頁
      const navigate = (view) => {
        if (view === 'dashboard' && !user) {
          handleLogin();
          return;
        }
        window.location.hash = view; // 這行會觸發 URL 變更，進而觸發 handleHashChange
        setIsMobileMenuOpen(false);
        window.scrollTo(0,0);
      };

      return (
        <div className="flex flex-col min-h-screen relative">
          {/* Toast 提示元件 */}
          {toastMsg && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-gray-800 border border-purple-500 text-white px-6 py-3 rounded-full shadow-[0_0_20px_rgba(168,85,247,0.3)] animate-slide-down flex items-center gap-3 font-bold text-sm">
              <i className="fa-solid fa-circle-info text-purple-400"></i> {toastMsg}
            </div>
          )}

          {/* 導覽列 */}
          <nav className="sticky top-0 z-40 backdrop-blur-md bg-[#0f111a]/90 border-b border-gray-800 shadow-xl">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2 cursor-pointer group" onClick={() => navigate('home')}>
                <div className="bg-gradient-to-br from-purple-500 to-pink-500 p-2 rounded-lg group-hover:shadow-[0_0_15px_rgba(168,85,247,0.5)] transition-all">
                  <i className="fa-solid fa-wand-magic-sparkles text-white"></i>
                </div>
                <span className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-400">V-Nexus</span>
              </div>

              {/* 電腦版選單 */}
              <div className="hidden lg:flex items-center gap-2 xl:gap-6 text-sm font-medium">
                <button onClick={() => navigate('home')} className={`transition-colors px-2 py-1 ${currentView === 'home' ? 'text-purple-400' : 'text-gray-300 hover:text-white'}`}>首頁介紹</button>
                <button onClick={() => navigate('grid')} className={`transition-colors px-2 py-1 ${currentView === 'grid' || currentView === 'profile' ? 'text-purple-400' : 'text-gray-300 hover:text-white'}`}>探索 VTuber</button>
                <button onClick={() => navigate('bulletin')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full transition-colors ${currentView === 'bulletin' ? 'bg-purple-500/20 text-purple-400' : 'text-gray-300 hover:text-white hover:bg-gray-800'}`}><i className="fa-solid fa-bullhorn"></i> 我想連動</button>
                <button onClick={() => navigate('collabs')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full transition-colors ${currentView === 'collabs' ? 'bg-red-500/20 text-red-400' : 'text-gray-300 hover:text-white hover:bg-gray-800'}`}><i className="fa-solid fa-broadcast-tower"></i> 確定連動</button>
                <button onClick={() => navigate('tips')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full transition-colors ${currentView === 'tips' ? 'bg-yellow-500/20 text-yellow-400' : 'text-gray-300 hover:text-white hover:bg-gray-800'}`}><i className="fa-solid fa-lightbulb"></i> 邀約小技巧</button>
                
                {/* 登入/會員系統按鈕 */}
                <div className="ml-4 flex items-center gap-3 border-l border-gray-700 pl-4">
                  {!user ? (
                    <button onClick={handleLogin} className="flex items-center gap-2 bg-white text-gray-900 hover:bg-gray-200 px-4 py-1.5 rounded-full transition-colors font-bold shadow-md">
                      <i className="fa-brands fa-google text-red-500"></i> Google 登入
                    </button>
                  ) : (
                    <div className="flex items-center gap-3">
                      <button onClick={() => navigate('dashboard')} className="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-600 px-3 py-1.5 rounded-full transition-colors relative">
                        <img src={user.photoURL || "https://api.dicebear.com/7.x/avataaars/svg?seed=Anon"} className="w-5 h-5 rounded-full" />
                        <span className="text-gray-300 text-xs font-bold truncate max-w-[80px]">{user.displayName || '創作者'}</span>
                        {/* 提醒未審核的小紅點 */}
                        {realVtubers.find(v => v.id === user.uid && !v.isVerified) && <span className="absolute -top-1 -right-1 flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>}
                      </button>
                      <button onClick={handleLogout} className="text-gray-500 hover:text-red-400 text-xs font-bold transition-colors" title="登出"><i className="fa-solid fa-right-from-bracket"></i></button>
                    </div>
                  )}
                  {isAdmin && (
                    <button onClick={() => navigate('admin')} className="ml-2 flex items-center gap-1.5 bg-red-500/10 text-red-400 border border-red-500/30 hover:bg-red-500/20 px-3 py-1.5 rounded-full transition-colors text-xs font-bold relative">
                      <i className="fa-solid fa-shield-halved"></i> 管理員
                      {realVtubers.filter(v => !v.isVerified).length > 0 && <span className="absolute -top-1 -right-1 flex h-3 w-3"><span className="relative inline-flex rounded-full h-3 w-3 bg-red-500 text-[8px] text-white justify-center items-center">{realVtubers.filter(v => !v.isVerified).length}</span></span>}
                    </button>
                  )}
                </div>
              </div>
              
              {/* 手機版漢堡按鈕 */}
              <div className="flex lg:hidden items-center gap-3">
                {!user ? (
                  <button onClick={handleLogin} className="text-gray-900 bg-white p-2 rounded-full text-sm font-bold shadow-lg"><i className="fa-brands fa-google text-red-500"></i></button>
                ) : (
                  <button onClick={() => navigate('dashboard')} className="p-0.5 border-2 border-purple-500 rounded-full relative">
                    <img src={user.photoURL || "https://api.dicebear.com/7.x/avataaars/svg?seed=Anon"} className="w-8 h-8 rounded-full" />
                    {realVtubers.find(v => v.id === user.uid && !v.isVerified) && <span className="absolute 0 right-0 flex h-3 w-3"><span className="relative inline-flex rounded-full h-3 w-3 bg-red-500 border border-gray-900"></span></span>}
                  </button>
                )}
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-gray-300 hover:text-white p-2 text-2xl"><i className={`fa-solid ${isMobileMenuOpen ? 'fa-xmark' : 'fa-bars'}`}></i></button>
              </div>
            </div>

            {/* 手機版下拉選單 */}
            {isMobileMenuOpen && (
              <div className="lg:hidden absolute top-16 left-0 w-full bg-[#0f111a]/95 backdrop-blur-md border-b border-gray-800 shadow-xl flex flex-col p-4 gap-4 z-50 animate-fade-in-up">
                <button onClick={() => navigate('home')} className={`text-left px-4 py-3 rounded-xl font-bold ${currentView === 'home' ? 'bg-purple-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}>首頁介紹</button>
                <button onClick={() => navigate('grid')} className={`text-left px-4 py-3 rounded-xl font-bold ${currentView === 'grid' || currentView === 'profile' ? 'bg-purple-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}>探索 VTuber</button>
                <button onClick={() => navigate('bulletin')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'bulletin' ? 'bg-purple-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}><i className="fa-solid fa-bullhorn w-5"></i> 我想連動</button>
                <button onClick={() => navigate('collabs')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'collabs' ? 'bg-red-500 text-white' : 'text-gray-300 hover:bg-gray-800'}`}><i className="fa-solid fa-broadcast-tower w-5"></i> 確定連動</button>
                <button onClick={() => navigate('tips')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'tips' ? 'bg-yellow-500 text-white' : 'text-gray-300 hover:bg-gray-800'}`}><i className="fa-solid fa-lightbulb w-5"></i> 邀約小技巧</button>
                {isAdmin && <button onClick={() => navigate('admin')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'admin' ? 'bg-red-600 text-white' : 'text-red-400 hover:bg-red-500/10'}`}><i className="fa-solid fa-shield-halved w-5"></i> 系統管理員</button>}
                {user && <button onClick={handleLogout} className="text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 text-red-400 hover:bg-red-500/10"><i className="fa-solid fa-right-from-bracket w-5"></i> 登出帳號</button>}
              </div>
            )}
          </nav>

          {/* 主要內容區 */}
          <main className="flex-1 animate-fade-in-up pb-10">
            {currentView === 'home' && <HomePage navigate={navigate} />}

            {currentView === 'dashboard' && (
              <div className="max-w-3xl mx-auto px-4 py-10">
                <div className="text-center mb-8">
                  <h2 className="text-3xl font-extrabold text-white flex items-center justify-center gap-3"><i className="fa-solid fa-user-circle text-purple-400"></i> 創作者中心：編輯名片</h2>
                  {/* 顯示審核狀態 */}
                  {user && realVtubers.find(v => v.id === user.uid) ? (
                    realVtubers.find(v => v.id === user.uid).isVerified ? (
                      <p className="text-green-400 mt-3 text-sm font-bold bg-green-500/10 inline-block px-4 py-1 rounded-full"><i className="fa-solid fa-circle-check mr-1"></i> 名片已認證上線</p>
                    ) : (
                      <p className="text-yellow-400 mt-3 text-sm font-bold bg-yellow-500/10 inline-block px-4 py-1 rounded-full"><i className="fa-solid fa-user-clock mr-1"></i> 名片審核中，通過後將自動公開</p>
                    )
                  ) : (
                    <p className="text-gray-400 mt-2">填寫完成後請等待管理員審核，確保社群品質！</p>
                  )}
                </div>
                <form onSubmit={handleSaveProfile} className="bg-gray-800/40 border border-gray-700 rounded-3xl p-6 sm:p-10 shadow-2xl space-y-6">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">VTuber 名稱 <span className="text-red-400">*</span></label><input required type="text" value={profileForm.name} onChange={e=>setProfileForm({...profileForm, name: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: 星詠 みお" /></div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-sm font-bold text-gray-300 mb-2">所屬勢力</label>
                        <select value={profileForm.agency} onChange={e=>setProfileForm({...profileForm, agency: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none"><option>個人勢</option><option>企業勢</option><option>社團勢</option><option>準備中</option></select>
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-gray-300 mb-2">演出型態(防雷)</label>
                        <select value={profileForm.streamingStyle} onChange={e=>setProfileForm({...profileForm, streamingStyle: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none text-sm"><option>一般型態</option><option>男聲女皮 (Babiniku)</option><option>女聲男皮</option><option>無性別/人外</option><option>其他</option></select>
                      </div>
                    </div>
                  </div>
                  <div><label className="block text-sm font-bold text-gray-300 mb-2">一句話自我介紹 <span className="text-red-400">*</span></label><textarea required rows="3" value={profileForm.description} onChange={e=>setProfileForm({...profileForm, description: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none resize-none" placeholder="讓大家快速認識你的直播風格！" /></div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">內容標籤 (逗號分隔)</label><input type="text" value={profileForm.tags} onChange={e=>setProfileForm({...profileForm, tags: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: 歌回, APEX" /></div>
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">願意連動類型 (逗號分隔)</label><input type="text" value={profileForm.collabTypes} onChange={e=>setProfileForm({...profileForm, collabTypes: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: FPS雙排, 歌回接力" /></div>
                  </div>
                  <div><label className="block text-sm font-bold text-gray-300 mb-2">可連動時段</label><input type="text" value={profileForm.schedule} onChange={e=>setProfileForm({...profileForm, schedule: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: 每週三五六晚上 20:00 後" /></div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <label className="block text-sm font-bold text-gray-300 mb-2">頭像圖片網址 (請貼上圖片連結)</label>
                      <div className="flex items-center gap-3">
                        <img src={profileForm.avatar} className="w-12 h-12 rounded-xl object-cover border border-gray-700 bg-gray-800 flex-shrink-0" />
                        <input type="url" value={profileForm.avatar} onChange={e=>setProfileForm({...profileForm, avatar: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white text-sm focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://..." />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-300 mb-2">橫幅背景網址 (請貼上圖片連結)</label>
                      <div className="flex items-center gap-3">
                        <img src={profileForm.banner} className="w-20 h-12 rounded-xl object-cover border border-gray-700 bg-gray-800 flex-shrink-0" />
                        <input type="url" value={profileForm.banner} onChange={e=>setProfileForm({...profileForm, banner: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white text-sm focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://..." />
                      </div>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">主打平台</label><select value={profileForm.mainPlatform} onChange={e=>setProfileForm({...profileForm, mainPlatform: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none"><option>YouTube</option><option>Twitch</option><option>其他</option></select></div>
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">頻道首頁連結</label><input type="url" value={profileForm.channelUrl} onChange={e=>setProfileForm({...profileForm, channelUrl: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://youtube.com/..." /></div>
                  </div>
                  <div className="pt-6 border-t border-gray-700 flex justify-end">
                    <button type="submit" className="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform hover:-translate-y-1"><i className="fa-solid fa-floppy-disk mr-2"></i>儲存名片</button>
                  </div>
                </form>
              </div>
            )}

            {currentView === 'grid' && (
              <div className="max-w-7xl mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
                <aside className="w-full lg:w-72 flex-shrink-0 space-y-6">
                  <div className="relative">
                    <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" placeholder="搜尋 VTuber..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-gray-800/50 border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-purple-500" />
                  </div>
                  <div className="bg-gray-800/30 border border-gray-800 rounded-xl p-5 space-y-5">
                    <h3 className="font-bold border-b border-gray-700 pb-2 text-gray-300"><i className="fa-solid fa-filter mr-2"></i>進階篩選</h3>
                    <div className="flex bg-gray-900 rounded-lg p-1 border border-gray-700">
                      {['All', '個人勢', '企業勢'].map(a => <button key={a} onClick={() => setSelectedAgency(a)} className={`flex-1 py-1.5 text-xs font-bold rounded-md ${selectedAgency === a ? 'bg-purple-600 text-white' : 'text-gray-400'}`}>{a === 'All' ? '全部' : a}</button>)}
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {ALL_TAGS.map(tag => <TagBadge key={tag} text={tag} selected={selectedTags.includes(tag)} onClick={() => toggleTag(tag)} />)}
                    </div>
                  </div>
                </aside>

                <div className="flex-1">
                  <h2 className="text-2xl font-bold mb-6 text-white flex items-center gap-2">
                    探索 VTubers 
                    {user && realVtubers.find(v => v.id === user.uid && !v.isVerified) && <span className="text-xs font-normal text-yellow-400 bg-yellow-500/10 px-3 py-1 rounded-full border border-yellow-500/30 ml-2"><i className="fa-solid fa-eye-slash mr-1"></i>您的名片審核中，目前僅自己可見</span>}
                  </h2>
                  {filteredVTubers.length === 0 ? <p className="text-center text-gray-500 mt-20">目前尚未有公開的名片</p> : (
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                      {filteredVTubers.map(v => (
                        <div key={v.id} onClick={() => { setSelectedVTuber(v); navigate('profile'); }} className={`group bg-gray-800/40 border ${!v.isVerified ? 'border-yellow-500/50' : 'border-gray-700/50'} rounded-2xl overflow-hidden cursor-pointer hover:border-purple-500/50 transition-all hover:-translate-y-1 flex flex-col relative`}>
                          {!v.isVerified && <div className="absolute top-2 left-2 z-10 bg-yellow-500 text-black text-[10px] font-bold px-2 py-0.5 rounded shadow-lg">待審核</div>}
                          <div className="h-24 relative overflow-hidden flex-shrink-0">
                            <img src={v.banner} className="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform" />
                            <span className="absolute top-2 right-2 px-2 py-0.5 text-[10px] font-bold bg-black/50 border border-gray-600 rounded text-white">{v.agency}</span>
                          </div>
                          <div className="p-4 relative flex-1 flex flex-col">
                            <img src={v.avatar} className="absolute -top-8 w-16 h-16 rounded-xl border-2 border-gray-800 bg-gray-900 object-cover" />
                            <div className="ml-20 mb-3">
                              <h3 className="font-bold text-white truncate flex items-center gap-1">
                                {v.name} {v.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-xs" title="已認證"></i>}
                              </h3>
                              <div className="flex gap-2 text-xs mt-1 text-gray-400">
                                <span className="flex items-center gap-1"><i className="fa-brands fa-youtube text-red-400"></i> {v.subscribers || '未公開'}</span>
                                <span className="flex items-center gap-1 text-green-400"><i className="fa-solid fa-thumbs-up"></i> {v.likes || 0}</span>
                              </div>
                            </div>
                            <p className="text-xs text-gray-400 line-clamp-2 h-8">{v.description}</p>
                            <div className="mt-3 pt-2 border-t border-gray-700/50 text-xs text-gray-400 flex items-center justify-between">
                              <span className="truncate"><i className="fa-solid fa-clock text-purple-400 mr-1"></i> {v.schedule || '未提供時段'}</span>
                              {v.channelUrl && v.channelUrl !== '#' && (
                                <a href={v.channelUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-red-500/20 text-red-400 hover:bg-red-500/30 px-2 py-1 rounded transition-colors flex items-center gap-1 flex-shrink-0">
                                  <i className="fa-solid fa-play"></i> 頻道
                                </a>
                              )}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

            {currentView === 'profile' && selectedVTuber && (
              <div className="max-w-4xl mx-auto px-4 py-8">
                <button onClick={() => navigate('grid')} className="text-gray-400 hover:text-white mb-6 flex items-center text-sm"><i className="fa-solid fa-chevron-left mr-2"></i>返回探索</button>
                <div className="bg-gray-800/40 border border-gray-700 rounded-3xl overflow-hidden shadow-2xl">
                  <div className="h-48 sm:h-64 relative"><img src={selectedVTuber.banner} className="w-full h-full object-cover" /><div className="absolute inset-0 bg-gradient-to-t from-gray-900 to-transparent"></div></div>
                  <div className="px-6 sm:px-10 pb-10 relative">
                    <div className="flex flex-col sm:flex-row gap-6 items-start sm:items-end -mt-16 sm:-mt-20 mb-8 z-10 relative">
                      <img src={selectedVTuber.avatar} className="w-28 h-28 sm:w-36 sm:h-36 rounded-2xl border-4 border-gray-900 bg-gray-800 object-cover flex-shrink-0" />
                      <div className="flex-1 w-full">
                        <div className="flex flex-wrap items-center justify-between gap-4">
                          <div>
                            <h1 className="text-3xl sm:text-4xl font-extrabold text-white flex items-center gap-3">
                              {selectedVTuber.name} 
                              {selectedVTuber.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-2xl" title="已官方認證"></i>}
                              <span className="px-3 py-1 bg-gray-800 text-sm font-medium rounded-full text-gray-300 border border-gray-700">{selectedVTuber.agency}</span>
                            </h1>
                            <div className="flex flex-wrap gap-3 mt-3 text-sm">
                              <span className="bg-gray-800 border border-gray-700 text-gray-300 px-3 py-1 rounded-lg flex items-center gap-1.5"><i className="fa-brands fa-youtube text-red-400"></i> {selectedVTuber.subscribers || 0}</span>
                              <span className="bg-green-500/10 border border-green-500/30 text-green-400 px-3 py-1 rounded-lg flex items-center gap-1.5"><i className="fa-solid fa-thumbs-up"></i> {selectedVTuber.likes || 0} 推薦</span>
                              {selectedVTuber.channelUrl && selectedVTuber.channelUrl !== '#' && (
                                <a href={selectedVTuber.channelUrl} target="_blank" rel="noopener noreferrer" className="bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500/20 transition-colors px-3 py-1 rounded-lg flex items-center gap-1.5">
                                  <i className="fa-solid fa-play"></i> 前往頻道
                                </a>
                              )}
                            </div>
                          </div>
                          <button onClick={() => setIsCollabModalOpen(true)} className="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 text-white px-6 py-3 rounded-xl font-bold shadow-lg w-full sm:w-auto flex-shrink-0"><i className="fa-solid fa-paper-plane mr-2"></i>提出邀請</button>
                        </div>
                      </div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                      <div className="md:col-span-2 space-y-8">
                        <section><h3 className="text-xl font-bold border-b border-gray-700 pb-2 mb-4 text-purple-400"><i className="fa-solid fa-microphone mr-2"></i>關於我</h3><p className="text-gray-300 leading-relaxed whitespace-pre-wrap">{selectedVTuber.description}</p></section>
                        <section>
                          <h3 className="text-xl font-bold border-b border-gray-700 pb-2 mb-4 text-pink-400"><i className="fa-solid fa-gamepad mr-2"></i>內容標籤</h3>
                          <div className="flex flex-wrap gap-2">{(selectedVTuber.tags || []).map(t=><span key={t} className="px-3 py-1 bg-gray-900 border border-gray-700 rounded-lg text-sm text-gray-300">#{t}</span>)}</div>
                        </section>
                      </div>
                      <div className="space-y-6">
                        <div className="bg-gray-900/50 p-5 rounded-2xl border border-gray-700">
                          <h4 className="font-bold text-gray-200 mb-2"><i className="fa-solid fa-mask text-green-400 mr-2"></i>演出型態</h4>
                          <p className="text-sm text-gray-400 mb-4">{selectedVTuber.streamingStyle || '一般型態'}</p>
                          <h4 className="font-bold text-gray-200 mb-3"><i className="fa-solid fa-bullseye text-blue-400 mr-2"></i>願意連動類型</h4>
                          <ul className="text-sm text-gray-400 space-y-2">{(selectedVTuber.collabTypes || []).map(t=><li key={t}>• {t}</li>)}</ul>
                        </div>
                        <div className="bg-gray-900/50 p-5 rounded-2xl border border-gray-700"><h4 className="font-bold text-gray-200 mb-2"><i className="fa-solid fa-clock text-pink-400 mr-2"></i>可連動時段</h4><p className="text-sm text-gray-400">{selectedVTuber.schedule}</p></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {currentView === 'bulletin' && (
              <div className="max-w-4xl mx-auto px-4 py-8">
                <div className="text-center mb-10">
                  <h2 className="text-3xl font-extrabold text-purple-400 mb-3"><i className="fa-solid fa-bullhorn mr-3"></i>即時招募佈告欄</h2>
                  <p className="text-gray-400">最新發布的招募文都會同步顯示在這裡！</p>
                </div>
                
                <div className="bg-gray-800/60 border border-purple-500/30 rounded-3xl p-6 mb-10 shadow-lg">
                  <h3 className="font-bold text-white mb-4"><i className="fa-solid fa-wand-magic-sparkles text-purple-400 mr-2"></i>發布招募需求</h3>
                  <textarea value={newBulletin.content} onChange={e=>setNewBulletin({...newBulletin, content: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white mb-4 focus:ring-purple-500 focus:border-purple-500 outline-none" rows="3" placeholder="想找人一起玩什麼遊戲呢？" />
                  <div className="flex flex-col sm:flex-row gap-4 justify-between items-end">
                    <div className="w-full sm:w-2/3"><label className="text-xs text-gray-400 mb-1 block">加上標籤 (逗號分隔)</label><input type="text" value={newBulletin.tags} onChange={e=>setNewBulletin({...newBulletin, tags: e.target.value})} placeholder="例: APEX, 週末晚上" className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-purple-500 outline-none text-sm" /></div>
                    <button onClick={handlePostBulletin} className="w-full sm:w-auto bg-purple-600 hover:bg-purple-500 text-white px-8 py-3 rounded-xl font-bold"><i className="fa-solid fa-paper-plane mr-2"></i>送出發布</button>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {displayBulletins.length === 0 ? <p className="col-span-1 md:col-span-2 text-center text-gray-500 mt-10">目前尚無招募文</p> : displayBulletins.map(b => (
                    <div key={b.id} className="bg-gray-800/40 border border-gray-700 rounded-2xl p-6 flex flex-col hover:border-purple-500/50 transition-colors">
                      <div className="flex items-center gap-4 mb-4">
                        <img src={b.vtuber.avatar} className="w-12 h-12 rounded-full border border-gray-600 object-cover" />
                        <div className="flex-1">
                          <div className="flex justify-between"><h4 className="font-bold text-white">{b.vtuber.name}</h4><span className="text-xs text-gray-500">{b.postedAt}</span></div>
                          <span className="text-xs text-purple-400 bg-purple-500/10 px-2 rounded">{b.vtuber.agency}</span>
                        </div>
                      </div>
                      <p className="text-gray-300 text-sm mb-4 flex-1 bg-gray-900/50 p-4 rounded-xl border border-gray-800">{b.content}</p>
                      <div className="flex gap-2 mb-4">{(b.tags||[]).map(t=><span key={t} className="text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded-full border border-gray-700">#{t}</span>)}</div>
                      <button onClick={()=>{setSelectedVTuber(b.vtuber); navigate('profile');}} className="w-full bg-gray-700 hover:bg-purple-600 text-white py-2.5 rounded-xl text-sm font-bold transition-colors"><i className="fa-solid fa-hand-holding-heart mr-2"></i>前往名片查看</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {currentView === 'collabs' && <CollabsPage collabs={displayCollabs} />}
            {currentView === 'tips' && <TipsPage handleCopyTemplate={handleCopyTemplate} copiedTemplate={copiedTemplate} customTips={realTips} />}
            {currentView === 'admin' && isAdmin && (
              <AdminPage 
                vtubers={displayVtubers} bulletins={displayBulletins} collabs={displayCollabs} tips={realTips}
                onDeleteVtuber={handleDeleteVtuber} onVerifyVtuber={handleVerifyVtuber} onDeleteBulletin={handleDeleteBulletin}
                onAddCollab={handleAddCollab} onDeleteCollab={handleDeleteCollab} onSaveTips={handleSaveTips}
              />
            )}
          </main>

          {/* Modal */}
          {isCollabModalOpen && selectedVTuber && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-sm overflow-hidden animate-fade-in-up shadow-2xl">
                <div className="px-5 py-4 border-b border-gray-800 flex justify-between items-center">
                  <h3 className="font-bold text-white"><i className="fa-solid fa-paper-plane text-purple-400 mr-2"></i>發送邀請</h3>
                  <button onClick={() => setIsCollabModalOpen(false)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark"></i></button>
                </div>
                <div className="p-5 space-y-4">
                  <textarea rows="4" className="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-sm text-white focus:ring-purple-500 outline-none resize-none" placeholder="寫下您的邀請內容..."></textarea>
                  <button onClick={() => { showToast("信件已模擬寄出！"); setIsCollabModalOpen(false); }} className="w-full bg-purple-600 hover:bg-purple-500 text-white py-2.5 rounded-xl font-bold">送出</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
