      };

      const handleAdminPublish = () => {
        if (!newCollab.dateTime || !newCollab.streamUrl || !newCollab.title) return showToast("請完整填寫日期、連結與標題！");
        const dt = new Date(newCollab.dateTime);
        onAddCollab({ ...newCollab, date: `${dt.getMonth()+1}/${dt.getDate()} (${['日','一','二','三','四','五','六'][dt.getDay()]})`, time: `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`, startTimestamp: dt.getTime() });
        setNewCollab({ dateTime: '', title: '', streamUrl: '', coverUrl: '' });
      };

      return (
        <>
          <div className="max-w-5xl mx-auto px-4 py-8 relative animate-fade-in-up">
            <div className="text-center mb-8"><h2 className="text-3xl font-extrabold text-red-400 mb-2"><i className="fa-solid fa-shield-halved mr-3"></i>超級管理員中心</h2></div>
            <div className="flex gap-2 overflow-x-auto pb-4 mb-6">
              {[{ id: 'vtubers', icon: 'fa-address-card', label: '名片與審核管理' }, { id: 'bulletins', icon: 'fa-bullhorn', label: '招募管理' },
                { id: 'collabs', icon: 'fa-broadcast-tower', label: '連動時間表' }, { id: 'settings', icon: 'fa-gear', label: '系統設定與規範' }].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2 rounded-xl font-bold text-sm whitespace-nowrap flex items-center gap-2 transition-colors ${activeTab === tab.id ? 'bg-red-600 text-white shadow-lg shadow-red-500/20' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>
                  <i className={`fa-solid ${tab.icon}`}></i> {tab.label}
                  {tab.id === 'vtubers' && pendingVtubers.length > 0 && <span className="bg-white text-red-600 px-2 py-0.5 rounded-full text-xs ml-1">{pendingVtubers.length}</span>}
                </button>
              ))}
            </div>
            <div className="bg-gray-800/40 border border-gray-700 rounded-3xl p-6 shadow-2xl">
              {activeTab === 'vtubers' && (
                <div className="space-y-8">
                  <div>
                    <h3 className="text-xl font-bold text-yellow-400 mb-4 border-b border-gray-700 pb-2"><i className="fa-solid fa-user-clock mr-2"></i>待審核名單 ({pendingVtubers.length})</h3>
                    {pendingVtubers.length === 0 && <p className="text-gray-500 text-sm">目前沒有待審核的名片</p>}
                    <div className="space-y-3">
                      {pendingVtubers.map(v => (
                        <div key={v.id} className="flex flex-col sm:flex-row sm:items-center justify-between bg-gray-900 p-4 rounded-xl border border-yellow-500/30 gap-4">
                          <div className="flex items-center gap-4">
                            <img src={v.avatar} className="w-12 h-12 rounded-lg bg-gray-800 object-cover flex-shrink-0" />
                            <div>
                              <p className="font-bold text-white text-sm flex items-center gap-2">{v.name || '（未填寫名稱的空白名片）'} <span className="bg-gray-800 text-gray-400 px-2 py-0.5 rounded text-[10px]">{v.streamingStyle || '一般型態'}</span></p>
                              {v.verificationNote && <p className="text-xs text-yellow-400 mt-1 bg-yellow-500/10 p-1.5 rounded border border-yellow-500/20"><i className="fa-solid fa-key mr-1"></i> 驗證備註: {v.verificationNote}</p>}
                            </div>
                          </div>
                          <div className="flex items-center gap-2 flex-shrink-0">
                            <button onClick={() => onVerifyVtuber(v.id)} className="text-green-400 bg-green-500/10 hover:bg-green-500 hover:text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors"><i className="fa-solid fa-check mr-1"></i>通過審核</button>
                            <button onClick={() => handleEditClick(v)} className="text-blue-400 bg-blue-500/10 hover:bg-blue-500 hover:text-white px-3 py-2 rounded-lg text-sm font-bold transition-colors"><i className="fa-solid fa-pen"></i></button>
                            <button onClick={() => onDeleteVtuber(v.id)} className="text-red-400 bg-red-500/10 hover:bg-red-500 hover:text-white px-3 py-2 rounded-lg text-sm font-bold transition-colors"><i className="fa-solid fa-trash"></i></button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div>
                    <h3 className="text-xl font-bold text-white mb-4 border-b border-gray-700 pb-2">已上架名片 ({verifiedVtubers.length})</h3>
                    <div className="space-y-3">
                      {verifiedVtubers.map(v => (
                        <div key={v.id} className="flex items-center justify-between bg-gray-900 p-4 rounded-xl border border-gray-700">
                          <div className="flex items-center gap-4">
                            <img src={v.avatar} className="w-10 h-10 rounded-lg bg-gray-800 object-cover flex-shrink-0" />
                            <div><p className="font-bold text-white text-sm flex items-center gap-1">{v.name} <i className="fa-solid fa-circle-check text-blue-400 ml-1 text-xs" title="已認證"></i></p><p className="text-xs text-gray-500">{v.agency} | 狀態: {v.activityStatus === 'sleep' ? '休眠' : v.activityStatus === 'graduated' ? '畢業' : '活躍'}</p></div>
                          </div>
                          <div className="flex items-center gap-2">
                            <button onClick={() => handleEditClick(v)} className="text-blue-400 hover:text-white bg-blue-500/10 hover:bg-blue-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex-shrink-0">編輯</button>
                            <button onClick={() => onDeleteVtuber(v.id)} className="text-gray-400 hover:text-white bg-gray-800 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex-shrink-0">下架刪除</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div>
                    <h3 className="text-xl font-bold text-red-500 mb-4 border-b border-gray-700 pb-2"><i className="fa-solid fa-skull-crossbones mr-2"></i>黑單避雷區 ({blacklistedVtubers.length})</h3>
                    <div className="space-y-3">
                      {blacklistedVtubers.map(v => (
                        <div key={v.id} className="flex items-center justify-between bg-red-950/20 p-4 rounded-xl border border-red-900/50">
                          <div className="flex items-center gap-4">
                            <img src={v.avatar} className="w-10 h-10 rounded-lg bg-gray-800 object-cover flex-shrink-0 opacity-50 grayscale" />
                            <div><p className="font-bold text-gray-400 text-sm line-through">{v.name}</p><p className="text-xs text-red-400 font-bold">倒讚數: {v.dislikes || 0}</p></div>
                          </div>
                          <div className="flex items-center gap-2">
                            <button onClick={() => handleEditClick(v)} className="text-blue-400 hover:text-white bg-blue-500/10 hover:bg-blue-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex-shrink-0">審視/編輯</button>
                            <button onClick={() => onDeleteVtuber(v.id)} className="text-red-400 hover:text-white bg-red-900/50 hover:bg-red-600 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex-shrink-0">徹底刪除</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="mt-12 pt-6 border-t border-red-500/50">
                    <button onClick={onResetAllCollabTypes} className="bg-red-900 hover:bg-red-700 text-white border border-red-500 px-6 py-3 rounded-xl text-sm font-bold transition-colors shadow-lg shadow-red-500/20"><i className="fa-solid fa-bomb mr-2"></i>重置所有名片的連動類型 (要求重新勾選)</button>
                  </div>
                </div>
              )}
              {activeTab === 'bulletins' && (
                <div className="space-y-4">
                  <h3 className="text-xl font-bold text-white mb-4">招募文管理 (共 {(bulletins || []).length} 筆)</h3>
                  {(bulletins || []).map(b => (
                    <div key={b.id} className="flex flex-col sm:flex-row sm:items-center justify-between bg-gray-900 p-4 rounded-xl border border-gray-700 gap-4">
                      <div className="flex-1"><p className="text-sm text-gray-300 mb-1">{b.content}</p><p className="text-xs text-gray-500">發布者: {b.vtuber?.name} | {b.postedAt}</p></div>
                      <button onClick={() => onDeleteBulletin(b.id)} className="text-red-400 hover:text-white bg-red-500/10 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex-shrink-0">刪除</button>
                    </div>
                  ))}
                </div>
              )}
              {activeTab === 'collabs' && (
                <div className="space-y-6">
                  <div>
                    <h3 className="text-xl font-bold text-white mb-4">新增連動時間 (管理員代發)</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                      <div className="w-full min-w-0"><label className="text-xs text-gray-400 mb-1 block">聯動時間 <span className="text-red-400">*</span></label><input type="datetime-local" value={newCollab.dateTime} onChange={e=>setNewCollab({...newCollab, dateTime: e.target.value})} className="w-full min-w-0 box-border bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none" /></div>
                      <div className="w-full min-w-0 relative"><label className="text-xs text-gray-400 mb-1 block">直播連結 <span className="text-red-400">*</span></label><input type="url" placeholder="https://..." value={newCollab.streamUrl} onChange={e=>setNewCollab({...newCollab, streamUrl: e.target.value})} className="w-full min-w-0 box-border bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none pr-3" /></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                      <div className="w-full min-w-0"><label className="text-xs text-gray-400 mb-1 block">連動標題 <span className="text-red-400">*</span></label><input type="text" placeholder="連動標題" value={newCollab.title} onChange={e=>setNewCollab({...newCollab, title: e.target.value})} className="w-full min-w-0 box-border bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none" /></div>
                      <div className="w-full min-w-0"><label className="text-xs text-gray-400 mb-1 block">自訂封面圖網址 (選填)</label><input type="url" placeholder="自訂封面圖網址 (選填，不填則自動抓YT)" value={newCollab.coverUrl} onChange={e=>setNewCollab({...newCollab, coverUrl: e.target.value})} className="w-full min-w-0 box-border bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none" /></div>
                    </div>
                    <button onClick={handleAdminPublish} className="bg-red-600 hover:bg-red-500 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg">發布</button>
                  </div>
                  <div className="border-t border-gray-700 pt-6 space-y-4">
                    <h3 className="text-lg font-bold text-white mb-4">現有連動表清單 (簡易檢視)</h3>
                    {(collabs || []).map(c => (
                      <div key={c.id} className="flex items-center justify-between bg-gray-900 p-4 rounded-xl border border-gray-700">
                        <div><p className="font-bold text-white text-sm">[{c.date} {c.time}] {c.title}</p></div>
                        {c.createdAt && <button onClick={() => onDeleteCollab(c.id)} className="text-red-400 hover:text-white bg-red-500/10 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">刪除</button>}
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {activeTab === 'settings' && (
                <div className="space-y-8">
                  <div>
                    <h3 className="text-xl font-bold text-white mb-4">編輯【V-NEXUS聯動規範】彈窗內容</h3>
                    <textarea value={editRules} onChange={e=>setEditRules(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-sm text-white focus:ring-2 focus:ring-red-500 outline-none resize-none" rows="8" />
                  </div>
                  <div className="pt-4 border-t border-gray-700 flex justify-end">
                    <button onClick={() => onSaveSettings(undefined, editRules)} className="bg-red-600 hover:bg-red-500 text-white px-8 py-2.5 rounded-xl text-sm font-bold shadow-lg flex items-center gap-2"><i className="fa-solid fa-floppy-disk"></i> 儲存規範內容</button>
                  </div>
                </div>
              )}
            </div>
          </div>
          {editingVtuber && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-2xl flex flex-col max-h-[90vh] shadow-2xl animate-fade-in-up">
                <div className="sticky top-0 bg-gray-900/95 backdrop-blur px-6 py-4 border-b border-gray-800 flex justify-between items-center z-10 flex-shrink-0">
                  <h3 className="font-bold text-white"><i className="fa-solid fa-pen-to-square text-blue-400 mr-2"></i>強制編輯名片：{editingVtuber.name}</h3>
                  <button onClick={() => setEditingVtuber(null)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                </div>
                <div className="p-6 space-y-4 overflow-y-auto">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs text-gray-400 mb-1">VTuber 名稱 <span className="text-red-400">*</span></label><input required type="text" value={editingVtuber.name} onChange={e=>setEditingVtuber({...editingVtuber, name: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                    <div className="grid grid-cols-2 gap-2">
                      <div><label className="block text-xs text-gray-400 mb-1">所屬勢力</label><select value={editingVtuber.agency} onChange={e=>setEditingVtuber({...editingVtuber, agency: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500"><option>個人勢</option><option>企業勢</option><option>社團勢</option></select></div>
                      <div><label className="block text-xs text-gray-400 mb-1">演出型態</label><select value={editingVtuber.streamingStyle} onChange={e=>setEditingVtuber({...editingVtuber, streamingStyle: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500"><option>一般型態</option><option>男聲女皮 (Babiniku)</option><option>女聲男皮</option><option>無性別/人外</option><option>其他</option></select></div>
                    </div>
                  </div>
                  <div><label className="block text-xs text-gray-400 mb-1">名片顯示狀態</label>
                    <select value={editingVtuber.activityStatus} onChange={e=>setEditingVtuber({...editingVtuber, activityStatus: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500">
                      <option value="active">✅ 活躍</option><option value="sleep">⏸️ 休眠</option><option value="graduated">🎓 畢業</option>
                    </select>
                  </div>
                  <div><label className="block text-xs text-gray-400 mb-1">介紹一下你自己吧！ <span className="text-red-400">*</span></label><textarea required rows="2" value={editingVtuber.description} onChange={e=>setEditingVtuber({...editingVtuber, description: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm resize-none outline-none focus:border-blue-500" /></div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs text-gray-400 mb-1">內容標籤 (逗號分隔)</label><input type="text" value={editingVtuber.tags} onChange={e=>setEditingVtuber({...editingVtuber, tags: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                    <div><label className="block text-xs text-gray-400 mb-1">主要願意連動類型 (至多三項) <span className="text-red-400">*</span></label><CollabTypeCheckboxes formState={editingVtuber} setFormState={setEditingVtuber} showToast={showToast} /></div>
                  </div>
                  <div className="grid grid-cols-1 gap-4">
                    <div className="md:col-span-2"><label className="block text-xs text-gray-400 mb-1">可連動時段 <span className="text-red-400">*</span></label><ScheduleEditor isAnytime={editingVtuber.isScheduleAnytime} setIsAnytime={(val) => setEditingVtuber({...editingVtuber, isScheduleAnytime: val})} isExcept={editingVtuber.isScheduleExcept} setIsExcept={(val) => setEditingVtuber({...editingVtuber, isScheduleExcept: val})} isCustom={editingVtuber.isScheduleCustom} setIsCustom={(val) => setEditingVtuber({...editingVtuber, isScheduleCustom: val})} customText={editingVtuber.customScheduleText} setCustomText={(val) => setEditingVtuber({...editingVtuber, customScheduleText: val})} slots={editingVtuber.scheduleSlots} setSlots={(val) => setEditingVtuber({...editingVtuber, scheduleSlots: val})} /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                    <div><label className="block text-xs text-gray-400 mb-1">推薦數 (管理員修改)</label><input type="number" value={editingVtuber.likes} onChange={e=>setEditingVtuber({...editingVtuber, likes: Number(e.target.value)})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                    <div><label className="block text-xs text-gray-400 mb-1">倒讚數/檢舉數 (10次自動下架)</label><input type="number" value={editingVtuber.dislikes} onChange={e=>setEditingVtuber({...editingVtuber, dislikes: Number(e.target.value)})} className="w-full bg-red-900/50 border border-red-700 rounded-lg p-2 text-white text-sm outline-none focus:border-red-500" /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs text-gray-400 mb-1">YouTube 訂閱數 <span className="text-red-400">*</span></label><input required type="text" value={editingVtuber.youtubeSubscribers} onChange={e=>setEditingVtuber({...editingVtuber, youtubeSubscribers: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                    <div><label className="block text-xs text-gray-400 mb-1">Twitch 追隨數 <span className="text-red-400">*</span></label><input required type="text" value={editingVtuber.twitchFollowers} onChange={e=>setEditingVtuber({...editingVtuber, twitchFollowers: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs text-gray-400 mb-1">頭像圖片網址</label>
                      <input type="url" value={editingVtuber.avatar} onChange={e=>setEditingVtuber({...editingVtuber, avatar: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" />
                    </div>
                    <div>
                      <label className="block text-xs text-gray-400 mb-1">橫幅背景網址</label>
                      <input type="url" value={editingVtuber.banner} onChange={e=>setEditingVtuber({...editingVtuber, banner: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" />
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="flex items-center justify-between text-xs text-gray-400 mb-1"><span>YouTube 連結</span><label className="flex items-center gap-1 text-purple-400 cursor-pointer"><input type="radio" name="adminMainPlatform" value="YouTube" checked={editingVtuber.mainPlatform === 'YouTube'} onChange={(e) => setEditingVtuber({...editingVtuber, mainPlatform: e.target.value})} className="accent-purple-500" />主要直播平台</label></label>
                      <input type="url" value={editingVtuber.youtubeUrl} onChange={e=>setEditingVtuber({...editingVtuber, youtubeUrl: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" />
                    </div>
                    <div>
                      <label className="flex items-center justify-between text-xs text-gray-400 mb-1"><span>Twitch 連結</span><label className="flex items-center gap-1 text-purple-400 cursor-pointer"><input type="radio" name="adminMainPlatform" value="Twitch" checked={editingVtuber.mainPlatform === 'Twitch'} onChange={(e) => setEditingVtuber({...editingVtuber, mainPlatform: e.target.value})} className="accent-purple-500" />主要直播平台</label></label>
                      <input type="url" value={editingVtuber.twitchUrl} onChange={e=>setEditingVtuber({...editingVtuber, twitchUrl: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" />
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs text-gray-400 mb-1">X 連結</label><input type="url" value={editingVtuber.xUrl} onChange={e=>setEditingVtuber({...editingVtuber, xUrl: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                    <div><label className="block text-xs text-gray-400 mb-1">你的Instagram</label><input type="url" value={editingVtuber.igUrl} onChange={e=>setEditingVtuber({...editingVtuber, igUrl: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs text-gray-400 mb-1">聯絡 Email (探索名片不顯示) <span className="text-red-400">*</span></label><input required type="email" value={editingVtuber.contactEmail} onChange={e=>setEditingVtuber({...editingVtuber, contactEmail: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" /></div>
                    <div><label className="block text-xs text-gray-400 mb-1">我的直播風格代表作</label><input type="url" value={editingVtuber.streamStyleUrl} onChange={e=>setEditingVtuber({...editingVtuber, streamStyleUrl: e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-white text-sm outline-none focus:border-blue-500" placeholder="填入您代表的直播連結" /></div>
                  </div>
                  <div className="pt-4 border-t border-gray-800 flex justify-end gap-3">
                    <button onClick={() => setEditingVtuber(null)} className="px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white transition-colors">取消</button>
                    <button onClick={handleSaveEdit} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg transition-colors">強制儲存更新</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </>
      );
    };

    // 從網址讀取初始頁面
    const getInitialView = () => {
      const hash = window.location.hash.replace('#', '');
      return hash || 'home';
    };

    // --- 主應用程式 ---
    function App() {
      const [currentView, setCurrentView] = useState(getInitialView());
      const [selectedVTuber, setSelectedVTuber] = useState(null);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [isMobileFilterOpen, setIsMobileFilterOpen] = useState(false);
      const [sortOrder, setSortOrder] = useState('random'); 
      
      const [isLoading, setIsLoading] = useState(true);
      const [currentTime, setCurrentTime] = useState(Date.now());
      const [siteStats, setSiteStats] = useState({ pageViews: 0 }); // 安全初始化的瀏覽人次狀態
      
      const [user, setUser] = useState(null);
      const [realVtubers, setRealVtubers] = useState([]);
      const [realBulletins, setRealBulletins] = useState([]);

      const [searchQuery, setSearchQuery] = useState('');
      const [selectedTags, setSelectedTags] = useState([]);
      const [selectedAgency, setSelectedAgency] = useState('All');
      const [selectedPlatform, setSelectedPlatform] = useState('All');
      
      // Modal States
      const [isCollabModalOpen, setIsCollabModalOpen] = useState(false);
      const [isRulesModalOpen, setIsRulesModalOpen] = useState(false);
      const [confirmDislikeData, setConfirmDislikeData] = useState(null);
      const [copiedTemplate, setCopiedTemplate] = useState(false);
      
      const [newBulletin, setNewBulletin] = useState({ content: '', collabType: '', collabTypeOther: '', collabSize: '', collabTime: '', recruitEndTime: '' });
      const [inviteMessage, setInviteMessage] = useState(''); 
      
      const [realCollabs, setRealCollabs] = useState([]);
      
      // Firebase Settings States (加入安全空值防護)
      const [realTips, setRealTips] = useState("您好，我是 [您的名字/頻道名]。\n近期有在關注您的頻道，非常喜歡您的 [對方特色/直播內容]！\n\n想請問近期是否有機會邀請您一起進行 [企劃名稱/遊戲] 的連動呢？\n\n◆ 預計時間：[日期區間] 的 [時段]\n◆ 企劃內容：[簡述約 1-2 句話]\n◆ 目前參與人數：[人數]\n\n如果有興趣的話，我們可以進一步討論細節！\n若您近期排程較滿或不方便也完全沒關係，非常感謝您抽空閱讀。祝 直播順利！");
      const [realRules, setRealRules] = useState("我們都希望有好的聯動體驗，如果聯動完覺得V朋朋表現非常良好，記得給彼此一個讚（在名片上都可以按）。\n\n但是，就是這個但是！\n如果聯動的V朋朋有放鴿子、氣氛、騷擾或遲到等負面行為，也請在他的名片按倒讚。\n\n只要超過 <span class=\"text-red-400 font-bold text-lg mx-1\">十個倒讚</span> 即會自動下架他的名片，並加入黑單避雷區。\n\n所以良好的聯動環境請大家自行維護，負面行為本站絕不包庇。");

      const [toastMsg, setToastMsg] = useState('');
      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };

      const getEmptyProfile = (uid) => ({
        name: '', agency: '個人勢', tags: '', description: '',
        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${uid || Math.random()}&backgroundColor=b6e3f4`,
        banner: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&q=80&w=1000',
        isScheduleAnytime: false, isScheduleExcept: false, isScheduleCustom: false, customScheduleText: '', scheduleSlots: [], 
        collabTypes: [], isOtherCollab: false, otherCollabText: '', 
        streamingStyle: '一般型態',
        activityStatus: 'active', // 策略四：預設為活躍狀態
        youtubeSubscribers: '', twitchFollowers: '', youtubeUrl: '', twitchUrl: '',
        mainPlatform: 'YouTube', streamStyleUrl: '', 
        xUrl: '', igUrl: '', contactEmail: '', verificationNote: ''
      });

      const [profileForm, setProfileForm] = useState(getEmptyProfile());

      const isAdmin = user && user.email === 'apex.dasa@gmail.com';
      const myProfile = user ? realVtubers.find(v => v.id === user.uid) : null;
      const isVerifiedUser = isAdmin || (myProfile?.isVerified && !myProfile?.isBlacklisted);

      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.replace('#', '');
          if (hash === 'profile' && !selectedVTuber) {
            window.location.hash = 'grid';
          } else {
            setCurrentView(hash || 'home');
          }
        };
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, [selectedVTuber]);

      useEffect(() => {
        const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
          setUser(u);
          setProfileForm(getEmptyProfile(u?.uid));
        });
        const timer = setInterval(() => setCurrentTime(Date.now()), 60000);
        return () => { unsubscribeAuth(); clearInterval(timer); };
      }, []);

      // 策略一：更新最後上線時間
      useEffect(() => {
        if (user && user.uid) {
          const updateActive = async () => {
            try {
              await updateDoc(doc(db, getPath('vtubers'), user.uid), { lastActiveAt: Date.now() });
            } catch(e) {}
          };
          updateActive();
        }
      }, [user?.uid]);

      // 處理網站瀏覽人次 (使用 increment 安全遞增)
      useEffect(() => {
        const statsRef = doc(db, getPath('settings'), 'stats');
        const incrementPageView = async () => {
          try {
            await updateDoc(statsRef, { pageViews: increment(1) });
          } catch (e) {
            await setDoc(statsRef, { pageViews: 1 }, { merge: true });
          }
        };
        incrementPageView();

        const unsubStats = onSnapshot(statsRef, (docSnap) => {
          if (docSnap.exists()) { setSiteStats(docSnap.data()); }
        });
        return () => unsubStats();
      }, []);

      useEffect(() => {
        setIsLoading(true); 
        const unsubV = onSnapshot(collection(db, getPath('vtubers')), (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setRealVtubers(data);
          setIsLoading(false); 
          
          if(user) {
            const currentProfile = data.find(v => v.id === user.uid);
            if (currentProfile) {
              const standardTypes = (currentProfile.collabTypes || []).filter(t => PREDEFINED_COLLABS.includes(t));
              const otherType = (currentProfile.collabTypes || []).filter(t => !PREDEFINED_COLLABS.includes(t))[0] || '';

              setProfileForm(prev => ({
                ...prev,
                ...currentProfile,
                name: currentProfile.name || prev.name,
                description: currentProfile.description || prev.description,
                avatar: currentProfile.avatar || prev.avatar,
                banner: currentProfile.banner || prev.banner,
                tags: Array.isArray(currentProfile.tags) ? currentProfile.tags.join(', ') : currentProfile.tags || '',
                collabTypes: standardTypes,
                isOtherCollab: !!otherType,
                otherCollabText: otherType,
                isScheduleAnytime: currentProfile.isScheduleAnytime || false,
                isScheduleExcept: currentProfile.isScheduleExcept || false,
                isScheduleCustom: currentProfile.isScheduleCustom || false,
                customScheduleText: currentProfile.customScheduleText || '',
                scheduleSlots: currentProfile.scheduleSlots || [],
                streamingStyle: currentProfile.streamingStyle || prev.streamingStyle,
                activityStatus: currentProfile.activityStatus || prev.activityStatus,
                youtubeSubscribers: currentProfile.youtubeSubscribers || currentProfile.subscribers || '',
                twitchFollowers: currentProfile.twitchFollowers || '',
                youtubeUrl: currentProfile.youtubeUrl || currentProfile.channelUrl || '',
                twitchUrl: currentProfile.twitchUrl || '',
                mainPlatform: currentProfile.mainPlatform || 'YouTube',
                streamStyleUrl: currentProfile.streamStyleUrl || '',
                xUrl: currentProfile.xUrl || '',
                igUrl: currentProfile.igUrl || '',
                contactEmail: currentProfile.contactEmail || '',
                verificationNote: currentProfile.verificationNote || ''
              }));
            }
          }
        }, (err) => { console.error(err); setIsLoading(false); });

        const unsubB = onSnapshot(collection(db, getPath('bulletins')), (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setRealBulletins(data);
        }, (err) => console.error(err));

        const unsubC = onSnapshot(collection(db, getPath('collabs')), (snap) => {
          const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setRealCollabs(data);
        }, (err) => console.error(err));

        const unsubT = onSnapshot(doc(db, getPath('settings'), 'tips'), (docSnap) => {
          if (docSnap.exists() && docSnap.data().content) setRealTips(docSnap.data().content);
        }, (err) => console.error(err));

        const unsubR = onSnapshot(doc(db, getPath('settings'), 'rules'), (docSnap) => {
          if (docSnap.exists() && docSnap.data().content) setRealRules(docSnap.data().content);
        }, (err) => console.error(err));

        return () => { unsubV(); unsubB(); unsubC(); unsubT(); unsubR(); };
      }, [user]);

      const handleLogin = async () => {
        try {
          await signInWithPopup(auth, provider);
          showToast("🎉 登入成功！");
        } catch (error) {
          console.error("登入失敗", error);
          showToast("登入失敗，請稍後再試。");
        }
      };

      const handleLogout = async () => {
        await signOut(auth);
        navigate('home');
        showToast("已成功登出。");
      };

      const displayVtubers = useMemo(() => {
        const list = [...realVtubers];
        const mockList = MOCK_VTUBERS.filter(m => !list.find(r => r.id === m.id));
        const combined = [...list, ...mockList];
        
        for (let i = combined.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [combined[i], combined[j]] = [combined[j], combined[i]];
        }
        return combined;
      }, [realVtubers]);

      const dynamicCollabTypes = useMemo(() => {
        const types = new Set();
        // 排除黑名單與未審核，確保篩選器只抓到乾淨的資料
        const verifiedOrMine = displayVtubers.filter(v => isVtuberVisible(v, user));
        verifiedOrMine.forEach(v => {
          if (Array.isArray(v.collabTypes)) {
            v.collabTypes.forEach(t => {
              const trimmed = typeof t === 'string' ? t.trim() : '';
              if(trimmed) types.add(trimmed);
            });
          }
        });
        return Array.from(types).sort();
      }, [displayVtubers, user]);

      const displayBulletins = useMemo(() => {
        const list = [...realBulletins, ...MOCK_BULLETINS]
          .filter(b => !b.recruitEndTime || b.recruitEndTime > Date.now()) 
          .filter(b => {
             // 發佈者若隱藏了名片，則隱藏其貼文
             const vt = displayVtubers.find(v => v.id === b.userId);
             return vt ? isVtuberVisible(vt, user) : true; 
          })
          .map(b => {
            const vt = displayVtubers.find(v => v.id === b.userId) || { name: "匿名創作者", agency: "未知", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Anon&backgroundColor=374151" };
            return { ...b, vtuber: vt, postedAt: formatTime(b.createdAt) };
          });
        return list.sort((a, b) => b.createdAt - a.createdAt);
      }, [realBulletins, displayVtubers, user]);

      const displayCollabs = useMemo(() => {
        const THREE_HOURS = 3 * 60 * 60 * 1000;
        const list = [...realCollabs, ...MOCK_COLLABS].filter(c => {
          if (!c.startTimestamp) return true;
          return currentTime <= c.startTimestamp + THREE_HOURS;
        });
        return list.sort((a, b) => (a.startTimestamp || a.createdAt || 0) - (b.startTimestamp || b.createdAt || 0));
      }, [realCollabs, currentTime]);

      const filteredVTubers = useMemo(() => {
        // 過濾掉未審核與黑名單 (本人除外)，並套用策略一與四的邏輯
        const verifiedOrMine = displayVtubers.filter(v => isVtuberVisible(v, user));
        
        let result = verifiedOrMine.filter(v => {
          const matchSearch = v.name?.toLowerCase().includes(searchQuery.toLowerCase()) || v.description?.toLowerCase().includes(searchQuery.toLowerCase());
          const matchTags = selectedTags.length === 0 || selectedTags.every(t => v.collabTypes?.includes(t));
          const matchAgency = selectedAgency === 'All' || v.agency?.includes(selectedAgency);
          // 加入平台篩選邏輯
          const effectivePlatform = v.mainPlatform || 'YouTube';
          const matchPlatform = selectedPlatform === 'All' || effectivePlatform === selectedPlatform;
          
          return matchSearch && matchTags && matchAgency && matchPlatform;
        });

        if (sortOrder === 'likes') {
          result.sort((a, b) => (b.likes || 0) - (a.likes || 0));
        } else if (sortOrder === 'subscribers') {
          result.sort((a, b) => parseSubscribers(b) - parseSubscribers(a));
        } else if (sortOrder === 'newest') {
          result.sort((a, b) => (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0));
        } else {
          let shuffled = [...result];
          for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
          }
          result = shuffled;
        }

        return result;
      }, [displayVtubers, searchQuery, selectedTags, selectedAgency, selectedPlatform, user, sortOrder]); 

      const toggleTag = (tag) => setSelectedTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);

      const handleSaveProfile = async (e) => {
        e.preventDefault();
        if (!user) return showToast("請先登入才能儲存名片！");

        // 進行自訂必填驗證防呆
        let finalCollabs = [...(profileForm.collabTypes || [])];
        if (profileForm.isOtherCollab && profileForm.otherCollabText?.trim()) {
          finalCollabs.push(profileForm.otherCollabText.trim());
        }
        if (finalCollabs.length === 0) {
          return showToast("請至少選擇一項「主要願意連動類型」！");
        }

        if (!profileForm.isScheduleAnytime && !profileForm.isScheduleExcept) {
          if (profileForm.isScheduleCustom) {
            if (!profileForm.customScheduleText || !profileForm.customScheduleText.trim()) {
               return showToast("請填寫您的「自訂連動時段」！");
            }
          } else {
            if (!profileForm.scheduleSlots || profileForm.scheduleSlots.length === 0) {
               return showToast("請至少新增一個「可連動時段」或選擇其他時段模式！");
            }
          }
        }

        try {
          const ref = doc(db, getPath('vtubers'), user.uid);
          const tagsArray = (profileForm.tags || '').split(',').map(t => t.trim()).filter(t => t);
          
          const existingProfile = realVtubers.find(v => v.id === user.uid);
          const isVerified = existingProfile ? existingProfile.isVerified : false;

          await setDoc(ref, { 
            ...profileForm, 
            tags: tagsArray, 
            collabTypes: finalCollabs, 
            likes: profileForm.likes || 0, 
            likedBy: profileForm.likedBy || [], 
            dislikes: profileForm.dislikes || 0,
            dislikedBy: profileForm.dislikedBy || [],
            isBlacklisted: profileForm.isBlacklisted || false,
            status: profileForm.status || '歡迎邀請', 
            isVerified: isVerified,
            lastActiveAt: Date.now(), // 策略一：儲存時必定更新為最活耀狀態
            updatedAt: Date.now() 
          }, { merge: true });
          
          showToast(isVerified ? "🎉 您的專屬名片已更新！" : "🎉 名片已建立！請等待管理員審核即可公開。");
          navigate('grid');
        } catch (err) { console.error(err); showToast("儲存失敗，請檢查網路狀態。"); }
      };

      const handlePostBulletin = async () => {
        if (!user) return showToast("請先登入才能發布招募文喔！");
        if (!newBulletin.content.trim()) return showToast("請填寫招募內容！");
        if (!newBulletin.collabType) return showToast("請選擇連動性質！");
        if (newBulletin.collabType === '其他' && !newBulletin.collabTypeOther.trim()) return showToast("請輸入其他的連動性質！");
        if (!newBulletin.collabSize) return showToast("請選擇預估聯動人數！");
        if (!newBulletin.collabTime) return showToast("請填寫聯動時間！");
        if (!newBulletin.recruitEndTime) return showToast("請設定招募截止時間！");
        
        const recruitEndTimestamp = new Date(newBulletin.recruitEndTime).getTime();
        const collabTimeTimestamp = new Date(newBulletin.collabTime).getTime();

        if (recruitEndTimestamp < Date.now()) return showToast("招募截止時間不能設定在過去！");
        if (collabTimeTimestamp < recruitEndTimestamp) return showToast("⚠️ 連動時間不能早於招募截止日！");

        const hasProfile = realVtubers.find(v => v.id === user.uid);
        if (!hasProfile) {
          showToast("請先建立您的名片，才能發布招募文！");
          return navigate('dashboard');
        }
        if (!hasProfile.isVerified) {
          return showToast("您的名片仍在審核中，通過後才能發布招募文喔！");
        }

        try {
          const finalCollabType = newBulletin.collabType === '其他' ? newBulletin.collabTypeOther : newBulletin.collabType;

          await addDoc(collection(db, getPath('bulletins')), { 
            userId: user.uid, 
            content: newBulletin.content, 
            collabType: finalCollabType,
            collabSize: newBulletin.collabSize,
            collabTime: newBulletin.collabTime,
            recruitEndTime: recruitEndTimestamp,
            createdAt: Date.now() 
          });
          setNewBulletin({ content: '', collabType: '', collabTypeOther: '', collabSize: '', collabTime: '', recruitEndTime: '' });
          showToast("🚀 招募文已發布！");
        } catch (err) { console.error(err); showToast("發布失敗，請稍後重試。"); }
      };

      const handleRecommend = async (targetVtuber) => {
        if (!user) return showToast("請先登入才能給予推薦！");
        
        const currentMyProfile = realVtubers.find(v => v.id === user.uid);
        if (!currentMyProfile || !currentMyProfile.isVerified) {
          return showToast("只有通過官方認證的 VTuber 才能給予推薦喔！");
        }
        if (targetVtuber.id === user.uid) {
          return showToast("不能推薦自己喔！");
        }
        
        if (targetVtuber.likedBy && targetVtuber.likedBy.includes(user.uid)) {
          return showToast("您已經推薦過這位創作者囉！不能重複推薦。");
        }

        try {
          await setDoc(doc(db, getPath('vtubers'), targetVtuber.id), { 
            likes: (targetVtuber.likes || 0) + 1,
            likedBy: [...(targetVtuber.likedBy || []), user.uid]
          }, { merge: true });
          
          showToast("✅ 已送出您的推薦！");
          if (selectedVTuber && selectedVTuber.id === targetVtuber.id) {
             setSelectedVTuber(prev => ({ ...prev, likes: (prev.likes || 0) + 1, likedBy: [...(prev.likedBy || []), user.uid] }));
          }
        } catch (err) {
          console.error(err);
          showToast("推薦失敗，請稍後重試。");
        }
      };

      const handleInitiateDislike = (targetVtuber) => {
        if (!user) return showToast("請先登入才能給予倒讚！");
        
        const currentMyProfile = realVtubers.find(v => v.id === user.uid);
        if (!currentMyProfile || !currentMyProfile.isVerified) {
          return showToast("只有通過官方認證的 VTuber 才能給予倒讚喔！");
        }
        if (targetVtuber.id === user.uid) {
          return showToast("不能給自己倒讚喔！");
        }
        if (targetVtuber.dislikedBy && targetVtuber.dislikedBy.includes(user.uid)) {
          return showToast("您已經倒讚過這位創作者囉！不能重複倒讚。");
        }
        
        setConfirmDislikeData(targetVtuber);
      };

      const handleConfirmDislike = async () => {
        if (!confirmDislikeData || !user) return;
        
        const targetId = confirmDislikeData.id;
        const currentDislikes = confirmDislikeData.dislikes || 0;
        const newDislikes = currentDislikes + 1;
        
        const updates = {
          dislikes: newDislikes,
          dislikedBy: [...(confirmDislikeData.dislikedBy || []), user.uid]
        };

        if (newDislikes >= 10) {
          updates.isVerified = false;
          updates.isBlacklisted = true;
        }

        try {
          await setDoc(doc(db, getPath('vtubers'), targetId), updates, { merge: true });
          
          setConfirmDislikeData(null);
          showToast("✅ 已成功送出倒讚紀錄。");
          
          if (updates.isBlacklisted) {
             showToast("⚠️ 該創作者累積倒讚達 10 個，已自動從平台下架。");
             if (selectedVTuber && selectedVTuber.id === targetId) {
                 navigate('grid');
             }
          } else {
             if (selectedVTuber && selectedVTuber.id === targetId) {
                setSelectedVTuber(prev => ({ ...prev, dislikes: newDislikes, dislikedBy: updates.dislikedBy }));
             }
          }
        } catch (err) {
          console.error(err);
          showToast("操作失敗，請稍後重試。");
        }
      };

      const handleAdminResetAllCollabTypes = async () => {
        if (!isAdmin) return;
        if (!confirm("⚠️ 極度危險操作：這將會清除「所有」VTuber 名片上的『主要願意連動類型』，強制他們重新勾選。確定要執行嗎？")) return;
        try {
          const confirmText = prompt("請輸入 'CONFIRM' (全大寫) 來確認清除所有連動類型資料：");
          if (confirmText !== 'CONFIRM') {
            showToast("已取消操作。");
            return;
          }
          showToast("開始清除中，請稍候...");
          
          for (const v of realVtubers) {
            if (v.id.startsWith('mock')) continue;
            await setDoc(doc(db, getPath('vtubers'), v.id), { collabTypes: [] }, { merge: true });
          }
          showToast("✅ 已成功清除所有 VTuber 的連動類型！");
        } catch (err) {
          console.error(err);
          showToast("清除失敗，請檢查權限。");
        }
      };

      const handleVerifyVtuber = async (id) => {
        if (!isAdmin) return;
        try { 
          await setDoc(doc(db, getPath('vtubers'), id), { isVerified: true, isBlacklisted: false }, { merge: true }); 
          showToast("已通過審核！此名片現在已公開。"); 
        } catch (err) { showToast("審核失敗"); }
      };
      
      const handleAdminUpdateVtuber = async (id, updatedData) => {
        if (!isAdmin) return;
        try {
          const tagsArray = typeof updatedData.tags === 'string' ? updatedData.tags.split(',').map(t => t.trim()).filter(t => t) : updatedData.tags;
          let finalCollabs = [...(updatedData.collabTypes || [])];
          if (updatedData.isOtherCollab && updatedData.otherCollabText?.trim()) {
            finalCollabs.push(updatedData.otherCollabText.trim());
          }
          
          await setDoc(doc(db, getPath('vtubers'), id), {
            ...updatedData,
            tags: tagsArray,
            collabTypes: finalCollabs,
            updatedAt: Date.now()
          }, { merge: true });
          
          showToast("已強制更新名片內容！");
        } catch (err) {
          console.error(err);
          showToast("更新失敗");
        }
      };

      const handleDeleteVtuber = async (id) => {
        if (!isAdmin) return;
        if (!confirm("確定要刪除這張名片嗎？(此動作無法復原)")) return;
        try { await deleteDoc(doc(db, getPath('vtubers'), id)); showToast("已刪除名片"); } catch (err) { showToast("刪除失敗"); }
      };
      const handleDeleteBulletin = async (id) => {
        if (!isAdmin) return;
        if (!confirm("確定要刪除這則招募文嗎？")) return;
        try { await deleteDoc(doc(db, getPath('bulletins'), id)); showToast("已刪除招募文"); } catch (err) { showToast("刪除失敗"); }
      };

      const handleAddCollab = async (collabData) => {
        const hasProfile = realVtubers.find(v => v.id === user?.uid);
        const isVerified = hasProfile ? hasProfile.isVerified : false;
        
        if (!isAdmin && !isVerified) return showToast("需通過官方認證才能發布連動行程！");
        if (!collabData.title) return showToast("請至少填寫連動標題！");
        
        try { 
          await addDoc(collection(db, getPath('collabs')), { 
            ...collabData, 
            userId: user?.uid || 'admin',
            createdAt: Date.now() 
          }); 
          showToast("已發布連動行程"); 
        } catch (err) { showToast("新增失敗"); }
      };

      const handleDeleteCollab = async (id) => {
        const targetCollab = realCollabs.find(c => c.id === id);
        if (!targetCollab) return;
        if (!isAdmin && targetCollab.userId !== user?.uid) return showToast("您無權限刪除此行程！");
        if (!confirm("確定要刪除這個連動行程嗎？")) return;
        try { await deleteDoc(doc(db, getPath('collabs'), id)); showToast("已刪除連動行程"); } catch (err) { showToast("刪除失敗"); }
      };
      
      const handleSaveSettings = async (tipsContent, rulesContent) => {
        if (!isAdmin) return;
        try { 
          if(tipsContent !== undefined) await setDoc(doc(db, getPath('settings'), 'tips'), { content: tipsContent }, { merge: true }); 
          if(rulesContent !== undefined) await setDoc(doc(db, getPath('settings'), 'rules'), { content: rulesContent }, { merge: true });
          showToast("已更新系統設定與規範內容！"); 
        } catch (err) { showToast("更新失敗"); }
      };

      const handleCopyTemplate = (textToCopy) => {
        const text = textToCopy || realTips;
        const textArea = document.createElement("textarea");
        textArea.value = text; document.body.appendChild(textArea); textArea.select(); document.execCommand("copy"); document.body.removeChild(textArea);
        setCopiedTemplate(true); setTimeout(() => setCopiedTemplate(false), 2000);
        showToast("已複製到剪貼簿！");
      };

      const navigate = (view) => {
        if (view === 'dashboard' && !user) {
          handleLogin();
          return;
        }
        window.location.hash = view;
        setIsMobileMenuOpen(false);
        window.scrollTo(0,0);
      };

      return (
        <div className="flex flex-col min-h-screen relative">
          {/* Toast 提示元件 */}
          {toastMsg && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-gray-800 border border-purple-500 text-white px-6 py-3 rounded-full shadow-[0_0_20px_rgba(168,85,247,0.3)] animate-slide-down flex items-center gap-3 font-bold text-sm">
              <i className="fa-solid fa-circle-info text-purple-400"></i> {toastMsg}
            </div>
          )}

          {/* 導覽列 (全新雙層排版) */}
          <nav className="sticky top-0 z-40 backdrop-blur-md bg-[#0f111a]/95 border-b border-gray-800 shadow-xl">
            <div className="max-w-7xl mx-auto px-4 sm:px-6">
              
              <div className="h-16 flex items-center justify-between">
                <div className="flex items-center gap-2 cursor-pointer group" onClick={() => navigate('home')}>
                  <div className="bg-gradient-to-br from-purple-500 to-pink-500 p-2 rounded-lg group-hover:shadow-[0_0_15px_rgba(168,85,247,0.5)] transition-all">
                    <i className="fa-solid fa-wand-magic-sparkles text-white"></i>
                  </div>
                  <span className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-400">V-Nexus BETA版</span>
                </div>

                <div className="flex items-center gap-3">
                  {!user ? (
                    <button onClick={handleLogin} className="flex items-center gap-2 bg-white text-gray-900 hover:bg-gray-200 px-4 py-1.5 rounded-full transition-colors font-bold shadow-md whitespace-nowrap text-sm">
                      <i className="fa-brands fa-google text-red-500"></i> Google 登入
                    </button>
                  ) : (
                    <div className="flex items-center gap-3">
                      <button onClick={() => navigate('dashboard')} className="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-600 px-3 py-1.5 rounded-full transition-colors relative whitespace-nowrap">
                        <img src={user.photoURL || "https://api.dicebear.com/7.x/avataaars/svg?seed=Anon"} className="w-5 h-5 rounded-full" />
                        <span className="text-gray-300 text-xs font-bold truncate max-w-[80px] hidden sm:block">{user.displayName || '創作者'}</span>
                        {realVtubers.find(v => v.id === user.uid && !v.isVerified) && <span className="absolute -top-1 -right-1 flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>}
                      </button>
                      <button onClick={handleLogout} className="text-gray-500 hover:text-red-400 text-xs font-bold transition-colors whitespace-nowrap" title="登出"><i className="fa-solid fa-right-from-bracket"></i></button>
                    </div>
                  )}
                  {isAdmin && (
                    <button onClick={() => navigate('admin')} className="hidden sm:flex items-center gap-1.5 bg-red-500/10 text-red-400 border border-red-500/30 hover:bg-red-500/20 px-3 py-1.5 rounded-full transition-colors text-xs font-bold relative whitespace-nowrap">
                      <i className="fa-solid fa-shield-halved"></i> 管理員
                      {realVtubers.filter(v => !v.isVerified).length > 0 && <span className="absolute -top-1 -right-1 flex h-3 w-3"><span className="relative inline-flex rounded-full h-3 w-3 bg-red-500 text-[8px] text-white justify-center items-center">{realVtubers.filter(v => !v.isVerified).length}</span></span>}
                    </button>
                  )}
                  <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="lg:hidden text-gray-300 hover:text-white p-2 text-2xl ml-1"><i className={`fa-solid ${isMobileMenuOpen ? 'fa-xmark' : 'fa-bars'}`}></i></button>
                </div>
              </div>

              <div className="hidden lg:flex items-center justify-center gap-4 pb-4 overflow-x-auto whitespace-nowrap scrollbar-hide">
                <button onClick={() => navigate('home')} className={`transition-colors px-3 py-1.5 font-bold text-sm whitespace-nowrap ${currentView === 'home' ? 'text-purple-400 border-b-2 border-purple-500' : 'text-gray-400 hover:text-white'}`}>首頁介紹</button>
                <button onClick={() => navigate('grid')} className={`transition-colors px-3 py-1.5 font-bold text-sm whitespace-nowrap ${currentView === 'grid' || currentView === 'profile' ? 'text-purple-400 border-b-2 border-purple-500' : 'text-gray-400 hover:text-white'}`}>尋找 VTuber 夥伴</button>
                {isVerifiedUser && <button onClick={() => navigate('match')} className={`transition-colors px-3 py-1.5 font-bold text-sm whitespace-nowrap ${currentView === 'match' ? 'text-purple-400 border-b-2 border-purple-500' : 'text-gray-400 hover:text-white'}`}><i className="fa-solid fa-dice mr-1"></i> 聯動隨機配對</button>}
                {isVerifiedUser && <button onClick={() => navigate('bulletin')} className={`flex items-center gap-1.5 px-4 py-1.5 rounded-full font-bold transition-colors text-sm whitespace-nowrap ${currentView === 'bulletin' ? 'bg-purple-500 text-white shadow-lg shadow-purple-500/20' : 'bg-gray-800 text-gray-300 hover:text-white hover:bg-gray-700'}`}><i className="fa-solid fa-bullhorn"></i> 招募佈告欄</button>}
                <button onClick={() => navigate('collabs')} className={`flex items-center gap-1.5 px-4 py-1.5 rounded-full font-bold transition-colors text-sm whitespace-nowrap ${currentView === 'collabs' ? 'bg-red-500 text-white shadow-lg shadow-red-500/20' : 'bg-gray-800 text-gray-300 hover:text-white hover:bg-gray-700'}`}><i className="fa-solid fa-broadcast-tower"></i> 確定連動</button>
                <button onClick={() => navigate('tips')} className={`transition-colors px-3 py-1.5 font-bold text-sm whitespace-nowrap ${currentView === 'tips' ? 'text-yellow-400 border-b-2 border-yellow-500' : 'text-gray-400 hover:text-white'}`}><i className="fa-solid fa-lightbulb"></i> 邀約小技巧</button>
                <button onClick={() => navigate('blacklist')} className={`transition-colors px-3 py-1.5 font-bold text-sm whitespace-nowrap ${currentView === 'blacklist' ? 'text-red-500 border-b-2 border-red-600' : 'text-red-400/70 hover:text-red-400'}`}><i className="fa-solid fa-ban mr-1"></i> 黑單避雷區</button>
              </div>

            </div>

            {isMobileMenuOpen && (
              <div className="lg:hidden absolute top-16 left-0 w-full bg-[#0f111a]/95 backdrop-blur-md border-b border-gray-800 shadow-xl flex flex-col p-4 gap-4 z-50 animate-fade-in-up">
                <button onClick={() => navigate('home')} className={`text-left px-4 py-3 rounded-xl font-bold ${currentView === 'home' ? 'bg-purple-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}>首頁介紹</button>
                <button onClick={() => navigate('grid')} className={`text-left px-4 py-3 rounded-xl font-bold ${currentView === 'grid' || currentView === 'profile' ? 'bg-purple-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}>尋找 VTuber 夥伴</button>
                {isVerifiedUser && <button onClick={() => navigate('match')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'match' ? 'bg-purple-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}><i className="fa-solid fa-dice w-5"></i> 聯動隨機配對</button>}
                {isVerifiedUser && <button onClick={() => navigate('bulletin')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'bulletin' ? 'bg-purple-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}><i className="fa-solid fa-bullhorn w-5"></i> 招募佈告欄</button>}
                <button onClick={() => navigate('collabs')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'collabs' ? 'bg-red-500 text-white' : 'text-gray-300 hover:bg-gray-800'}`}><i className="fa-solid fa-broadcast-tower w-5"></i> 確定連動</button>
                <button onClick={() => navigate('tips')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'tips' ? 'bg-yellow-500 text-white' : 'text-gray-300 hover:bg-gray-800'}`}><i className="fa-solid fa-lightbulb w-5"></i> 邀約小技巧</button>
                <button onClick={() => navigate('blacklist')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'blacklist' ? 'bg-red-900/50 text-red-400 border border-red-500/50' : 'text-red-400/70 hover:bg-red-900/30 hover:text-red-400'}`}><i className="fa-solid fa-ban w-5"></i> 黑單避雷區</button>
                {isAdmin && <button onClick={() => navigate('admin')} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 ${currentView === 'admin' ? 'bg-red-600 text-white' : 'text-red-400 hover:bg-red-500/10'}`}><i className="fa-solid fa-shield-halved w-5"></i> 系統管理員</button>}
                {user && <button onClick={handleLogout} className="text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 text-red-400 hover:bg-red-500/10"><i className="fa-solid fa-right-from-bracket w-5"></i> 登出帳號</button>}
              </div>
            )}
          </nav>

          {/* 主要內容區 */}
          <main className="flex-1 pb-10">
            {currentView === 'home' && <HomePage navigate={navigate} onOpenRules={() => setIsRulesModalOpen(true)} siteStats={siteStats} realCollabs={realCollabs} displayCollabs={displayCollabs} currentTime={currentTime} />}

            {currentView === 'dashboard' && (
              <div className="max-w-3xl mx-auto px-4 py-10 animate-fade-in-up">
                <div className="text-center mb-8">
                  <h2 className="text-3xl font-extrabold text-white flex items-center justify-center gap-3"><i className="fa-solid fa-user-circle text-purple-400"></i> 創作者中心：編輯名片</h2>
                  {user && realVtubers.find(v => v.id === user.uid) ? (
                    realVtubers.find(v => v.id === user.uid).isVerified ? (
                      <p className="text-green-400 mt-3 text-sm font-bold bg-green-500/10 inline-block px-4 py-1 rounded-full"><i className="fa-solid fa-circle-check mr-1"></i> 名片已認證上線</p>
                    ) : (
                      <p className="text-yellow-400 mt-3 text-sm font-bold bg-yellow-500/10 inline-block px-4 py-1 rounded-full"><i className="fa-solid fa-user-clock mr-1"></i> 名片審核中，通過後將自動公開</p>
                    )
                  ) : (
                    <p className="text-gray-400 mt-2">填寫完成後請等待管理員審核，確保社群品質！</p>
                  )}
                </div>
                <form onSubmit={handleSaveProfile} className="bg-gray-800/40 border border-gray-700 rounded-3xl p-6 sm:p-10 shadow-2xl space-y-6">
                  
                  <div className="bg-purple-900/20 border border-purple-500/30 rounded-xl p-5 mb-6">
                    <h3 className="text-purple-400 font-bold mb-3 flex items-center gap-2"><i className="fa-solid fa-power-off"></i> 名片顯示狀態</h3>
                    <select value={profileForm.activityStatus} onChange={e=>setProfileForm({...profileForm, activityStatus: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none font-bold">
                      <option value="active">🟢 活躍連動中 (正常公開顯示)</option>
                      <option value="sleep">🟡 暫休眠 / 準備期 (隱藏名片)</option>
                      <option value="graduated">⚫ 已畢業 / 停止活動 (隱藏名片)</option>
                    </select>
                    <p className="text-xs text-gray-400 mt-3 leading-relaxed">💡 <b>自動隱藏機制</b>：為了維持尋找連動的效率，如果您超過 <b>30天</b> 沒有登入 V-Nexus，系統會自動將名片隱藏。只要您再次登入，名片就會自動恢復曝光！</p>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">VTuber 名稱 <span className="text-red-400">*</span></label><input required type="text" value={profileForm.name} onChange={e=>setProfileForm({...profileForm, name: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: 星詠 みお" /></div>
                    <div className="grid grid-cols-2 gap-2">
                      <div><label className="block text-sm font-bold text-gray-300 mb-2">所屬勢力</label><select value={profileForm.agency} onChange={e=>setProfileForm({...profileForm, agency: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none"><option>個人勢</option><option>企業勢</option><option>社團勢</option></select></div>
                      <div><label className="block text-sm font-bold text-gray-300 mb-2">演出型態</label><select value={profileForm.streamingStyle} onChange={e=>setProfileForm({...profileForm, streamingStyle: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none text-sm"><option>一般型態</option><option>男聲女皮 (Babiniku)</option><option>女聲男皮</option><option>無性別/人外</option><option>其他</option></select></div>
                    </div>
                  </div>
                  <div><label className="block text-sm font-bold text-gray-300 mb-2">介紹一下你自己吧！ <span className="text-red-400">*</span></label><textarea required rows="3" value={profileForm.description} onChange={e=>setProfileForm({...profileForm, description: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none resize-none" placeholder="讓大家快速認識你的直播風格！" /></div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">內容標籤 (逗號分隔)</label><input type="text" value={profileForm.tags} onChange={e=>setProfileForm({...profileForm, tags: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: 歌回, APEX" /></div>
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">主要願意連動類型 (至多選三項) <span className="text-red-400">*</span></label><CollabTypeCheckboxes formState={profileForm} setFormState={setProfileForm} showToast={showToast} /></div>
                  </div>
                  
                  <div><label className="block text-sm font-bold text-gray-300 mb-2">可連動時段 <span className="text-red-400">*</span></label><ScheduleEditor isAnytime={profileForm.isScheduleAnytime} setIsAnytime={(val) => setProfileForm({...profileForm, isScheduleAnytime: val})} isExcept={profileForm.isScheduleExcept} setIsExcept={(val) => setProfileForm({...profileForm, isScheduleExcept: val})} isCustom={profileForm.isScheduleCustom} setIsCustom={(val) => setProfileForm({...profileForm, isScheduleCustom: val})} customText={profileForm.customScheduleText} setCustomText={(val) => setProfileForm({...profileForm, customScheduleText: val})} slots={profileForm.scheduleSlots} setSlots={(val) => setProfileForm({...profileForm, scheduleSlots: val})} /></div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">YouTube 訂閱數 <span className="text-red-400">*</span></label><input required type="text" value={profileForm.youtubeSubscribers} onChange={e=>setProfileForm({...profileForm, youtubeSubscribers: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: 1.5K, 未公開" /></div>
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">Twitch 追隨數 <span className="text-red-400">*</span></label><input required type="text" value={profileForm.twitchFollowers} onChange={e=>setProfileForm({...profileForm, twitchFollowers: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="例: 500, 無" /></div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <label className="flex items-center justify-between text-sm font-bold text-gray-300 mb-2"><span>YouTube 連結</span><label className="flex items-center gap-1 text-xs cursor-pointer text-purple-300 font-normal"><input type="radio" name="mainPlatform" value="YouTube" checked={profileForm.mainPlatform === 'YouTube'} onChange={(e) => setProfileForm({...profileForm, mainPlatform: e.target.value})} className="accent-purple-500" />主要直播平台</label></label>
                      <input type="url" value={profileForm.youtubeUrl} onChange={e=>setProfileForm({...profileForm, youtubeUrl: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://youtube.com/..." />
                    </div>
                    <div>
                      <label className="flex items-center justify-between text-sm font-bold text-gray-300 mb-2"><span>Twitch 連結</span><label className="flex items-center gap-1 text-xs cursor-pointer text-purple-300 font-normal"><input type="radio" name="mainPlatform" value="Twitch" checked={profileForm.mainPlatform === 'Twitch'} onChange={(e) => setProfileForm({...profileForm, mainPlatform: e.target.value})} className="accent-purple-500" />主要直播平台</label></label>
                      <input type="url" value={profileForm.twitchUrl} onChange={e=>setProfileForm({...profileForm, twitchUrl: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://twitch.tv/..." />
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">X連結</label><input type="url" value={profileForm.xUrl} onChange={e=>setProfileForm({...profileForm, xUrl: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://x.com/..." /></div>
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">你的Instagram</label><input type="url" value={profileForm.igUrl} onChange={e=>setProfileForm({...profileForm, igUrl: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://instagram.com/..." /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label className="block text-sm font-bold text-gray-300 mb-2">聯絡 Email (探索名片不顯示) <span className="text-red-400">*</span></label><input required type="email" value={profileForm.contactEmail} onChange={e=>setProfileForm({...profileForm, contactEmail: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="example@gmail.com" /></div>

                    <label className="block text-sm font-bold text-gray-300 mb-2">請在此告訴管理員您的驗證方式：</label><input type="text" value={profileForm.verificationNote} onChange={e=>setProfileForm({...profileForm, verificationNote: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="例：我已經在 X 簡介加上字樣了！ / 我已經發送推特私訊！" />

                      <p className="text-[10px] text-yellow-400/80 mt-1.5"><i className="fa-solid fa-circle-info mr-1"></i>小教學：您可以到您的 X 首頁 &gt; 橫幅 &gt; 滑鼠右鍵 &gt; 複製圖片連結，將圖片連結輸入至此即可。</p>

                  <button onClick={() => setIsMobileFilterOpen(!isMobileFilterOpen)} className="bg-gray-800 border border-gray-700 text-gray-300 hover:text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors">

                              {(selectedVTuber.twitchFollowers || selectedVTuber.twitchUrl) && (

                              )}
                              
                              {/* 推薦按鈕，僅限已認證且非本人的使用者點擊 */}
                              {isVerifiedUser && selectedVTuber.id !== user?.uid ? (

                                  <i className="fa-solid fa-thumbs-up group-hover:-translate-y-0.5 transition-transform"></i> {selectedVTuber.likes || 0} 推薦
                                </button>
                              ) : (

                                  <i className="fa-solid fa-thumbs-up"></i> {selectedVTuber.likes || 0} 推薦

                              {/* 倒讚檢舉按鈕，僅限已認證且非本人的使用者點擊 */}

                                <button onClick={() => handleInitiateDislike(selectedVTuber)} className="bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500/20 px-3 py-1 rounded-lg flex items-center gap-1.5 transition-colors cursor-pointer group" title="檢舉負面行為">
                                  <i className="fa-solid fa-thumbs-down group-hover:-translate-y-0.5 transition-transform"></i> {selectedVTuber.dislikes || 0}

                              {(selectedVTuber.youtubeUrl || selectedVTuber.channelUrl) && (selectedVTuber.youtubeUrl || selectedVTuber.channelUrl) !== '#' && (

                        <div className="bg-gray-900/50 p-5 rounded-2xl border border-gray-700"><h4 className="font-bold text-gray-200 mb-2"><i className="fa-solid fa-clock text-pink-400 mr-2"></i>可連動時段</h4><p className="text-sm text-gray-400">{formatSchedule(selectedVTuber)}</p></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

            {currentView === 'match' && (
