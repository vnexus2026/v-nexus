<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V-Nexus | 專為 VTuber 打造的聯動平台</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #0f111a; color: #f3f4f6; font-family: sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f111a; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    
    @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    .animate-slide-down { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes radarSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-radar { animation: radarSpin 2s linear infinite; }
  </style>
</head>
<body class="selection:bg-purple-500 selection:text-white m-0 p-0 overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useMemo, useRef } = React;

    // --- Firebase 連線設定 ---
    const firebaseConfig = {
      apiKey: "AIzaSyD_JJZUcT56VkHFH0ykBRJQ_nFLK_4p7kY",
      authDomain: "v-nexus.firebaseapp.com",
      projectId: "v-nexus",
      storageBucket: "v-nexus.firebasestorage.app",
      messagingSenderId: "824125737901",
      appId: "1:824125737901:web:93a4f21b56ab00dfaaaf24"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const APP_ID = 'v-nexus-official';
    const getPath = (collectionName) => `artifacts/${APP_ID}/public/data/${collectionName}`;

    // --- 全域常數與工具函數 ---
    const PREDEFINED_COLLABS = ['APEX', '瓦羅蘭', 'LOL', 'FPS', 'Minecraft', '合作遊戲', '企劃', '歌回', '雜談'];
    const MOCK_VTUBERS = []; const MOCK_COLLABS = []; const MOCK_BULLETINS = [];

    const formatTime = (ts) => {
      if (!ts) return "剛剛";
      const d = new Date(ts);
      const year = d.getFullYear(); const month = String(d.getMonth()+1).padStart(2,'0'); const date = String(d.getDate()).padStart(2,'0');
      const hours = String(d.getHours()).padStart(2,'0'); const mins = String(d.getMinutes()).padStart(2,'0');
      return `${year}/${month}/${date} ${hours}:${mins}`;
    };

    const formatDateTimeLocalStr = (dtStr) => {
      if (!dtStr) return '未指定';
      const d = new Date(dtStr);
      if (isNaN(d.getTime())) return dtStr;
      const month = String(d.getMonth()+1).padStart(2,'0'); const date = String(d.getDate()).padStart(2,'0');
      const hours = String(d.getHours()).padStart(2,'0'); const mins = String(d.getMinutes()).padStart(2,'0');
      return `${month}/${date} ${hours}:${mins}`;
    };

    const formatSchedule = (v) => {
      if (v.isScheduleAnytime) return "我都可以 (隨時可約)";
      if (v.isScheduleCustom && v.customScheduleText) return v.customScheduleText;
      if (v.isScheduleExcept && v.scheduleSlots && v.scheduleSlots.length > 0) return "除了：" + v.scheduleSlots.map(s => `${s.day} ${s.start}~${s.end}`).join('、') + "，其餘皆可";
      if (v.scheduleSlots && v.scheduleSlots.length > 0) return v.scheduleSlots.map(s => `${s.day} ${s.start}~${s.end}`).join('、');
      return v.schedule || '未提供時段';
    };

    const getYouTubeThumbnail = (url) => {
      if (!url || typeof url !== 'string') return null;
      const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
      return (match && match[2].length === 11) ? `https://img.youtube.com/vi/${match[2]}/maxresdefault.jpg` : null;
    };

    const parseSubscribers = (v) => {
      const parseStr = (str) => {
        if (!str) return 0;
        let s = String(str); let num = parseFloat(s.replace(/[^0-9.]/g, ''));
        if (isNaN(num)) return 0;
        if (s.toUpperCase().includes('K')) num *= 1000;
        if (s.toUpperCase().includes('M')) num *= 1000000;
        if (s.toUpperCase().includes('萬')) num *= 10000;
        return num;
      };
      return parseStr(v.youtubeSubscribers || v.subscribers) + parseStr(v.twitchFollowers);
    };

    const isVtuberVisible = (v, currentUser) => {
      if (!v) return false;
      if (currentUser && v.id === currentUser.uid) return true;
      if (String(v.id || '').startsWith('mock')) return true;
      if (!v.isVerified || v.isBlacklisted) return false;
      if (v.activityStatus === 'sleep' || v.activityStatus === 'graduated') return false;
      if (Date.now() - (v.lastActiveAt || v.updatedAt || v.createdAt || Date.now()) > 30 * 24 * 60 * 60 * 1000) return false; 
      return true;
    };

    // --- 共用 UI 元件 ---
    const TagBadge = ({ text, onClick, selected }) => (
      <span onClick={onClick} className={`px-3 py-1 rounded-full text-xs font-medium cursor-pointer transition-colors border ${selected ? 'bg-purple-600 text-white border-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.4)]' : 'bg-gray-800 text-gray-300 border-gray-700 hover:bg-gray-700 hover:text-white'}`}>{text}</span>
    );

    const CollabCard = ({ c, isLive, isAdmin, user, onDeleteCollab }) => {
      if (!c) return null;
      const displayImg = c.coverUrl || getYouTubeThumbnail(c.streamUrl) || 'https://images.unsplash.com/photo-1598550476439-6847785fcea6?auto=format&fit=crop&q=80&w=800';
      return (
        <div className={`group ${isLive ? 'bg-red-950/40 border-2 border-red-500 shadow-[0_0_30px_rgba(220,38,38,0.4)] transform scale-[1.02] z-10' : 'bg-gray-800/60 border border-gray-700 hover:border-red-500/50 hover:shadow-red-500/20'} rounded-3xl overflow-hidden flex flex-col transition-all relative w-full`}>
          {isLive && <div className="absolute top-0 left-0 w-full bg-red-600 text-white text-center py-1.5 font-bold text-xs tracking-widest z-30 animate-pulse"><i className="fa-solid fa-satellite-dish mr-2"></i> 正在進行連動中</div>}
          {onDeleteCollab && (isAdmin || (user && c.userId === user.uid)) && <button onClick={() => onDeleteCollab(c.id)} className={`absolute ${isLive ? 'top-10' : 'top-4'} right-4 z-20 bg-black/60 backdrop-blur-md text-gray-300 hover:text-red-400 hover:bg-black/80 p-2 rounded-lg transition-colors`} title="刪除此行程"><i className="fa-solid fa-trash"></i></button>}
          <div className={`h-48 relative overflow-hidden flex-shrink-0 ${isLive ? 'mt-8' : ''}`}>
            <img src={displayImg} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="連動封面" />
            <div className="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/20 to-transparent"></div>
            <div className="absolute top-4 left-4 bg-black/80 backdrop-blur-md border border-gray-600 text-white px-3 py-1.5 rounded-xl flex flex-col items-center shadow-lg transform -rotate-2">
              <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">{c.date}</span><span className="text-sm text-red-400 font-extrabold">{c.time}</span>
            </div>
            {c.streamUrl && <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10 pointer-events-none"><div className={`w-16 h-16 ${isLive ? 'bg-red-500' : 'bg-red-600/90'} text-white rounded-full flex items-center justify-center pl-1 shadow-[0_0_30px_rgba(220,38,38,0.8)] backdrop-blur-sm`}><i className="fa-solid fa-play text-2xl"></i></div></div>}
          </div>
          <div className="p-6 flex-1 flex flex-col relative z-10 bg-gray-900/80">
            <h3 className={`text-xl font-extrabold text-white mb-6 line-clamp-2 leading-tight transition-colors ${isLive ? 'text-red-400' : 'group-hover:text-red-400'}`}>{c.title}</h3>
            <div className="mt-auto">
              {c.streamUrl ? <a href={c.streamUrl} target="_blank" rel="noopener noreferrer" className={`w-full ${isLive ? 'bg-red-500 shadow-[0_0_20px_rgba(220,38,38,0.6)] animate-pulse' : 'bg-red-600 hover:bg-red-500 group-hover:shadow-[0_0_20px_rgba(220,38,38,0.4)]'} text-white py-3.5 rounded-xl font-bold transition-all flex justify-center items-center gap-2`}><i className="fa-solid fa-play-circle text-lg"></i> 前往待機室 / 觀看直播</a> : <div className="w-full bg-gray-800 text-gray-500 py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 border border-gray-700"><i className="fa-solid fa-clock"></i> 直播連結尚未提供</div>}
            </div>
          </div>
        </div>
      );
    };

    // 瘦身精華：VTuber 名片獨立元件
    const VTuberCard = ({ v, user, isVerifiedUser, onSelect, onDislike }) => (
      <div onClick={onSelect} className={`group bg-gray-800/40 border ${!v.isVerified ? 'border-yellow-500/50' : 'border-gray-700/50'} rounded-2xl overflow-hidden cursor-pointer hover:border-purple-500/50 transition-all hover:-translate-y-1 flex flex-col relative`}>
        <div className="absolute top-2 left-2 z-10 flex gap-1">
          {!v.isVerified && <div className="bg-yellow-500 text-black text-[10px] font-bold px-2 py-0.5 rounded shadow-lg">狀態異常/待審核</div>}
          {v.activityStatus === 'sleep' && <div className="bg-gray-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-lg">休眠中</div>}
          <div className={`text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-lg flex items-center gap-1 ${v.mainPlatform === 'Twitch' ? 'bg-purple-600' : 'bg-red-600'}`}>
            <i className={`fa-brands fa-${v.mainPlatform === 'Twitch' ? 'twitch' : 'youtube'}`}></i> {v.mainPlatform || 'YouTube'}
          </div>
        </div>
        <div className="h-24 relative overflow-hidden flex-shrink-0">
          <img src={v.banner} className="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform" />
          <span className="absolute top-2 right-2 px-2 py-0.5 text-[10px] font-bold bg-black/50 border border-gray-600 rounded text-white">{v.agency}</span>
        </div>
        <div className="p-4 relative flex-1 flex flex-col">
          <img src={v.avatar} className="absolute -top-8 w-16 h-16 rounded-xl border-2 border-gray-800 bg-gray-900 object-cover" />
          <div className="ml-20 mb-3">
            <h3 className="font-bold text-white truncate flex items-center gap-1">{v.name} {v.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-xs" title="已認證"></i>}</h3>
            <div className="flex flex-wrap gap-2 text-xs mt-1 text-gray-400">
              {(v.youtubeSubscribers || v.subscribers || v.youtubeUrl || v.channelUrl) && <span className="flex items-center gap-1"><i className="fa-brands fa-youtube text-red-400"></i> {v.youtubeSubscribers || v.subscribers || '未公開'}</span>}
              {(v.twitchFollowers || v.twitchUrl) && <span className="flex items-center gap-1"><i className="fa-brands fa-twitch text-purple-400"></i> {v.twitchFollowers || '未公開'}</span>}
              <span className="flex items-center gap-1 text-green-400"><i className="fa-solid fa-thumbs-up"></i> {v.likes || 0}</span>
            </div>
          </div>
          <p className="text-xs text-gray-400 line-clamp-2 h-8">{v.description}</p>
          {v.streamStyleUrl && (
            <div className="mt-1 mb-1">
              <a href={v.streamStyleUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="inline-flex items-center gap-1 text-[10px] bg-blue-500/20 text-blue-400 hover:bg-blue-500/30 px-2 py-1 rounded transition-colors border border-blue-500/30 w-fit font-bold"><i className="fa-solid fa-video"></i> 我的直播風格代表作</a>
            </div>
          )}
          <div className="mt-auto pt-2 border-t border-gray-700/50 text-xs text-gray-400 flex items-center justify-between">
            <div className="flex items-center gap-1.5 flex-1 min-w-0 pr-2"><i className="fa-solid fa-clock text-purple-400"></i> <span className="truncate">{formatSchedule(v)}</span></div>
            {isVerifiedUser && v.id !== user?.uid && <button onClick={(e) => { e.stopPropagation(); onDislike(v); }} className="bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500 hover:text-white px-2 py-1 rounded transition-colors flex items-center gap-1 flex-shrink-0" title="檢舉負面行為"><i className="fa-solid fa-thumbs-down text-[10px]"></i></button>}
          </div>
          <div className="mt-2 pt-2 border-t border-gray-700/50 flex gap-2">
            {(v.youtubeUrl || v.channelUrl) && (v.youtubeUrl || v.channelUrl) !== '#' && <a href={v.youtubeUrl || v.channelUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white px-2.5 py-1.5 rounded-lg transition-colors flex items-center justify-center flex-shrink-0" title="YouTube"><i className="fa-brands fa-youtube text-sm"></i></a>}
            {v.twitchUrl && v.twitchUrl !== '#' && <a href={v.twitchUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-purple-500/20 text-purple-400 hover:bg-purple-500 hover:text-white px-2.5 py-1.5 rounded-lg transition-colors flex items-center justify-center flex-shrink-0" title="Twitch"><i className="fa-brands fa-twitch text-sm"></i></a>}
            {v.xUrl && v.xUrl !== '#' && <a href={v.xUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-blue-500/20 text-blue-400 hover:bg-blue-500 hover:text-white px-2.5 py-1.5 rounded-lg transition-colors flex items-center justify-center flex-shrink-0" title="X (Twitter)"><i className="fa-brands fa-x-twitter text-sm"></i></a>}
            {v.igUrl && v.igUrl !== '#' && <a href={v.igUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-pink-500/20 text-pink-400 hover:bg-pink-500 hover:text-white px-2.5 py-1.5 rounded-lg transition-colors flex items-center justify-center flex-shrink-0" title="Instagram"><i className="fa-brands fa-instagram text-sm"></i></a>}
          </div>
        </div>
      </div>
    );

    // 瘦身精華：招募佈告欄卡片獨立元件
    const BulletinCard = ({ b, onNavigateProfile }) => (
      <div className="bg-gray-800/60 border border-gray-700 rounded-3xl overflow-hidden flex flex-col hover:border-purple-500/50 transition-all shadow-lg hover:shadow-purple-500/20 group">
        <div className="bg-gray-900/80 p-5 border-b border-gray-700 flex items-start gap-4">
          <img src={b.vtuber.avatar} className="w-14 h-14 rounded-full border-2 border-purple-500/50 object-cover flex-shrink-0" />
          <div className="flex-1">
            <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-2">
              <div>
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-purple-400 font-bold text-[10px] bg-purple-500/10 px-2 py-0.5 rounded border border-purple-500/20">發起人</span>
                  <a href={b.vtuber.youtubeUrl || b.vtuber.channelUrl || b.vtuber.twitchUrl || '#'} target="_blank" rel="noopener noreferrer" className={`font-extrabold text-white text-lg hover:text-purple-400 transition-colors ${(b.vtuber.youtubeUrl || b.vtuber.channelUrl || b.vtuber.twitchUrl) ? 'underline decoration-purple-500/50 underline-offset-4' : ''}`}>{b.vtuber.name}</a>
                  {b.vtuber.isVerified && <i className="fa-solid fa-circle-check text-blue-400 text-sm" title="已認證"></i>}
                </div>
                <div className="flex items-center gap-2 mt-1.5"><span className="text-[10px] text-gray-400">{b.vtuber.agency}</span><span className="text-gray-600 text-[10px]">•</span><span className="text-[10px] text-gray-400">{b.postedAt} 發布</span></div>
              </div>
              <div className="flex gap-2">
                {(b.vtuber.youtubeUrl || b.vtuber.channelUrl) && <a href={b.vtuber.youtubeUrl || b.vtuber.channelUrl} target="_blank" rel="noopener noreferrer" className="bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500 hover:text-white transition-colors w-9 h-9 rounded-lg flex items-center justify-center"><i className="fa-brands fa-youtube text-lg"></i></a>}
                {b.vtuber.twitchUrl && <a href={b.vtuber.twitchUrl} target="_blank" rel="noopener noreferrer" className="bg-purple-500/10 border border-purple-500/20 text-purple-400 hover:bg-purple-500 hover:text-white transition-colors w-9 h-9 rounded-lg flex items-center justify-center"><i className="fa-brands fa-twitch text-lg"></i></a>}
              </div>
            </div>
          </div>
        </div>
        <div className="p-6 flex-1 flex flex-col">
          <p className="text-gray-200 text-base mb-6 leading-relaxed whitespace-pre-wrap">{b.content}</p>
          <div className="grid grid-cols-2 gap-3 mt-auto mb-6">
            <div className="bg-gray-900/50 p-3 rounded-xl border border-gray-700/50 flex flex-col"><span className="text-[10px] text-gray-500 mb-1 flex items-center gap-1"><i className="fa-solid fa-gamepad"></i> 聯動性質</span><span className="text-sm text-gray-200 font-bold">{b.collabType || '未指定'}</span></div>
            <div className="bg-gray-900/50 p-3 rounded-xl border border-gray-700/50 flex flex-col"><span className="text-[10px] text-gray-500 mb-1 flex items-center gap-1"><i className="fa-solid fa-users"></i> 預估人數</span><span className="text-sm text-gray-200 font-bold">{b.collabSize || '未指定'}</span></div>
            <div className="bg-gray-900/50 p-3 rounded-xl border border-gray-700/50 flex flex-col"><span className="text-[10px] text-gray-500 mb-1 flex items-center gap-1"><i className="fa-regular fa-calendar"></i> 聯動時間</span><span className="text-sm text-gray-200 font-bold">{formatDateTimeLocalStr(b.collabTime)}</span></div>
            <div className="bg-red-500/5 p-3 rounded-xl border border-red-500/20 flex flex-col"><span className="text-[10px] text-red-400/80 mb-1 flex items-center gap-1"><i className="fa-solid fa-hourglass-half"></i> 招募截止</span><span className="text-sm text-red-300 font-bold">{b.recruitEndTime ? formatTime(b.recruitEndTime) : '未指定'}</span></div>
          </div>
          <button onClick={onNavigateProfile} className="w-full bg-gray-800 hover:bg-purple-600 text-white py-3.5 rounded-xl text-sm font-bold transition-all flex justify-center items-center gap-2 group-hover:shadow-[0_0_15px_rgba(168,85,247,0.3)] border border-gray-700 group-hover:border-purple-500"><i className="fa-solid fa-hand-holding-heart"></i> 前往名片查看與應徵</button>
        </div>
      </div>
    );

    // --- 可連動時段編輯器模組 ---
    const ScheduleEditor = ({ isAnytime, setIsAnytime, isExcept, setIsExcept, isCustom, setIsCustom, customText, setCustomText, slots, setSlots }) => {
      const handleModeChange = (e) => {
        const mode = e.target.value;
        if (mode === 'anytime') { setIsAnytime(true); setIsExcept(false); setIsCustom(false); }
        else if (mode === 'except') { setIsAnytime(false); setIsExcept(true); setIsCustom(false); }
        else if (mode === 'custom') { setIsAnytime(false); setIsExcept(false); setIsCustom(true); }
        else { setIsAnytime(false); setIsExcept(false); setIsCustom(false); }
      };
      const mode = isAnytime ? 'anytime' : isExcept ? 'except' : isCustom ? 'custom' : 'specific';
      const updateSlot = (idx, field, val) => { const newSlots = [...slots]; newSlots[idx][field] = val; setSlots(newSlots); };
      return (
        <div className="bg-gray-900 border border-gray-700 rounded-xl p-4 mt-1">
          <div className="mb-3">
            <select value={mode} onChange={handleModeChange} className="w-full bg-gray-800 border border-gray-600 rounded-lg p-2.5 text-white text-sm outline-none focus:border-purple-500">
              <option value="specific">✔️ 指定可連動時段</option><option value="except">❌ 除了以下時段，其他皆可</option>
              <option value="custom">✍️ 自訂時間 (自行手動輸入時間)</option><option value="anytime">🌟 我都可以 (隨時可約)</option>
            </select>
          </div>
          {mode === 'custom' && <div className="space-y-3 border-t border-gray-700 pt-3"><input type="text" value={customText} onChange={e => setCustomText(e.target.value)} placeholder="例如：每個月底的週末晚上、只接臨時約..." className="w-full bg-gray-800 border border-gray-600 rounded-lg p-3 text-white text-sm outline-none focus:border-purple-500" /></div>}
          {(mode === 'specific' || mode === 'except') && (
            <div className="space-y-3 border-t border-gray-700 pt-3">
              {(slots || []).map((slot, index) => (
                <div key={index} className="flex flex-wrap items-center gap-2 bg-gray-800/50 p-2 rounded-lg border border-gray-700">
                  <select value={slot.day} onChange={e => updateSlot(index, 'day', e.target.value)} className="bg-gray-800 border border-gray-600 rounded p-1.5 text-white text-xs outline-none focus:border-purple-500">
                    {['星期一','星期二','星期三','星期四','星期五','星期六','星期日','平日','週末','每日'].map(d=><option key={d} value={d}>{d}</option>)}
                  </select>
                  <input type="time" value={slot.start} onChange={e => updateSlot(index, 'start', e.target.value)} className="bg-gray-800 border border-gray-600 rounded p-1.5 text-white text-xs outline-none focus:border-purple-500 box-border min-w-0" />
                  <span className="text-gray-400 text-xs">至</span>
