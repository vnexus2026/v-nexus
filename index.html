<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V-Nexus | 專為 VTuber 打造的聯動平台</title>
  <link rel="icon" href="https://duk.tw/u1jpPE.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body class="selection:bg-purple-500 selection:text-white m-0 p-0 overflow-x-hidden">
  <div id="loading-screen"
  style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f111a; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; opacity: 1; transition: opacity 0.2s ease-in-out; pointer-events: auto;">
  <div
    style="width:50px; height:50px; border:4px solid #1f2937; border-top:4px solid #a855f7; border-radius:50%; animation: spin 1s linear infinite;">
  </div>
  <p style="color:#a855f7; margin-top:15px; font-weight:bold; font-family:sans-serif; letter-spacing: 1px; text-align: center; padding: 0 20px;">
    為你的vtuber生涯加一點朋友！
  </p>
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</div>

  <div id="root"></div>

  <script src="script.js" type="text/babel" data-type="module"></script>

</body>

</html>
