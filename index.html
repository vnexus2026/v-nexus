                      <div>
                        <label className="text-xs text-gray-400 mb-1 block">連動性質 <span className="text-red-400">*</span></label>
                        <select value={newBulletin.collabType} onChange={e=>setNewBulletin({...newBulletin, collabType: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-purple-500 outline-none text-sm"><option value="">請選擇...</option>{PREDEFINED_COLLABS.map(t => <option key={t} value={t}>{t}</option>)}<option value="其他">其他 (自行輸入)</option></select>
                        {newBulletin.collabType === '其他' && <input type="text" value={newBulletin.collabTypeOther} onChange={e=>setNewBulletin({...newBulletin, collabTypeOther: e.target.value})} placeholder="請輸入連動性質" className="w-full mt-2 bg-gray-800 border border-gray-600 rounded-lg p-2 text-white focus:ring-purple-500 outline-none text-sm" />}
                      </div>
                      <div>
                        <label className="text-xs text-gray-400 mb-1 block">預估聯動人數 <span className="text-red-400">*</span></label>
                        <select value={newBulletin.collabSize} onChange={e=>setNewBulletin({...newBulletin, collabSize: e.target.value})} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-purple-500 outline-none text-sm"><option value="">請選擇...</option>{[...Array(21).keys()].map(n => <option key={n} value={`${n}人`}>{n} 人</option>)}</select>
                      </div>
                      <div className="w-full min-w-0"><label className="text-xs text-gray-400 mb-1 block">聯動時間 <span className="text-red-400">*</span></label><input type="datetime-local" value={newBulletin.collabTime} onChange={e=>setNewBulletin({...newBulletin, collabTime: e.target.value})} className="w-full min-w-0 box-border bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-purple-500 outline-none text-sm" /></div>
                      <div className="w-full min-w-0"><label className="text-xs text-gray-400 mb-1 block">招募截止時間 <span className="text-red-400">*</span></label><input type="datetime-local" value={newBulletin.recruitEndTime} onChange={e=>setNewBulletin({...newBulletin, recruitEndTime: e.target.value})} className="w-full min-w-0 box-border bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:ring-purple-500 outline-none text-sm" /></div>
                    </div>
                    <div className="flex justify-end"><button onClick={handlePostBulletin} className="w-full sm:w-auto bg-purple-600 hover:bg-purple-500 text-white px-8 py-3 rounded-xl font-bold"><i className="fa-solid fa-paper-plane mr-2"></i>送出發布</button></div>
                  </div>

                  {isLoading ? (
                    <div className="text-center text-gray-500 py-10"><i className="fa-solid fa-spinner fa-spin text-2xl"></i></div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {displayBulletins.length === 0 ? <p className="col-span-1 md:col-span-2 text-center text-gray-500 mt-10">目前尚無進行中的招募</p> : displayBulletins.map(b => <BulletinCard key={b.id} b={b} onNavigateProfile={()=>{setSelectedVTuber(b.vtuber); navigate('profile');}} />)}
                    </div>
                  )}
                </div>
              ) : (
                <div className="max-w-4xl mx-auto px-4 py-20 text-center animate-fade-in-up">
                  <i className="fa-solid fa-lock text-6xl text-purple-500/50 mb-6"></i>
                  <h2 className="text-2xl font-bold text-white mb-4">專屬功能尚未解鎖</h2>
                  <p className="text-gray-400 mb-8">「招募佈告欄」僅限已通過官方認證的 VTuber 發布與互動，確保社群的隱私與安全。</p>
                  <button onClick={() => navigate('dashboard')} className="bg-purple-600 hover:bg-purple-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform hover:scale-105">前往建立並認證名片</button>
                </div>
              )
            )}

            {currentView === 'blacklist' && (
              <div className="max-w-7xl mx-auto px-4 py-12 animate-fade-in-up">
                <div className="text-center mb-12">
                  <h2 className="text-3xl md:text-4xl font-extrabold text-red-500 mb-4 flex justify-center items-center gap-3"><i className="fa-solid fa-skull-crossbones"></i> 黑單避雷區</h2>
                  <p className="text-gray-400 max-w-2xl mx-auto leading-relaxed">本平台致力於打造友善的連動環境。累積達 <span className="text-red-400 font-bold mx-1">10 個倒讚/檢舉</span> 或經官方判定有嚴重負面行為的創作者名片，將會被自動下架並列入此區，請大家尋找夥伴時務必注意。</p>
                </div>
                {isLoading ? (
                  <div className="text-center text-gray-500 py-20"><i className="fa-solid fa-spinner fa-spin text-2xl mb-4"></i><p>讀取中...</p></div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    {displayVtubers.filter(v => v.isBlacklisted || v.dislikes >= 10).length === 0 ? (
                      <div className="col-span-full py-20 bg-gray-800/30 rounded-3xl border border-gray-700/50 text-center"><i className="fa-regular fa-face-smile-beam text-5xl text-green-500/50 mb-4"></i><p className="text-gray-400 font-bold">目前社群風氣良好，沒有任何黑單紀錄！</p></div>
                    ) : (
                      displayVtubers.filter(v => v.isBlacklisted || v.dislikes >= 10).map(v => (
                        <div key={v.id} className="bg-red-950/20 border border-red-900/50 rounded-2xl overflow-hidden flex flex-col relative opacity-80 grayscale hover:grayscale-0 transition-all">
                          <div className="absolute inset-0 bg-red-900/10 pointer-events-none z-10"></div>
                          <div className="absolute top-0 left-0 w-full bg-red-600/80 text-white text-center py-1 text-[10px] font-bold tracking-widest z-20">已下架 / 拒絕往來</div>
                          <div className="h-20 relative overflow-hidden flex-shrink-0 mt-6"><img src={v.banner} className="w-full h-full object-cover opacity-40" /></div>
                          <div className="p-4 flex flex-col items-center -mt-10 relative z-20">
                            <img src={v.avatar} className="w-16 h-16 rounded-full border-4 border-gray-900 bg-gray-900 object-cover mb-2" />
                            <h3 className="font-bold text-gray-300 text-center line-through decoration-red-500 decoration-2">{v.name}</h3><span className="text-[10px] text-gray-500 mt-1">{v.agency}</span>
                            <div className="mt-4 bg-black/50 border border-red-500/30 w-full rounded-lg p-3 text-center"><p className="text-[10px] text-red-400/80 mb-1">社群檢舉 / 倒讚數</p><p className="text-xl font-black text-red-500">{v.dislikes || 10}</p></div>
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                )}
              </div>
            )}

            {currentView === 'collabs' && <CollabsPage collabs={displayCollabs} isLoading={isLoading} user={user} isVerified={isVerifiedUser} onAddCollab={handleAddCollab} onDeleteCollab={handleDeleteCollab} isAdmin={isAdmin} showToast={showToast} currentTime={currentTime} />}
            {currentView === 'tips' && <TipsPage handleCopyTemplate={handleCopyTemplate} copiedTemplate={copiedTemplate} customTips={realTips} />}
            
            {currentView === 'admin' && isAdmin && (
              <AdminPage vtubers={displayVtubers} bulletins={displayBulletins} collabs={displayCollabs} rules={realRules} tips={realTips} onDeleteVtuber={handleDeleteVtuber} onVerifyVtuber={handleVerifyVtuber} onUpdateVtuber={handleAdminUpdateVtuber} onDeleteBulletin={handleDeleteBulletin} onAddCollab={handleAddCollab} onDeleteCollab={handleDeleteCollab} onSaveSettings={handleSaveSettings} showToast={showToast} onResetAllCollabTypes={handleAdminResetAllCollabTypes} />
            )}
          </main>

          {/* --- 邀請表單 Modal --- */}
          {isCollabModalOpen && selectedVTuber && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl animate-fade-in-up">
                <div className="px-5 py-4 border-b border-gray-800 flex justify-between items-center"><h3 className="font-bold text-white"><i className="fa-solid fa-paper-plane text-purple-400 mr-2"></i>發送邀請給 {selectedVTuber.name}</h3><button onClick={() => setIsCollabModalOpen(false)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark"></i></button></div>
                <div className="p-5 space-y-4">
                  {!selectedVTuber.contactEmail ? (
                    <p className="text-red-400 text-sm font-bold bg-red-500/10 p-3 rounded-lg border border-red-500/30"><i className="fa-solid fa-circle-exclamation mr-2"></i>這位創作者尚未公開聯絡 Email，請嘗試透過名片上的其他社群平台與他聯絡。</p>
                  ) : (
                    <>
                      <p className="text-xs text-gray-400">* 送出後將自動開啟您的 Email 軟體，並帶入以下內容。</p>
                      <textarea rows="6" value={inviteMessage} onChange={(e) => setInviteMessage(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-sm text-white focus:ring-2 focus:ring-purple-500 outline-none resize-none" placeholder="寫下您的邀請內容..."></textarea>
                      <button onClick={() => { 
                          if(!inviteMessage.trim()) return showToast("請輸入邀請內容！");
                          const subject = encodeURIComponent(`[V-Nexus 連動邀約] 來自 ${profileForm.name || user?.displayName || '創作者'} 的邀請`);
                          const body = encodeURIComponent(inviteMessage);
                          window.location.href = `mailto:${selectedVTuber.contactEmail}?subject=${subject}&body=${body}`;
                          setIsCollabModalOpen(false); setInviteMessage('');
                        }} className="w-full bg-purple-600 hover:bg-purple-500 text-white py-2.5 rounded-xl font-bold shadow-lg transition-transform hover:-translate-y-0.5 flex justify-center items-center gap-2"><i className="fa-solid fa-envelope"></i> 開啟信箱寄出</button>
                    </>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* --- 聯動規範 Modal --- */}
          {isRulesModalOpen && (
            <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl animate-fade-in-up">
                <div className="px-6 py-5 border-b border-gray-800 flex justify-between items-center bg-gray-800/30"><h3 className="font-bold text-white text-lg flex items-center gap-2"><i className="fa-solid fa-triangle-exclamation text-red-500"></i> V-NEXUS 聯動規範</h3><button onClick={() => setIsRulesModalOpen(false)} className="text-gray-400 hover:text-white transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button></div>
                <div className="p-6"><div className="text-sm text-gray-300 leading-relaxed space-y-4" dangerouslySetInnerHTML={{ __html: (realRules || '').replace(/\n/g, '<br/>') }} /><div className="mt-8 flex justify-center"><button onClick={() => setIsRulesModalOpen(false)} className="bg-gray-700 hover:bg-gray-600 text-white px-8 py-2.5 rounded-xl font-bold transition-colors w-full sm:w-auto">我了解了</button></div></div>
              </div>
            </div>
          )}

          {/* --- 倒讚確認 Modal --- */}
          {confirmDislikeData && (
            <div className="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="bg-gray-900 border border-red-500/50 rounded-2xl w-full max-w-sm overflow-hidden shadow-[0_0_30px_rgba(220,38,38,0.3)] animate-fade-in-up">
                <div className="px-6 py-5 border-b border-gray-800 flex justify-between items-center bg-red-950/30"><h3 className="font-bold text-red-400 text-lg flex items-center gap-2"><i className="fa-solid fa-triangle-exclamation"></i> 嚴重警告：確認檢舉</h3></div>
                <div className="p-6">
                  <p className="text-gray-200 text-base leading-relaxed mb-6">您確定要對 <span className="font-bold text-white bg-gray-800 px-2 py-0.5 rounded mx-1">{confirmDislikeData.name}</span> 送出倒讚/檢舉嗎？</p>
                  <div className="bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-6">
                    <p className="text-xs text-red-300 leading-relaxed">👉 請注意：倒讚僅適用於「放鴿子、惡意氣氛、嚴重騷擾或遲到」等破壞社群之負面行為。<br/><br/>👉 每個認證帳號僅能檢舉一次。<br/><br/>👉 若該名片累積達 <span className="font-bold text-red-400 underline decoration-red-500 underline-offset-2 mx-1">10個倒讚</span>，系統將自動下架其名片並列入黑名單，絕不寬貸。</p>
                  </div>
                  <p className="text-center font-bold text-white text-lg mb-6">你確定要檢舉？沒有按錯？</p>
                  <div className="flex gap-3">
                    <button onClick={() => setConfirmDislikeData(null)} className="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-xl font-bold transition-colors">按錯</button>
                    <button onClick={handleConfirmDislike} className="flex-1 bg-red-600 hover:bg-red-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-red-500/20 transition-transform hover:scale-105">對</button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
