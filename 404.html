<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V-Nexus | 專為 VTuber 打造的聯動平台</title>
  <link rel="icon" href="https://duk.tw/u1jpPE.png">
  <base href="/">
  <script>
    // V-Nexus SPA refresh guard: keep direct mobile refreshes on the same app route.
    (() => {
      const rawPath = (window.location.pathname || "/").replace(/^\/+|\/+$/g, "");
      const hasHashRoute = Boolean(window.location.hash && window.location.hash !== "#");
      const ignoredPaths = new Set(["", "index.html", "404.html"]);
      if (!hasHashRoute && rawPath && !ignoredPaths.has(rawPath)) {
        const safeRoute = rawPath.split("?")[0];
        window.history.replaceState(null, document.title, `/${window.location.search || ""}#${safeRoute}`);
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
</head>

<body class="selection:bg-purple-500 selection:text-white m-0 p-0 overflow-x-hidden">
  <div id="loading-screen"
    style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f111a; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; opacity: 1; transition: opacity 0.2s ease-in-out; pointer-events: auto;">
    <div
      style="width:50px; height:50px; border:4px solid #1f2937; border-top:4px solid #a855f7; border-radius:50%; animation: spin 1s linear infinite;">
    </div>
    <p
      style="color:#a855f7; margin-top:15px; font-weight:bold; font-family:sans-serif; letter-spacing: 1px; text-align: center; padding: 0 20px;">
      為你的Vtuber生涯加一點朋友！
    </p>
    <style>
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>


  <div id="vnexus-tailwind-safelist" aria-hidden="true" class="hidden max-w-7xl mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8 w-full lg:w-72 flex-shrink-0 space-y-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 bg-[#181B25] bg-[#1D2130] bg-[#0F111A] border border-[#2A2F3D] rounded-2xl overflow-hidden cursor-pointer transition-colors text-[#F8FAFC] text-[#CBD5E1] text-[#94A3B8] text-[#64748B] text-[#8B5CF6] text-[#38BDF8] text-[#F59E0B] text-[#EF4444] hover:bg-[#1D2130] hover:border-[#8B5CF6]/40 p-4 p-5 h-full h-20 w-16 h-16 rounded-xl rounded-full truncate line-clamp-2 line-clamp-4 justify-between items-center flex-wrap min-w-0 flex-1"></div>

  <div id="root"></div>

  <script src="/script.js" type="text/babel" data-type="module"></script>

</body>

</html>
